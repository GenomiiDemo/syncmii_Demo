<script>
const ARCHETYPES = [{"id": "ARC", "name": {"en": "The Architect", "zh": "建构者", "tw": "建構者"}, "tagline": {"en": "You see the system others miss.", "zh": "你能看见别人忽略的系统。", "tw": "你能看見別人忽略的系統。"}, "def": {"en": "You turn chaos into order. While others are still debating what to do, you've already drawn the map.", "zh": "你把混乱变成秩序。当别人还在争论该做什么时，你已经画好了地图。", "tw": "你把混亂變成秩序。當別人還在爭論該做什麼時，你已經畫好了地圖。"}, "power": {"en": "Systems Building — You have a natural gift for seeing how things connect. When a new project kicks off, your first instinct is 'what's the structure here, where are the dependencies, and where will this break?' Your presence saves teams from 30% of avoidable detours.", "zh": "系统搭建 —— 你天生就能看见事物之间如何连接。新项目一启动，你的第一反应是：'结构是什么？依赖在哪里？哪里会崩？'你的存在能帮团队避开约 30% 本可绕开的弯路。", "tw": "系統搭建 —— 你天生就能看見事物之間如何連線。新專案一啟動，你的第一反應是：'結構是什麼？依賴在哪裡？哪裡會崩？'你的存在能幫團隊避開約 30% 本可繞開的彎路。"}, "value": {"en": "Complex projects stay under control when you're on it. Your documentation outlasts the teams that built it. You translate vague unease into actionable plans.", "zh": "只要有你在，复杂项目就不会失控。你写的文档比搭建它的团队活得更久。你能把模糊的不安翻译成可执行的方案。", "tw": "只要有你在，複雜專案就不會失控。你寫的文件比搭建它的團隊活得更久。你能把模糊的不安翻譯成可執行的方案。"}, "flaw": {"en": "The Perfect Plan Trap — Your designs are so precise you sometimes over-prepare before shipping. 'Good enough to go' feels like suffering.", "zh": "完美方案陷阱 —— 你的设计太精密，有时会在交付前过度准备。'够用就发'对你来说像是一种折磨。", "tw": "完美方案陷阱 —— 你的設計太精密，有時會在交付前過度準備。'夠用就發'對你來說像是一種折磨。"}, "quote": {"en": "\"The Architect's plan was perfect. It was also three months late.\"", "zh": "\"建构者的方案堪称完美。可惜也晚了三个月。\"", "tw": "\"建構者的方案堪稱完美。可惜也晚了三個月。\""}, "growth": {"en": "You build the map everyone else navigates by — but maps don't ship products. Your next level is learning to launch at 80% and iterate in the open. The system in your head is only valuable when it exists in the world. Try a personal rule: if you've spent more than two days planning without executing a single thing, stop and ship something small.", "zh": "你搭出了所有人赖以导航的地图——但地图本身不会交付产品。你的下一阶段是学会在 80% 时就上线，然后公开迭代。脑子里的系统只有落地到世界上才有价值。给自己定个规则：连续两天只规划、没有交付任何东西，就停下来先发一个小东西出去。", "tw": "你搭出了所有人賴以導航的地圖——但地圖本身不會交付產品。你的下一階段是學會在 80% 時就上線，然後公開迭代。腦子裡的系統只有落地到世界上才有價值。給自己定個規則：連續兩天只規劃、沒有交付任何東西，就停下來先發一個小東西出去。"}, "partners": ["Operator", "Pioneer", "Analyst"], "tension": ["Disruptor"], "scarcity": 1.0, "tier": "common", "rarityLabel": null}, {"id": "OPR", "name": {"en": "The Operator", "zh": "执行者", "tw": "執行者"}, "tagline": {"en": "You ship when others are still talking.", "zh": "别人还在说，你已经做完了。", "tw": "別人還在說，你已經做完了。"}, "def": {"en": "You are the person who actually finishes things. Not 'mostly done.' Finished.", "zh": "你是那个真正把事情做完的人。不是'差不多了'，是'完成了'。", "tw": "你是那個真正把事情做完的人。不是'差不多了'，是'完成了'。"}, "power": {"en": "Execution Density — The volume of real work you complete per unit of time far exceeds most people's definition of hardworking. Deadlines are fuel, not pressure.", "zh": "执行密度 —— 你在单位时间里完成的真实工作量，远超多数人对'勤奋'的定义。截止日期对你是燃料，不是压力。", "tw": "執行密度 —— 你在單位時間裡完成的真實工作量，遠超多數人對'勤奮'的定義。截止日期對你是燃料，不是壓力。"}, "value": {"en": "The team hands things to you and stops worrying. You push projects from 60% to 100%. While everyone debates, you've already shipped v1.", "zh": "团队把事情交给你，就不再担心。你能把项目从 60% 推到 100%。当大家还在争论时，你已经把 v1 发出去了。", "tw": "團隊把事情交給你，就不再擔心。你能把專案從 60% 推到 100%。當大家還在爭論時，你已經把 v1 發出去了。"}, "flaw": {"en": "The Why Blind Spot — You're so skilled at how that you sometimes skip why. When the direction is wrong, your execution becomes an accelerator, not a brake.", "zh": "'为什么'盲区 —— 你太擅长'怎么做'，有时会跳过'为什么'。当方向错了，你的执行力会变成加速器，而不是刹车。", "tw": "'為什麼'盲區 —— 你太擅長'怎麼做'，有時會跳過'為什麼'。當方向錯了，你的執行力會變成加速器，而不是剎車。"}, "quote": {"en": "\"The Operator finished the project on time. Nobody had thought to ask if it was the right project.\"", "zh": "\"执行者按时完成了项目。没人想过先问一句：这是对的项目吗？\"", "tw": "\"執行者按時完成了專案。沒人想過先問一句：這是對的專案嗎？\""}, "growth": {"en": "You finish what others can't. But finishing the wrong thing faster isn't progress — it's efficient waste. Build the habit of asking 'why are we doing this?' before 'how do we do this?' One good question before every major task will compound into significantly better outcomes over a year.", "zh": "你能完成别人完不成的事。但把错的事做得更快，不是进步，是高效地浪费。养成习惯：在问'怎么做'之前先问'我们为什么要做这件事'。每个重要任务前多问一个好问题，一年累积下来会带来显著更好的结果。", "tw": "你能完成別人完不成的事。但把錯的事做得更快，不是進步，是高效地浪費。養成習慣：在問'怎麼做'之前先問'我們為什麼要做這件事'。每個重要任務前多問一個好問題，一年累積下來會帶來顯著更好的結果。"}, "partners": ["Architect", "Pioneer", "Analyst"], "tension": ["Diplomat"], "scarcity": 1.0, "tier": "common", "rarityLabel": null}, {"id": "CON", "name": {"en": "The Connector", "zh": "连接者", "tw": "連線者"}, "tagline": {"en": "Every room gets warmer when you walk in.", "zh": "你一进门，整个房间都暖了。", "tw": "你一進門，整個房間都暖了。"}, "def": {"en": "Your superpower is people. You remember names, what they care about, what they need — then you bring the right people together.", "zh": "你的超能力是人。你记得名字、记得他们在意什么、需要什么——然后把对的人凑到一起。", "tw": "你的超能力是人。你記得名字、記得他們在意什麼、需要什麼——然後把對的人湊到一起。"}, "power": {"en": "Relationship Network Building — You don't just have a wide network; you actually care about people. That's why your relationships have depth, not just breadth.", "zh": "关系网络搭建 —— 你不只是人脉广，你是真的在乎人。所以你的关系有深度，不只有广度。", "tw": "關係網路搭建 —— 你不只是人脈廣，你是真的在乎人。所以你的關係有深度，不只有廣度。"}, "value": {"en": "Cross-functional projects don't collapse when you're involved. Information moves faster through organizations with you in them.", "zh": "有你参与，跨部门项目就不会散。信息在有你的组织里流动得更快。", "tw": "有你參與，跨部門專案就不會散。資訊在有你的組織裡流動得更快。"}, "flaw": {"en": "Relationship-Captured Decision-Making — You care too much about how everyone feels, which sometimes prevents the right call.", "zh": "被关系绑架的决策 —— 你太在意每个人的感受，有时这会拦住那个正确的决定。", "tw": "被關係綁架的決策 —— 你太在意每個人的感受，有時這會攔住那個正確的決定。"}, "quote": {"en": "\"The Connector knew the right answer. She just couldn't bring herself to say it.\"", "zh": "\"连接者知道正确答案。她只是说不出口。\"", "tw": "\"連線者知道正確答案。她只是說不出口。\""}, "growth": {"en": "Your network is your superpower, but it's only as powerful as your honesty within it. Practice delivering hard truths with warmth — not softening them into meaninglessness. People trust connectors who tell them what they need to hear, not just what feels safe. Your relationships can handle more directness than you think.", "zh": "你的人脉是超能力，但它的力量取决于你在其中有多诚实。练习把难听的真话讲得有温度——而不是软化到失去意义。人们信任那些愿意说他们需要听的话、而不只是说安全话的连接者。你的关系比你想的更能承受直接。", "tw": "你的人脈是超能力，但它的力量取決於你在其中有多誠實。練習把難聽的真話講得有溫度——而不是軟化到失去意義。人們信任那些願意說他們需要聽的話、而不只是說安全話的連線者。你的關係比你想的更能承受直接。"}, "partners": ["Sovereign", "Catalyst", "Diplomat"], "tension": ["Analyst"], "scarcity": 1.0, "tier": "common", "rarityLabel": null}, {"id": "PIO", "name": {"en": "The Pioneer", "zh": "先行者", "tw": "先行者"}, "tagline": {"en": "You live three years ahead of everyone.", "zh": "你活在所有人前面三年。", "tw": "你活在所有人前面三年。"}, "def": {"en": "You have a near-instinctive sense for the future. When others say 'that's not possible,' you're already thinking about how to make it happen.", "zh": "你对未来几乎有种本能的嗅觉。当别人说'这不可能'时，你已经在想怎么让它发生。", "tw": "你對未來幾乎有種本能的嗅覺。當別人說'這不可能'時，你已經在想怎麼讓它發生。"}, "power": {"en": "Opportunity Sensing — You detect trends before they form. Your thinking is non-linear — jumping from A to F, treating B through E as details.", "zh": "机会嗅觉 —— 你在趋势成形之前就能察觉。你的思维是非线性的——从 A 直接跳到 F，把 B 到 E 当成细节。", "tw": "機會嗅覺 —— 你在趨勢成形之前就能察覺。你的思維是非線性的——從 A 直接跳到 F，把 B 到 E 當成細節。"}, "value": {"en": "You're the voice saying 'this is crazy but it might work.' Your presence breaks teams out of path dependence.", "zh": "你是那个说'这听着很疯但也许行'的声音。你的存在能把团队从路径依赖里拽出来。", "tw": "你是那個說'這聽著很瘋但也許行'的聲音。你的存在能把團隊從路徑依賴裡拽出來。"}, "flaw": {"en": "Strong Starts, Weak Finishes — New things excite you. The 'boring execution phase' drains your enthusiasm fast. Your track record includes a lot of beautifully started projects.", "zh": "起步强、收尾弱 —— 新东西让你兴奋。'无聊的执行阶段'会迅速耗光你的热情。你的履历里有一大堆漂亮的烂尾项目。", "tw": "起步強、收尾弱 —— 新東西讓你興奮。'無聊的執行階段'會迅速耗光你的熱情。你的履歷裡有一大堆漂亮的爛尾專案。"}, "quote": {"en": "\"The Pioneer had seventeen brilliant ideas this year. Two of them were finished.\"", "zh": "\"先行者今年有十七个绝妙的点子。其中两个做完了。\"", "tw": "\"先行者今年有十七個絕妙的點子。其中兩個做完了。\""}, "growth": {"en": "You see the future clearly — the problem is nobody else is there yet. Your next evolution is learning to bring people with you rather than leaving them behind. Spend deliberate time translating your instincts into frameworks others can act on. Find an Operator partner and make it a formal arrangement: you ignite, they execute.", "zh": "你把未来看得很清楚——问题是别人还没到那里。你的下一步进化，是学会带着人一起走，而不是把他们落在后面。刻意花时间把你的直觉翻译成别人能执行的框架。找一个执行者搭档，正式约定下来：你点火，他们落地。", "tw": "你把未來看得很清楚——問題是別人還沒到那裡。你的下一步進化，是學會帶著人一起走，而不是把他們落在後面。刻意花時間把你的直覺翻譯成別人能執行的框架。找一個執行者搭檔，正式約定下來：你點火，他們落地。"}, "partners": ["Operator", "Architect", "Weaver"], "tension": ["Guardian"], "scarcity": 1.1, "tier": "scarce", "rarityLabel": "Scarce"}, {"id": "GUA", "name": {"en": "The Guardian", "zh": "守护者", "tw": "守護者"}, "tagline": {"en": "When everything breaks, you hold.", "zh": "当一切崩塌时，你稳住了。", "tw": "當一切崩塌時，你穩住了。"}, "def": {"en": "You are the ballast that keeps the ship steady. When the storm hits, everyone else is scrambling. You're stabilizing.", "zh": "你是让船保持平稳的压舱石。风暴来袭，别人乱作一团，你在稳定局面。", "tw": "你是讓船保持平穩的壓艙石。風暴來襲，別人亂作一團，你在穩定局面。"}, "power": {"en": "Stability and Risk Pre-sensing — You're naturally attuned to where things can go wrong. While everyone celebrates, you're already thinking through next week's contingencies.", "zh": "稳定与风险预感 —— 你天生对'哪里会出问题'敏感。当大家在庆祝时，你已经在推演下周的应急预案。", "tw": "穩定與風險預感 —— 你天生對'哪裡會出問題'敏感。當大家在慶祝時，你已經在推演下週的應急預案。"}, "value": {"en": "You're the safety net that lets the team take real risks. You prevent 90% of 'entirely avoidable' crises.", "zh": "你是那张让团队敢冒真风险的安全网。你能预防 90% '本可完全避免'的危机。", "tw": "你是那張讓團隊敢冒真風險的安全網。你能預防 90% '本可完全避免'的危機。"}, "flaw": {"en": "Change Resistance — Rapid change takes you longer to absorb than most. Your stability is an asset in stable periods — drag during rapid transformation.", "zh": "抗拒变化 —— 快速变化你比多数人需要更长时间消化。你的稳定在平稳期是资产——在剧烈转型期会变成阻力。", "tw": "抗拒變化 —— 快速變化你比多數人需要更長時間消化。你的穩定在平穩期是資產——在劇烈轉型期會變成阻力。"}, "quote": {"en": "\"The Guardian kept the ship steady. Unfortunately, the destination had changed.\"", "zh": "\"守护者让船稳稳前行。可惜，目的地已经变了。\"", "tw": "\"守護者讓船穩穩前行。可惜，目的地已經變了。\""}, "growth": {"en": "You are the reason teams can take real risks — because you catch what everyone else misses. But not every risk needs to be mitigated. Practice tolerating productive discomfort: let small fires burn so the team learns to put them out. Your stability becomes a ceiling when it prevents necessary change.", "zh": "你是团队敢冒真风险的原因——因为你能接住所有人忽略的东西。但不是每个风险都需要被化解。练习容忍'有建设性的不适'：让一些小火苗烧一会儿，好让团队学会自己扑灭。当你的稳定开始阻止必要的改变时，它就成了天花板。", "tw": "你是團隊敢冒真風險的原因——因為你能接住所有人忽略的東西。但不是每個風險都需要被化解。練習容忍'有建設性的不適'：讓一些小火苗燒一會兒，好讓團隊學會自己撲滅。當你的穩定開始阻止必要的改變時，它就成了天花板。"}, "partners": ["Pioneer", "Analyst", "Diplomat"], "tension": ["Disruptor"], "scarcity": 1.0, "tier": "common", "rarityLabel": null}, {"id": "CAT", "name": {"en": "The Catalyst", "zh": "点燃者", "tw": "點燃者"}, "tagline": {"en": "You make people believe in things they didn't know they wanted.", "zh": "你能让人相信他们本不知道自己想要的东西。", "tw": "你能讓人相信他們本不知道自己想要的東西。"}, "def": {"en": "You are the ignition. You walk into a room, and it's different when you leave.", "zh": "你是点火器。你走进一个房间，离开时它已经不一样了。", "tw": "你是點火器。你走進一個房間，離開時它已經不一樣了。"}, "power": {"en": "Motivational Activation — You sense what each person wants at their core and unlock it at the right moment. Not through scripted speeches — through genuine emotional resonance.", "zh": "动机激活 —— 你能感知每个人内心真正想要什么，并在对的时刻把它解锁。不是靠套路演讲，而是靠真实的情绪共鸣。", "tw": "動機啟用 —— 你能感知每個人內心真正想要什麼，並在對的時刻把它解鎖。不是靠套路演講，而是靠真實的情緒共鳴。"}, "value": {"en": "You make 'impossible' tasks possible through collective belief. You are a culture carrier — the atmosphere follows you.", "zh": "你能用集体的信念把'不可能'变成可能。你是文化的载体——气氛跟着你走。", "tw": "你能用集體的信念把'不可能'變成可能。你是文化的載體——氣氛跟著你走。"}, "flaw": {"en": "Bidirectional Energy — Lighting others up costs you heavily. When you crash, the crash propagates through the team.", "zh": "双向能量 —— 点亮别人会大量消耗你自己。当你崩溃时，崩溃会在团队里扩散。", "tw": "雙向能量 —— 點亮別人會大量消耗你自己。當你崩潰時，崩潰會在團隊裡擴散。"}, "quote": {"en": "\"The Catalyst inspired everyone in the room. Then went home and stared at the ceiling for four hours.\"", "zh": "\"点燃者激励了房间里的每一个人。然后回到家，盯着天花板看了四个小时。\"", "tw": "\"點燃者激勵了房間裡的每一個人。然後回到家，盯著天花板看了四個小時。\""}, "growth": {"en": "You light rooms on fire — but fire needs fuel. Energy management is your highest-leverage skill, and you're probably treating it as optional. Build refueling rituals before you hit empty, not after. Partner with a Guardian to provide the stability that lets your ignition sustain. One catalyst who crashes takes the whole team's momentum with them.", "zh": "你能把房间点燃——但火需要燃料。能量管理是你回报最高的技能，而你大概把它当成了可选项。在油箱见底之前就建立补给仪式，而不是之后。找一个守护者搭档，给你提供让点火得以持续的稳定。一个崩溃的点燃者，会把整个团队的势头一起带走。", "tw": "你能把房間點燃——但火需要燃料。能量管理是你回報最高的技能，而你大概把它當成了可選項。在油箱見底之前就建立補給儀式，而不是之後。找一個守護者搭檔，給你提供讓點火得以持續的穩定。一個崩潰的點燃者，會把整個團隊的勢頭一起帶走。"}, "partners": ["Guardian", "Operator", "Weaver"], "tension": ["Analyst"], "scarcity": 1.1, "tier": "scarce", "rarityLabel": "Scarce"}, {"id": "ANL", "name": {"en": "The Analyst", "zh": "洞察者", "tw": "洞察者"}, "tagline": {"en": "You find the truth hiding in the noise.", "zh": "你能在噪音里找到藏着的真相。", "tw": "你能在噪音裡找到藏著的真相。"}, "def": {"en": "While everyone else is arguing based on gut feel, you've already found the data.", "zh": "当所有人凭直觉争论时，你已经找到了数据。", "tw": "當所有人憑直覺爭論時，你已經找到了資料。"}, "power": {"en": "Information Penetration — Ambiguity drives you to find clearer answers. You cut through noise to find the signal that matters, and catch flaws everyone else accepted.", "zh": "信息穿透 —— 模糊会驱使你去寻找更清晰的答案。你能穿过噪音找到真正重要的信号，并抓出别人都默认接受的漏洞。", "tw": "資訊穿透 —— 模糊會驅使你去尋找更清晰的答案。你能穿過噪音找到真正重要的訊號，並抓出別人都預設接受的漏洞。"}, "value": {"en": "Team decisions are built on facts, not assumptions. You're the one who says 'the emperor has no clothes' — and can prove it.", "zh": "团队的决策建立在事实而非假设之上。你是那个会说'国王没穿衣服'——并且能证明它的人。", "tw": "團隊的決策建立在事實而非假設之上。你是那個會說'國王沒穿衣服'——並且能證明它的人。"}, "flaw": {"en": "Analysis Paralysis — Your threshold for 'enough information' is too high. You keep collecting data past the point where a decision was needed.", "zh": "分析瘫痪 —— 你对'信息够了'的门槛太高。过了该做决定的点，你还在继续收集数据。", "tw": "分析癱瘓 —— 你對'資訊夠了'的門檻太高。過了該做決定的點，你還在繼續收集資料。"}, "quote": {"en": "\"The Analyst had the answer. She was still verifying the third decimal place when the window closed.\"", "zh": "\"洞察者握着答案。窗口关上时，她还在核对第三位小数。\"", "tw": "\"洞察者握著答案。視窗關上時，她還在核對第三位小數。\""}, "growth": {"en": "Your analysis is only valuable when it drives action. The perfect answer delivered after the window closes is worth nothing. Set a decision deadline for every analysis task — a fixed time box to find the best available answer, not unlimited time for the perfect one. Start practicing the phrase: 'Based on what we know now, I recommend...'", "zh": "你的分析只有在驱动行动时才有价值。窗口关上后才交出的完美答案，一文不值。给每个分析任务设一个决策截止时间——一个固定的时间盒，去找'当下最好的答案'，而不是无限时间去找'完美答案'。开始练习这句话：'基于目前所知，我建议……'", "tw": "你的分析只有在驅動行動時才有價值。視窗關上後才交出的完美答案，一文不值。給每個分析任務設一個決策截止時間——一個固定的時間盒，去找'當下最好的答案'，而不是無限時間去找'完美答案'。開始練習這句話：'基於目前所知，我建議……'"}, "partners": ["Operator", "Architect", "Curator"], "tension": ["Pioneer"], "scarcity": 1.0, "tier": "common", "rarityLabel": null}, {"id": "DIP", "name": {"en": "The Diplomat", "zh": "斡旋者", "tw": "斡旋者"}, "tagline": {"en": "You make hard conversations feel safe.", "zh": "你能让艰难的对话变得安全。", "tw": "你能讓艱難的對話變得安全。"}, "def": {"en": "You are the person who makes conflict disappear and consensus appear. Not by avoiding it — by genuinely understanding every side.", "zh": "你是那个让冲突消失、让共识浮现的人。不是靠回避，而是靠真正理解每一方。", "tw": "你是那個讓衝突消失、讓共識浮現的人。不是靠迴避，而是靠真正理解每一方。"}, "power": {"en": "Consensus Architecture — You make people with opposing positions all feel heard, then guide everyone toward common ground. You're not smoothing things over — you genuinely see each side.", "zh": "共识架构 —— 你能让立场对立的人都感到被听见，再引导大家走向共同点。你不是和稀泥——你是真的看见了每一面。", "tw": "共識架構 —— 你能讓立場對立的人都感到被聽見，再引導大家走向共同點。你不是和稀泥——你是真的看見了每一面。"}, "value": {"en": "Cross-functional projects stuck for weeks come unstuck after one meeting with you. Your presence reduces organizational friction.", "zh": "卡了几周的跨部门项目，跟你开一次会就松动了。你的存在能降低组织摩擦。", "tw": "卡了幾周的跨部門專案，跟你開一次會就鬆動了。你的存在能降低組織摩擦。"}, "flaw": {"en": "Position Ambiguity — You're so skilled at understanding everyone that people sometimes can't tell what you actually think.", "zh": "立场模糊 —— 你太擅长理解每个人，以至于别人有时分不清你自己到底怎么想。", "tw": "立場模糊 —— 你太擅長理解每個人，以至於別人有時分不清你自己到底怎麼想。"}, "quote": {"en": "\"The Diplomat understood everyone's position perfectly. No one was quite sure what his own position was.\"", "zh": "\"斡旋者完美地理解了每个人的立场。没人确定他自己的立场是什么。\"", "tw": "\"斡旋者完美地理解了每個人的立場。沒人確定他自己的立場是什麼。\""}, "growth": {"en": "You make the room feel safe — but you sometimes disappear in the process. Before every mediation or alignment conversation, privately clarify your own position: 'If I had to pick a side, which one?' Then bring that anchor into the room. Diplomatic effectiveness requires a point of view, not just the ability to hold space for everyone else's.", "zh": "你让房间感到安全——但你有时会在这个过程里消失。每次调解或对齐对话之前，私下先厘清自己的立场：'如果必须选一边，我选哪边？'然后把这个锚带进房间。外交式的有效，需要一个观点，而不只是为别人撑住空间的能力。", "tw": "你讓房間感到安全——但你有時會在這個過程裡消失。每次調解或對齊對話之前，私下先釐清自己的立場：'如果必須選一邊，我選哪邊？'然後把這個錨帶進房間。外交式的有效，需要一個觀點，而不只是為別人撐住空間的能力。"}, "partners": ["Sovereign", "Connector", "Guardian"], "tension": ["Disruptor"], "scarcity": 1.0, "tier": "common", "rarityLabel": null}, {"id": "DIS", "name": {"en": "The Disruptor", "zh": "破局者", "tw": "破局者"}, "tagline": {"en": "You break things that need breaking.", "zh": "你专门打破那些该被打破的东西。", "tw": "你專門打破那些該被打破的東西。"}, "def": {"en": "'Because we've always done it this way' triggers a physical reaction in you. Your reason for existing is to tear down what shouldn't exist.", "zh": "'我们一直这么做'会在你身上引发生理反应。你存在的理由，就是拆掉不该存在的东西。", "tw": "'我們一直這麼做'會在你身上引發生理反應。你存在的理由，就是拆掉不該存在的東西。"}, "power": {"en": "Breakthrough Force — You see the emperor's new clothes that everyone politely ignores. When an entire industry follows unquestioned rules, you ask why — and act.", "zh": "破局之力 —— 你能看见所有人礼貌地视而不见的'皇帝新衣'。当整个行业遵循着没人质疑的规则时，你会问为什么——然后动手。", "tw": "破局之力 —— 你能看見所有人禮貌地視而不見的'皇帝新衣'。當整個行業遵循著沒人質疑的規則時，你會問為什麼——然後動手。"}, "value": {"en": "You prevent the company from being disrupted by someone else — because you're disrupting it from within. You break path dependence.", "zh": "你让公司不至于被别人颠覆——因为你正从内部颠覆它。你打破路径依赖。", "tw": "你讓公司不至於被別人顛覆——因為你正從內部顛覆它。你打破路徑依賴。"}, "flaw": {"en": "Demolition Exceeds Construction — Your disruptive impulse sometimes outpaces actual need. You may tear down something working fine because it wasn't perfect.", "zh": "拆得比建得多 —— 你的破坏冲动有时超过实际需要。你可能因为某样东西'不够完美'，就把运转正常的它拆掉。", "tw": "拆得比建得多 —— 你的破壞衝動有時超過實際需要。你可能因為某樣東西'不夠完美'，就把運轉正常的它拆掉。"}, "quote": {"en": "\"The Disruptor burned down the old system. It took three years to rebuild it. No one was sure the new one was better.\"", "zh": "\"破局者烧掉了旧系统。重建花了三年。没人确定新的是不是更好。\"", "tw": "\"破局者燒掉了舊系統。重建花了三年。沒人確定新的是不是更好。\""}, "growth": {"en": "You see the emperor's new clothes — but demolition without architecture leaves rubble. Before every 'burn it down' impulse, ask: what in this existing structure is worth keeping? Your most powerful moments aren't when you destroy what's wrong — they're when you replace it with something better. Find an Architect partner.", "zh": "你能看见皇帝的新衣——但没有架构的拆除只会留下废墟。每次'烧掉它'的冲动之前，先问：现有结构里有什么是值得保留的？你最有力的时刻，不是摧毁错的东西，而是用更好的东西替换它。找一个建构者搭档。", "tw": "你能看見皇帝的新衣——但沒有架構的拆除只會留下廢墟。每次'燒掉它'的衝動之前，先問：現有結構裡有什麼是值得保留的？你最有力的時刻，不是摧毀錯的東西，而是用更好的東西替換它。找一個建構者搭檔。"}, "partners": ["Architect", "Weaver"], "tension": ["Guardian", "Diplomat"], "scarcity": 1.2, "tier": "rare", "rarityLabel": "Rare · Top 4%"}, {"id": "CUR", "name": {"en": "The Curator", "zh": "甄别者", "tw": "甄別者"}, "tagline": {"en": "You know what matters and what doesn't.", "zh": "你知道什么重要，什么不重要。", "tw": "你知道什麼重要，什麼不重要。"}, "def": {"en": "You are the quality gatekeeper. In an age of infinite everything, you're the one who knows what's worth keeping.", "zh": "你是质量的守门人。在一个什么都无限多的时代，你是那个知道什么值得留下的人。", "tw": "你是質量的守門人。在一個什麼都無限多的時代，你是那個知道什麼值得留下的人。"}, "power": {"en": "Signal Selection — You have an innate sense of the gap between good and good enough. You scan 100 options and immediately narrow to the 3 worth pursuing deeply.", "zh": "信号筛选 —— 你天生能感知'好'与'够好'之间的差距。你扫过 100 个选项，立刻收窄到值得深挖的那 3 个。", "tw": "訊號篩選 —— 你天生能感知'好'與'夠好'之間的差距。你掃過 100 個選項，立刻收窄到值得深挖的那 3 個。"}, "value": {"en": "The team's energy goes toward things that actually matter. What you produce never needs a second quality pass.", "zh": "团队的精力会投向真正重要的事。你产出的东西，从不需要二次质检。", "tw": "團隊的精力會投向真正重要的事。你產出的東西，從不需要二次質檢。"}, "flaw": {"en": "The Perfectionism Tax — Your high standards sometimes lock you in a 'never quite good enough' loop. The market moves while you're finishing draft seven.", "zh": "完美主义税 —— 你的高标准有时会把你锁在'总差一点'的循环里。当你在打磨第七版草稿时，市场已经走了。", "tw": "完美主義稅 —— 你的高標準有時會把你鎖在'總差一點'的迴圈裡。當你在打磨第七版草稿時，市場已經走了。"}, "quote": {"en": "\"The Curator's work was flawless. It shipped six months after the market had moved on.\"", "zh": "\"甄别者的作品无可挑剔。它在市场转向六个月之后才上线。\"", "tw": "\"甄別者的作品無可挑剔。它在市場轉向六個月之後才上線。\""}, "growth": {"en": "Your signal detection is extraordinary — the problem is you sometimes keep detecting instead of committing. Practice deciding faster by setting a rule: once you've identified your top three options, you have 24 hours to pick one. The market rewards the person who ships a good enough product, not the one who perfects it.", "zh": "你的信号检测能力非凡——问题是你有时只顾着继续检测，却不肯下注。练习更快地决定：定个规则，一旦你锁定了前三个选项，就有 24 小时选出一个。市场奖励那个发出'够好'产品的人，而不是那个把它打磨到完美的人。", "tw": "你的訊號檢測能力非凡——問題是你有時只顧著繼續檢測，卻不肯下注。練習更快地決定：定個規則，一旦你鎖定了前三個選項，就有 24 小時選出一個。市場獎勵那個發出'夠好'產品的人，而不是那個把它打磨到完美的人。"}, "partners": ["Operator", "Analyst", "Weaver"], "tension": ["Pioneer"], "scarcity": 1.1, "tier": "scarce", "rarityLabel": "Scarce"}, {"id": "SOV", "name": {"en": "The Sovereign", "zh": "主权者", "tw": "主權者"}, "tagline": {"en": "People follow you before you ask them to.", "zh": "人们在你开口之前就跟随你。", "tw": "人們在你開口之前就跟隨你。"}, "def": {"en": "You don't need a title. You don't need an invitation. You walk into the room, and the dynamic shifts.", "zh": "你不需要头衔，不需要邀请。你走进房间，气场就变了。", "tw": "你不需要頭銜，不需要邀請。你走進房間，氣場就變了。"}, "power": {"en": "Natural Authority — Not dominance. Something harder to describe: a field. When you make a decision, people follow — not out of fear, but because your judgment makes them feel secure.", "zh": "天然权威 —— 不是支配，是一种更难描述的东西：一个场。当你做决定时，人们会跟随——不是出于恐惧，而是因为你的判断让他们感到安全。", "tw": "天然權威 —— 不是支配，是一種更難描述的東西：一個場。當你做決定時，人們會跟隨——不是出於恐懼，而是因為你的判斷讓他們感到安全。"}, "value": {"en": "You move things forward without formal authorization. In crises, everyone automatically looks to you.", "zh": "你不需要正式授权就能推动事情。危机时刻，所有人会自动看向你。", "tw": "你不需要正式授權就能推動事情。危機時刻，所有人會自動看向你。"}, "flaw": {"en": "Authority Dependency — You're so accustomed to being the final decision-maker that operating without that role is genuinely uncomfortable.", "zh": "权威依赖 —— 你太习惯当那个最终拍板的人，以至于在没有这个角色时会真切地感到不适。", "tw": "權威依賴 —— 你太習慣當那個最終拍板的人，以至於在沒有這個角色時會真切地感到不適。"}, "quote": {"en": "\"The Sovereign was the best person in the room. She was also the hardest to manage.\"", "zh": "\"主权者是房间里最优秀的人，也是最难被管理的人。\"", "tw": "\"主權者是房間裡最優秀的人，也是最難被管理的人。\""}, "growth": {"en": "You command rooms before you speak — but authority built on presence alone is fragile. Invest in genuine curiosity about others' inner worlds. Ask questions you don't already know the answer to. The leaders who last aren't just followed — they make the people around them feel seen. Your power grows when it includes others rather than emanating from you alone.", "zh": "你在开口之前就掌控了房间——但只靠气场建立的权威是脆弱的。投资于对他人内心世界真实的好奇。问那些你并不已经知道答案的问题。能走得长远的领导者，不只是被追随——他们让身边的人感到被看见。当你的力量包含他人、而非只从你一人散发时，它才会增长。", "tw": "你在開口之前就掌控了房間——但只靠氣場建立的權威是脆弱的。投資於對他人內心世界真實的好奇。問那些你並不已經知道答案的問題。能走得長遠的領導者，不只是被追隨——他們讓身邊的人感到被看見。當你的力量包含他人、而非只從你一人散發時，它才會增長。"}, "partners": ["Diplomat", "Connector"], "tension": ["Disruptor"], "scarcity": 1.2, "tier": "rare", "rarityLabel": "Rare · Top 3%"}, {"id": "WEA", "name": {"en": "The Weaver", "zh": "织网者", "tw": "織網者"}, "tagline": {"en": "You connect dots no one else sees.", "zh": "你能连起别人看不见的点。", "tw": "你能連起別人看不見的點。"}, "def": {"en": "You live at the intersection of different worlds. Others work in parallel lines. You build bridges between them.", "zh": "你活在不同世界的交界处。别人在平行线上工作，你在它们之间搭桥。", "tw": "你活在不同世界的交界處。別人在平行線上工作，你在它們之間搭橋。"}, "power": {"en": "Cross-Domain Synthesis — You connect ideas, fields, and people that seem completely unrelated, creating unexpected value from the intersection.", "zh": "跨域综合 —— 你能把看似毫不相关的想法、领域和人连接起来，从交界处创造出意料之外的价值。", "tw": "跨域綜合 —— 你能把看似毫不相關的想法、領域和人連線起來，從交界處創造出意料之外的價值。"}, "value": {"en": "You're the catalyst for cross-industry collaboration. You solve problems that domain experts can't — because the answer was outside the domain.", "zh": "你是跨行业协作的催化剂。你能解决领域专家解不了的问题——因为答案在领域之外。", "tw": "你是跨行業協作的催化劑。你能解決領域專家解不了的問題——因為答案在領域之外。"}, "flaw": {"en": "KPI Invisibility — Your contributions are of the 'this wouldn't have happened without you' variety, not 'you completed X producing Y.' In traditional performance systems, you're chronically undervalued.", "zh": "KPI 隐形 —— 你的贡献属于'没有你就不会发生'那一类，而不是'你完成了 X，产出了 Y'。在传统绩效体系里，你长期被低估。", "tw": "KPI 隱形 —— 你的貢獻屬於'沒有你就不會發生'那一類，而不是'你完成了 X，產出了 Y'。在傳統績效體系裡，你長期被低估。"}, "quote": {"en": "\"The Weaver's contribution was invisible until it wasn't there.\"", "zh": "\"织网者的贡献一直是隐形的——直到它不在了。\"", "tw": "\"織網者的貢獻一直是隱形的——直到它不在了。\""}, "growth": {"en": "You live at the intersection of worlds that don't normally talk to each other — which makes you invaluable and nearly invisible at the same time. Learn to translate your cross-domain value into language traditional evaluation systems understand: 'I connected X and Y, which made Z possible.' Develop one signature strength others can point to, without losing your range.", "zh": "你活在那些平时互不交谈的世界的交界处——这让你既无可替代，又几乎隐形。学会把你的跨域价值翻译成传统评估体系能理解的语言：'我连接了 X 和 Y，让 Z 成为可能。'发展出一个别人能指着说的标志性强项，同时不失去你的广度。", "tw": "你活在那些平時互不交談的世界的交界處——這讓你既無可替代，又幾乎隱形。學會把你的跨域價值翻譯成傳統評估體系能理解的語言：'我連線了 X 和 Y，讓 Z 成為可能。'發展出一個別人能指著說的標誌性強項，同時不失去你的廣度。"}, "partners": ["Analyst", "Operator", "Pioneer"], "tension": ["Guardian"], "scarcity": 1.2, "tier": "rare", "rarityLabel": "Rare · Top 3%"}];
const ARCHETYPE_MAP = Object.fromEntries(ARCHETYPES.map(a => [a.id, a]));
const QUESTIONS = [{"q": {"en": "You've just taken on an urgent project with a two-week deadline. What do you do on day one?", "zh": "你接手了一个紧急项目，deadline 是两周后。第一天你会怎么做？", "tw": "你接手了一個緊急專案，deadline 是兩週後。第一天你會怎麼做？"}, "opts": [{"text": {"en": "Spend half a day mapping all dependencies and risks, build the full framework before executing", "zh": "先花半天理清所有依赖关系和风险点，画出整体框架再开始执行", "tw": "先花半天理清所有依賴關係和風險點，畫出整體框架再開始執行"}, "scores": {"ARC": 3, "OPR": 1, "CON": 0, "PIO": 0, "GUA": 2, "CAT": 0, "ANL": 1, "DIP": 0, "DIS": 0, "CUR": 2, "SOV": 1, "WEA": 1}}, {"text": {"en": "Start immediately on the core deliverable, adjust as you go — don't over-invest in upfront planning", "zh": "直接开始做最核心的部分，边做边调整，不在前期规划上花太多时间", "tw": "直接開始做最核心的部分，邊做邊調整，不在前期規劃上花太多時間"}, "scores": {"ARC": 0, "OPR": 3, "CON": 0, "PIO": 2, "GUA": 0, "CAT": 1, "ANL": 0, "DIP": 0, "DIS": 2, "CUR": 0, "SOV": 1, "WEA": 0}}, {"text": {"en": "Talk to every stakeholder first, understand everyone's expectations and concerns", "zh": "先找所有相关人谈一遍，搞清楚每个人的期望和顾虑", "tw": "先找所有相關人談一遍，搞清楚每個人的期望和顧慮"}, "scores": {"ARC": 0, "OPR": 0, "CON": 3, "PIO": 0, "GUA": 1, "CAT": 2, "ANL": 0, "DIP": 3, "DIS": 0, "CUR": 0, "SOV": 1, "WEA": 1}}, {"text": {"en": "Research the background data and historical precedents to make sure decisions are well-grounded", "zh": "研究这个项目的背景数据和历史案例，确保决策基于充分信息", "tw": "研究這個專案的背景資料和歷史案例，確保決策基於充分資訊"}, "scores": {"ARC": 1, "OPR": 0, "CON": 0, "PIO": 0, "GUA": 1, "CAT": 0, "ANL": 3, "DIP": 0, "DIS": 0, "CUR": 2, "SOV": 0, "WEA": 2}}]}, {"q": {"en": "Your team has been debating a key issue for an hour with no resolution. What do you do?", "zh": "团队在一个关键问题上讨论了一个小时，没有结论。你会怎么处理？", "tw": "團隊在一個關鍵問題上討論了一個小時，沒有結論。你會怎麼處理？"}, "opts": [{"text": {"en": "Whiteboard everyone's perspectives, find the root of the disagreement, then continue", "zh": "在白板上把所有人的观点结构化，找出分歧的根本原因，再继续讨论", "tw": "在白板上把所有人的觀點結構化，找出分歧的根本原因，再繼續討論"}, "scores": {"ARC": 3, "OPR": 0, "CON": 1, "PIO": 0, "GUA": 1, "CAT": 0, "ANL": 2, "DIP": 1, "DIS": 0, "CUR": 2, "SOV": 0, "WEA": 2}}, {"text": {"en": "Make the call: 'We're doing it this way. Run it for two weeks and review.'", "zh": "直接拍板：'我们就这样做，先跑起来，两周后复盘'", "tw": "直接拍板：'我們就這樣做，先跑起來，兩週後覆盤'"}, "scores": {"ARC": 0, "OPR": 2, "CON": 0, "PIO": 1, "GUA": 0, "CAT": 1, "ANL": 0, "DIP": 0, "DIS": 2, "CUR": 0, "SOV": 3, "WEA": 0}}, {"text": {"en": "Check in with the people who haven't spoken — surface the hidden disagreements", "zh": "去问没说话的那几个人他们真实的想法，把隐性分歧显性化", "tw": "去問沒說話的那幾個人他們真實的想法，把隱性分歧顯性化"}, "scores": {"ARC": 1, "OPR": 0, "CON": 3, "PIO": 0, "GUA": 0, "CAT": 2, "ANL": 0, "DIP": 3, "DIS": 0, "CUR": 0, "SOV": 0, "WEA": 1}}, {"text": {"en": "Suggest pausing, have everyone prepare a data-backed proposal, compare next time", "zh": "提议暂停会议，各自整理一版数据支撑的方案，下次再比较", "tw": "提議暫停會議，各自整理一版資料支撐的方案，下次再比較"}, "scores": {"ARC": 1, "OPR": 0, "CON": 0, "PIO": 0, "GUA": 2, "CAT": 0, "ANL": 3, "DIP": 0, "DIS": 0, "CUR": 2, "SOV": 0, "WEA": 1}}]}, {"q": {"en": "You're 3 hours from a report deadline. You spot a questionable data point that would take 2 hours to verify. What do you do?", "zh": "距离提交还有 3 小时，你发现有一个数据有疑问，核实需要 2 小时。你会？", "tw": "距離提交還有 3 小時，你發現有一個資料有疑問，核實需要 2 小時。你會？"}, "opts": [{"text": {"en": "Finish the framework with existing data, spend 30 min quickly verifying the single most critical number", "zh": "先用现有数据完成报告框架，同时花30分钟快速验证最关键的那一个数字", "tw": "先用現有資料完成報告框架，同時花30分鐘快速驗證最關鍵的那一個數字"}, "scores": {"ARC": 2, "OPR": 2, "CON": 0, "PIO": 1, "GUA": 1, "CAT": 0, "ANL": 2, "DIP": 0, "DIS": 0, "CUR": 1, "SOV": 1, "WEA": 0}}, {"text": {"en": "Submit the current version, note it as pending verification, update when confirmed", "zh": "先提交现有版本，在备注里说明该数据待核实，有结论再更新", "tw": "先提交現有版本，在備註裡說明該資料待核實，有結論再更新"}, "scores": {"ARC": 0, "OPR": 3, "CON": 0, "PIO": 2, "GUA": 0, "CAT": 0, "ANL": 0, "DIP": 0, "DIS": 2, "CUR": 0, "SOV": 1, "WEA": 0}}, {"text": {"en": "Contact the data source directly for urgent confirmation while advancing other sections", "zh": "联系数据来源方请他们紧急确认，同时推进其他部分", "tw": "聯絡資料來源方請他們緊急確認，同時推進其他部分"}, "scores": {"ARC": 1, "OPR": 1, "CON": 3, "PIO": 0, "GUA": 0, "CAT": 1, "ANL": 0, "DIP": 2, "DIS": 0, "CUR": 0, "SOV": 0, "WEA": 1}}, {"text": {"en": "Properly verify it — wrong data is worse than late data, even if it means submitting late", "zh": "认真核实，哪怕提交晚一些——错误的数据比晚交更严重", "tw": "認真核實，哪怕提交晚一些——錯誤的資料比晚交更嚴重"}, "scores": {"ARC": 0, "OPR": 0, "CON": 0, "PIO": 0, "GUA": 2, "CAT": 0, "ANL": 3, "DIP": 0, "DIS": 0, "CUR": 3, "SOV": 0, "WEA": 0}}]}, {"q": {"en": "Option A: safe, projected return of 8. Option B: riskier, return of 15 if it works. You tend to:", "zh": "方案A稳妥预期收益8分，方案B风险较高但成功收益15分。你倾向于？", "tw": "方案A穩妥預期收益8分，方案B風險較高但成功收益15分。你傾向於？"}, "opts": [{"text": {"en": "Choose B, but first break down the risks carefully and design contingency plans", "zh": "选B，但先花时间把风险拆解清楚，设计好应对预案再推进", "tw": "選B，但先花時間把風險拆解清楚，設計好應對預案再推進"}, "scores": {"ARC": 3, "OPR": 0, "CON": 0, "PIO": 1, "GUA": 2, "CAT": 0, "ANL": 2, "DIP": 0, "DIS": 0, "CUR": 1, "SOV": 1, "WEA": 1}}, {"text": {"en": "Choose B, start fast, solve problems as they appear — perfect contingency plans are often wasted time", "zh": "选B，快速启动，遇到问题再解决——完美的预案往往是浪费时间", "tw": "選B，快速啟動，遇到問題再解決——完美的預案往往是浪費時間"}, "scores": {"ARC": 0, "OPR": 3, "CON": 0, "PIO": 3, "GUA": 0, "CAT": 1, "ANL": 0, "DIP": 0, "DIS": 3, "CUR": 0, "SOV": 1, "WEA": 0}}, {"text": {"en": "Full team discussion first — this decision affects many people, alignment before action", "zh": "先和团队充分讨论，因为这个决策会影响很多人，大家对齐了再做", "tw": "先和團隊充分討論，因為這個決策會影響很多人，大家對齊了再做"}, "scores": {"ARC": 0, "OPR": 0, "CON": 3, "PIO": 0, "GUA": 1, "CAT": 2, "ANL": 0, "DIP": 3, "DIS": 0, "CUR": 0, "SOV": 0, "WEA": 1}}, {"text": {"en": "Deeply analyze data on both options to assess whether B's risks are truly worth taking", "zh": "深入分析两个方案的数据，看方案B的风险是否真的值得承担", "tw": "深入分析兩個方案的資料，看方案B的風險是否真的值得承擔"}, "scores": {"ARC": 1, "OPR": 0, "CON": 0, "PIO": 0, "GUA": 2, "CAT": 0, "ANL": 3, "DIP": 0, "DIS": 0, "CUR": 2, "SOV": 0, "WEA": 1}}]}, {"q": {"en": "You realize something the team has always done can be skipped with no impact. What do you do?", "zh": "你发现团队一直在做的一件事其实可以完全省略，不会影响任何结果。你会？", "tw": "你發現團隊一直在做的一件事其實可以完全省略，不會影響任何結果。你會？"}, "opts": [{"text": {"en": "Think through why it was built in originally, confirm no hidden effects, then raise it", "zh": "先想清楚为什么这件事最初被设计进来，确认省略后不会有隐性影响，再提出", "tw": "先想清楚為什麼這件事最初被設計進來，確認省略後不會有隱性影響，再提出"}, "scores": {"ARC": 3, "OPR": 0, "CON": 0, "PIO": 0, "GUA": 3, "CAT": 0, "ANL": 1, "DIP": 1, "DIS": 0, "CUR": 2, "SOV": 1, "WEA": 0}}, {"text": {"en": "Raise it immediately and stop doing it today", "zh": "直接提出来，告诉大家这步可以去掉，并且今天就停止做这件事", "tw": "直接提出來，告訴大家這步可以去掉，並且今天就停止做這件事"}, "scores": {"ARC": 0, "OPR": 3, "CON": 0, "PIO": 2, "GUA": 0, "CAT": 0, "ANL": 0, "DIP": 0, "DIS": 3, "CUR": 0, "SOV": 2, "WEA": 0}}, {"text": {"en": "Talk to a few trusted colleagues first, gauge reactions before raising it formally", "zh": "找几个信任的同事先聊聊他们的看法，确认大家对这件事的真实态度", "tw": "找幾個信任的同事先聊聊他們的看法，確認大家對這件事的真實態度"}, "scores": {"ARC": 0, "OPR": 0, "CON": 3, "PIO": 1, "GUA": 1, "CAT": 1, "ANL": 0, "DIP": 3, "DIS": 0, "CUR": 0, "SOV": 0, "WEA": 1}}, {"text": {"en": "Gather data to prove the task's ineffectiveness — let the numbers speak", "zh": "收集数据证明这件事的无效性，用数字说话，避免主观判断被质疑", "tw": "收集資料證明這件事的無效性，用數字說話，避免主觀判斷被質疑"}, "scores": {"ARC": 1, "OPR": 1, "CON": 0, "PIO": 0, "GUA": 1, "CAT": 0, "ANL": 3, "DIP": 0, "DIS": 0, "CUR": 2, "SOV": 0, "WEA": 1}}]}, {"q": {"en": "A colleague is underperforming and you need to give feedback. How do you approach it?", "zh": "你的一个同事在项目上表现不佳，你需要给他反馈。你会怎么做？", "tw": "你的一個同事在專案上表現不佳，你需要給他反饋。你會怎麼做？"}, "opts": [{"text": {"en": "Schedule a formal 1-on-1, prepare your points in advance, deliver structured feedback", "zh": "约一个正式的1-on-1，提前把反馈内容整理好，结构化地告诉他问题在哪", "tw": "約一個正式的1-on-1，提前把反饋內容整理好，結構化地告訴他問題在哪"}, "scores": {"ARC": 2, "OPR": 1, "CON": 0, "PIO": 0, "GUA": 2, "CAT": 0, "ANL": 1, "DIP": 1, "DIS": 0, "CUR": 2, "SOV": 2, "WEA": 0}}, {"text": {"en": "Catch them right after a meeting: 'This part wasn't strong enough — here's what to fix.' Direct and brief.", "zh": "直接在下次会议后找他说：'这部分做得不够好，下次这样改'，简洁明了", "tw": "直接在下次會議後找他說：'這部分做得不夠好，下次這樣改'，簡潔明瞭"}, "scores": {"ARC": 0, "OPR": 3, "CON": 0, "PIO": 1, "GUA": 0, "CAT": 0, "ANL": 0, "DIP": 0, "DIS": 2, "CUR": 0, "SOV": 3, "WEA": 0}}, {"text": {"en": "Acknowledge what they're doing well first, build trust, then guide them to recognize the issue", "zh": "先找机会表扬他做得好的地方，建立信任感，再引导他自己发现问题", "tw": "先找機會表揚他做得好的地方，建立信任感，再引導他自己發現問題"}, "scores": {"ARC": 0, "OPR": 0, "CON": 3, "PIO": 0, "GUA": 0, "CAT": 3, "ANL": 0, "DIP": 2, "DIS": 0, "CUR": 0, "SOV": 0, "WEA": 1}}, {"text": {"en": "Describe specific observations without judgment, let them draw their own conclusions", "zh": "描述你观察到的具体现象，避免主观判断，让他自己理解问题所在", "tw": "描述你觀察到的具體現象，避免主觀判斷，讓他自己理解問題所在"}, "scores": {"ARC": 1, "OPR": 0, "CON": 1, "PIO": 0, "GUA": 1, "CAT": 0, "ANL": 3, "DIP": 2, "DIS": 0, "CUR": 1, "SOV": 0, "WEA": 1}}]}, {"q": {"en": "You're added to an unfamiliar team and need to establish influence within one week. Your first move?", "zh": "你被临时加入一个你不熟悉的团队，需要在一周内建立影响力。你的第一步是？", "tw": "你被臨時加入一個你不熟悉的團隊，需要在一週內建立影響力。你的第一步是？"}, "opts": [{"text": {"en": "Learn the team's structure and workflow, identify improvement opportunities, prove value through output", "zh": "快速了解团队的工作方式和结构，找到可以优化的地方，用具体成果证明自己的价值", "tw": "快速瞭解團隊的工作方式和結構，找到可以最佳化的地方，用具體成果證明自己的價值"}, "scores": {"ARC": 2, "OPR": 2, "CON": 0, "PIO": 1, "GUA": 0, "CAT": 0, "ANL": 1, "DIP": 0, "DIS": 1, "CUR": 1, "SOV": 1, "WEA": 1}}, {"text": {"en": "Take on the hardest task immediately — results build trust faster than anything else", "zh": "立刻承担最困难的一项任务，用结果说话——没有什么比交付更快建立信任", "tw": "立刻承擔最困難的一項任務，用結果說話——沒有什麼比交付更快建立信任"}, "scores": {"ARC": 0, "OPR": 3, "CON": 0, "PIO": 2, "GUA": 0, "CAT": 1, "ANL": 0, "DIP": 0, "DIS": 2, "CUR": 0, "SOV": 2, "WEA": 0}}, {"text": {"en": "Have individual conversations with each person — understand their work, challenges, and expectations", "zh": "先和每个人单独聊一遍，了解他们各自的工作内容、困难和期待", "tw": "先和每個人單獨聊一遍，瞭解他們各自的工作內容、困難和期待"}, "scores": {"ARC": 0, "OPR": 0, "CON": 3, "PIO": 0, "GUA": 0, "CAT": 2, "ANL": 0, "DIP": 3, "DIS": 0, "CUR": 0, "SOV": 0, "WEA": 1}}, {"text": {"en": "Observe for a day or two, map the real decision-makers and power structure, then engage", "zh": "观察团队一到两天，找出核心决策者和真实的权力结构，再决定如何切入", "tw": "觀察團隊一到兩天，找出核心決策者和真實的權力結構，再決定如何切入"}, "scores": {"ARC": 1, "OPR": 0, "CON": 1, "PIO": 0, "GUA": 2, "CAT": 0, "ANL": 2, "DIP": 1, "DIS": 0, "CUR": 0, "SOV": 2, "WEA": 2}}]}, {"q": {"en": "Two colleagues you value have a visible conflict. Both come to you. What do you do?", "zh": "两个你都很重视的同事因为工作分歧产生了明显冲突，他们都来找你倾诉。你会？", "tw": "兩個你都很重視的同事因為工作分歧產生了明顯衝突，他們都來找你傾訴。你會？"}, "opts": [{"text": {"en": "Help each clarify the logic behind their position, identify the core disagreement, design a resolution framework", "zh": "帮双方梳理各自立场的逻辑，找到争议的核心，然后设计一个解决框架", "tw": "幫雙方梳理各自立場的邏輯，找到爭議的核心，然後設計一個解決框架"}, "scores": {"ARC": 2, "OPR": 0, "CON": 1, "PIO": 0, "GUA": 1, "CAT": 0, "ANL": 2, "DIP": 2, "DIS": 0, "CUR": 1, "SOV": 1, "WEA": 2}}, {"text": {"en": "Tell them this needs to be resolved fast — push them to sit down and work it out directly", "zh": "告诉他们这个问题需要快速解决，直接推动他们坐在一起谈清楚", "tw": "告訴他們這個問題需要快速解決，直接推動他們坐在一起談清楚"}, "scores": {"ARC": 0, "OPR": 2, "CON": 0, "PIO": 1, "GUA": 0, "CAT": 1, "ANL": 0, "DIP": 0, "DIS": 2, "CUR": 0, "SOV": 3, "WEA": 0}}, {"text": {"en": "Listen carefully to each, make both feel genuinely understood, then find a moment to bring them together", "zh": "分别认真倾听，让双方都感到被理解，然后找机会促成他们直接对话", "tw": "分別認真傾聽，讓雙方都感到被理解，然後找機會促成他們直接對話"}, "scores": {"ARC": 0, "OPR": 0, "CON": 3, "PIO": 0, "GUA": 0, "CAT": 2, "ANL": 0, "DIP": 3, "DIS": 0, "CUR": 0, "SOV": 0, "WEA": 1}}, {"text": {"en": "Stay neutral, offer objective analysis, let them draw their own conclusions", "zh": "保持中立，提供你认为客观的分析，让他们自己做出判断", "tw": "保持中立，提供你認為客觀的分析，讓他們自己做出判斷"}, "scores": {"ARC": 1, "OPR": 0, "CON": 0, "PIO": 0, "GUA": 2, "CAT": 0, "ANL": 3, "DIP": 1, "DIS": 0, "CUR": 1, "SOV": 0, "WEA": 1}}]}, {"q": {"en": "You're representing your team at an important external meeting. What impression do you most want to leave?", "zh": "你在一个重要的外部会议上代表团队发言。你最希望与会者对你的印象是？", "tw": "你在一個重要的外部會議上代表團隊發言。你最希望與會者對你的印象是？"}, "opts": [{"text": {"en": "'This person made a complex problem crystal clear — the logic was airtight.'", "zh": "'这个人把复杂的问题说清楚了，逻辑非常严密'", "tw": "'這個人把複雜的問題說清楚了，邏輯非常嚴密'"}, "scores": {"ARC": 3, "OPR": 0, "CON": 0, "PIO": 0, "GUA": 1, "CAT": 0, "ANL": 2, "DIP": 1, "DIS": 0, "CUR": 2, "SOV": 1, "WEA": 1}}, {"text": {"en": "'This person delivers. Every example they gave was a real, concrete result.'", "zh": "'这个人说到做到，他讲的案例都是实实在在的成果'", "tw": "'這個人說到做到，他講的案例都是實實在在的成果'"}, "scores": {"ARC": 0, "OPR": 3, "CON": 0, "PIO": 1, "GUA": 0, "CAT": 0, "ANL": 0, "DIP": 0, "DIS": 1, "CUR": 1, "SOV": 2, "WEA": 0}}, {"text": {"en": "'This person was magnetic — I want to stay in touch.'", "zh": "'这个人很有感染力，我想跟他保持联系'", "tw": "'這個人很有感染力，我想跟他保持聯絡'"}, "scores": {"ARC": 0, "OPR": 0, "CON": 3, "PIO": 0, "GUA": 0, "CAT": 3, "ANL": 0, "DIP": 1, "DIS": 0, "CUR": 0, "SOV": 1, "WEA": 1}}, {"text": {"en": "'This person has a deep grasp of the data and trends in this space.'", "zh": "'这个人对这个领域的数据和趋势掌握得非常深'", "tw": "'這個人對這個領域的資料和趨勢掌握得非常深'"}, "scores": {"ARC": 1, "OPR": 0, "CON": 0, "PIO": 1, "GUA": 0, "CAT": 0, "ANL": 3, "DIP": 0, "DIS": 0, "CUR": 1, "SOV": 0, "WEA": 2}}]}, {"q": {"en": "Your team's morale is low after a key project failed. How do you bring them back?", "zh": "你的团队士气低落，原因是一个关键项目失败了。你会怎么带大家走出低谷？", "tw": "你的團隊士氣低落，原因是一個關鍵專案失敗了。你會怎麼帶大家走出低谷？"}, "opts": [{"text": {"en": "Organize a structured debrief — root causes, clear 'how to avoid this next time' framework", "zh": "组织一次复盘，把失败原因分析清楚，给大家一个明确的'下次如何避免'的框架", "tw": "組織一次覆盤，把失敗原因分析清楚，給大家一個明確的'下次如何避免'的框架"}, "scores": {"ARC": 3, "OPR": 0, "CON": 0, "PIO": 0, "GUA": 2, "CAT": 0, "ANL": 2, "DIP": 0, "DIS": 0, "CUR": 1, "SOV": 1, "WEA": 0}}, {"text": {"en": "Find a small, winnable next goal — rebuild confidence through a concrete win", "zh": "快速找到下一个可以快赢的小目标，让团队通过成功重建信心", "tw": "快速找到下一個可以快贏的小目標，讓團隊透過成功重建信心"}, "scores": {"ARC": 0, "OPR": 3, "CON": 0, "PIO": 2, "GUA": 0, "CAT": 1, "ANL": 0, "DIP": 0, "DIS": 1, "CUR": 0, "SOV": 2, "WEA": 0}}, {"text": {"en": "Have individual conversations with each person, make sure no one feels left behind", "zh": "分别找每个人聊，了解他们的真实状态，确保没有人被落下", "tw": "分別找每個人聊，瞭解他們的真實狀態，確保沒有人被落下"}, "scores": {"ARC": 0, "OPR": 0, "CON": 3, "PIO": 0, "GUA": 1, "CAT": 2, "ANL": 0, "DIP": 3, "DIS": 0, "CUR": 0, "SOV": 0, "WEA": 0}}, {"text": {"en": "Help the team reframe the failure as valuable learning — reconnect them to why moving forward matters", "zh": "引导大家把这次失败重新解读为一次有价值的学习，让他们看到向前走的意义", "tw": "引導大家把這次失敗重新解讀為一次有價值的學習，讓他們看到向前走的意義"}, "scores": {"ARC": 0, "OPR": 0, "CON": 1, "PIO": 1, "GUA": 0, "CAT": 3, "ANL": 0, "DIP": 1, "DIS": 0, "CUR": 0, "SOV": 1, "WEA": 2}}]}, {"q": {"en": "The company announces a major restructuring next month. Your first reaction?", "zh": "公司宣布下个月开始大规模流程重组。你第一反应是？", "tw": "公司宣佈下個月開始大規模流程重組。你第一反應是？"}, "opts": [{"text": {"en": "Immediately think about which systems will be affected, start designing transition plans", "zh": "马上想这次重组会影响哪些系统和流程，提前设计过渡方案", "tw": "馬上想這次重組會影響哪些系統和流程，提前設計過渡方案"}, "scores": {"ARC": 3, "OPR": 0, "CON": 0, "PIO": 0, "GUA": 3, "CAT": 0, "ANL": 1, "DIP": 0, "DIS": 0, "CUR": 1, "SOV": 1, "WEA": 0}}, {"text": {"en": "Look for opportunities to take on more important work — move fast to position yourself", "zh": "看这次重组有没有机会让我承担更重要的工作，快速卡位", "tw": "看這次重組有沒有機會讓我承擔更重要的工作，快速卡位"}, "scores": {"ARC": 0, "OPR": 2, "CON": 0, "PIO": 3, "GUA": 0, "CAT": 1, "ANL": 0, "DIP": 0, "DIS": 1, "CUR": 0, "SOV": 2, "WEA": 0}}, {"text": {"en": "Check in with colleagues — understand how people are actually feeling about the change", "zh": "去问同事他们的感受，了解大家对这次变化的真实态度", "tw": "去問同事他們的感受，瞭解大家對這次變化的真實態度"}, "scores": {"ARC": 0, "OPR": 0, "CON": 3, "PIO": 0, "GUA": 1, "CAT": 2, "ANL": 0, "DIP": 3, "DIS": 0, "CUR": 0, "SOV": 0, "WEA": 0}}, {"text": {"en": "'It's about time.' The existing processes had too many irrational elements — finally someone moved.", "zh": "'这早就该改了。'——现有流程有太多不合理的地方，终于有人动手了", "tw": "'這早就該改了。'——現有流程有太多不合理的地方，終於有人動手了"}, "scores": {"ARC": 0, "OPR": 0, "CON": 0, "PIO": 2, "GUA": 0, "CAT": 0, "ANL": 0, "DIP": 0, "DIS": 3, "CUR": 0, "SOV": 1, "WEA": 1}}]}, {"q": {"en": "You have an immature idea that could disrupt your team's workflow — or could fail. What do you do?", "zh": "你有一个还不成熟的想法，可能颠覆团队现有的工作方式，但也可能失败。你会？", "tw": "你有一個還不成熟的想法，可能顛覆團隊現有的工作方式，但也可能失敗。你會？"}, "opts": [{"text": {"en": "Fully develop the idea's logic, identify the biggest risks, prepare contingencies, then propose it", "zh": "先把想法完整地逻辑化，找出最大的风险点，做好预案后再提出", "tw": "先把想法完整地邏輯化，找出最大的風險點，做好預案後再提出"}, "scores": {"ARC": 3, "OPR": 0, "CON": 0, "PIO": 0, "GUA": 2, "CAT": 0, "ANL": 2, "DIP": 0, "DIS": 0, "CUR": 2, "SOV": 1, "WEA": 0}}, {"text": {"en": "Run a minimal quick test first — let results speak, then decide whether to scale", "zh": "先做一个最小化的快速验证，用结果说话，再决定是否推广", "tw": "先做一個最小化的快速驗證，用結果說話，再決定是否推廣"}, "scores": {"ARC": 0, "OPR": 3, "CON": 0, "PIO": 3, "GUA": 0, "CAT": 0, "ANL": 0, "DIP": 0, "DIS": 2, "CUR": 0, "SOV": 1, "WEA": 0}}, {"text": {"en": "Share it informally with a few trusted people, gauge reactions before raising formally", "zh": "先和你信任的几个人分享，听听反应，再决定是否正式提出", "tw": "先和你信任的幾個人分享，聽聽反應，再決定是否正式提出"}, "scores": {"ARC": 0, "OPR": 0, "CON": 3, "PIO": 1, "GUA": 0, "CAT": 2, "ANL": 0, "DIP": 2, "DIS": 0, "CUR": 0, "SOV": 0, "WEA": 1}}, {"text": {"en": "Do thorough research, find supporting data and external cases, then formally propose it", "zh": "做深入研究，找到支持这个想法的数据和外部案例，再正式提出", "tw": "做深入研究，找到支援這個想法的資料和外部案例，再正式提出"}, "scores": {"ARC": 1, "OPR": 0, "CON": 0, "PIO": 0, "GUA": 1, "CAT": 0, "ANL": 3, "DIP": 0, "DIS": 0, "CUR": 2, "SOV": 0, "WEA": 2}}]}, {"q": {"en": "You spot an emerging opportunity no one's noticing yet — but entering requires giving up some existing resources.", "zh": "你发现行业里有一个还没有人关注的新机会，但进入需要放弃现有的部分资源。你倾向于？", "tw": "你發現行業裡有一個還沒有人關注的新機會，但進入需要放棄現有的部分資源。你傾向於？"}, "opts": [{"text": {"en": "Map the full picture, assess entry costs and structural risks, then decide", "zh": "先把这个机会的全貌梳理出来，评估进入成本和结构性风险，再做决策", "tw": "先把這個機會的全貌梳理出來，評估進入成本和結構性風險，再做決策"}, "scores": {"ARC": 3, "OPR": 0, "CON": 0, "PIO": 0, "GUA": 2, "CAT": 0, "ANL": 2, "DIP": 0, "DIS": 0, "CUR": 1, "SOV": 1, "WEA": 1}}, {"text": {"en": "Make a quick tentative entry — small steps, fast feedback, scale up if it works", "zh": "先快速试探性地进入，小步快跑，看看反馈再决定是否加大投入", "tw": "先快速試探性地進入，小步快跑，看看反饋再決定是否加大投入"}, "scores": {"ARC": 0, "OPR": 2, "CON": 0, "PIO": 3, "GUA": 0, "CAT": 1, "ANL": 0, "DIP": 0, "DIS": 2, "CUR": 0, "SOV": 1, "WEA": 0}}, {"text": {"en": "Find a few people with experience in this space, use their judgment to supplement your own", "zh": "找几个在这个领域有经验的人聊聊，用他们的判断补充自己的视角", "tw": "找幾個在這個領域有經驗的人聊聊，用他們的判斷補充自己的視角"}, "scores": {"ARC": 0, "OPR": 0, "CON": 2, "PIO": 1, "GUA": 1, "CAT": 1, "ANL": 0, "DIP": 2, "DIS": 0, "CUR": 0, "SOV": 0, "WEA": 3}}, {"text": {"en": "Gather all available data, build a model, quantify the expected return on entry", "zh": "收集这个机会的所有可获取的数据，建立模型，量化进入的预期收益", "tw": "收集這個機會的所有可獲取的資料，建立模型，量化進入的預期收益"}, "scores": {"ARC": 1, "OPR": 0, "CON": 0, "PIO": 0, "GUA": 1, "CAT": 0, "ANL": 3, "DIP": 0, "DIS": 0, "CUR": 2, "SOV": 0, "WEA": 2}}]}, {"q": {"en": "A core product/process has run for five years. Everyone's used to it, but you think its underlying logic is fundamentally flawed.", "zh": "公司的一个核心产品/流程已经运行了五年，大家都习惯了，但你觉得它的底层逻辑有根本问题。你会？", "tw": "公司的一個核心產品/流程已經執行了五年，大家都習慣了，但你覺得它的底層邏輯有根本問題。你會？"}, "opts": [{"text": {"en": "Find out why it was designed this way, understand the history, then propose well-grounded improvements", "zh": "先找到这个产品/流程为什么被设计成这样，了解历史背景，再提出有依据的改进方案", "tw": "先找到這個產品/流程為什麼被設計成這樣，瞭解歷史背景，再提出有依據的改進方案"}, "scores": {"ARC": 3, "OPR": 0, "CON": 0, "PIO": 0, "GUA": 2, "CAT": 0, "ANL": 2, "DIP": 1, "DIS": 0, "CUR": 1, "SOV": 0, "WEA": 1}}, {"text": {"en": "Raise it directly with decision-makers: this needs a fundamental rebuild, the sooner the better", "zh": "直接向决策层提出：这个产品/流程需要从根本上重构，越快越好", "tw": "直接向決策層提出：這個產品/流程需要從根本上重構，越快越好"}, "scores": {"ARC": 0, "OPR": 1, "CON": 0, "PIO": 2, "GUA": 0, "CAT": 1, "ANL": 0, "DIP": 0, "DIS": 3, "CUR": 0, "SOV": 3, "WEA": 0}}, {"text": {"en": "Have informal discussions first, build consensus within the team before pushing", "zh": "先在团队内部做一些非正式的讨论，看有没有人有类似感受，形成共识后再推动", "tw": "先在團隊內部做一些非正式的討論，看有沒有人有類似感受，形成共識後再推動"}, "scores": {"ARC": 0, "OPR": 0, "CON": 2, "PIO": 0, "GUA": 1, "CAT": 1, "ANL": 0, "DIP": 3, "DIS": 0, "CUR": 0, "SOV": 0, "WEA": 1}}, {"text": {"en": "Gather user feedback and performance data — use external-facing evidence to drive internal change", "zh": "收集用户反馈和性能数据，用外部视角的证据来推动内部改变", "tw": "收集使用者反饋和效能資料，用外部視角的證據來推動內部改變"}, "scores": {"ARC": 1, "OPR": 0, "CON": 0, "PIO": 0, "GUA": 1, "CAT": 0, "ANL": 3, "DIP": 0, "DIS": 1, "CUR": 2, "SOV": 0, "WEA": 1}}]}, {"q": {"en": "You need to become 'reasonably competent' in a completely unknown field in 2 weeks. How do you learn?", "zh": "你需要在2周内在一个完全未知的新领域变成'还不错'的人。你会怎么学？", "tw": "你需要在2周內在一個完全未知的新領域變成'還不錯'的人。你會怎麼學？"}, "opts": [{"text": {"en": "Find the core frameworks and underlying logic first — build the skeleton, then fill in details", "zh": "先找到这个领域最核心的框架和底层逻辑，把结构搭起来，再往里面填细节", "tw": "先找到這個領域最核心的框架和底層邏輯，把結構搭起來，再往裡面填細節"}, "scores": {"ARC": 3, "OPR": 0, "CON": 0, "PIO": 1, "GUA": 1, "CAT": 0, "ANL": 2, "DIP": 0, "DIS": 0, "CUR": 2, "SOV": 0, "WEA": 1}}, {"text": {"en": "Find the most hands-on task available and just start — learn what you need when you need it", "zh": "找这个领域最快能上手的实操任务，直接做，遇到不懂的再学", "tw": "找這個領域最快能上手的實操任務，直接做，遇到不懂的再學"}, "scores": {"ARC": 0, "OPR": 3, "CON": 0, "PIO": 3, "GUA": 0, "CAT": 0, "ANL": 0, "DIP": 0, "DIS": 2, "CUR": 0, "SOV": 1, "WEA": 0}}, {"text": {"en": "Find 3–5 people in the field and ask them directly — use their experience to compress your learning curve", "zh": "找3-5个这个领域里的人，向他们请教，用他们的经验快速压缩学习曲线", "tw": "找3-5個這個領域裡的人，向他們請教，用他們的經驗快速壓縮學習曲線"}, "scores": {"ARC": 0, "OPR": 0, "CON": 3, "PIO": 1, "GUA": 0, "CAT": 2, "ANL": 0, "DIP": 2, "DIS": 0, "CUR": 0, "SOV": 0 const PARTNER_WHY = {"ARC": {"OPR": {"en": "Executes the systems you design without needing them to be perfect first.", "zh": "不用等方案完美就能执行你设计的系统。", "tw": "不用等方案完美就能執行你設計的系統。"}, "PIO": {"en": "Brings the bold direction you can build structure around.", "zh": "带来你可以为之搭建结构的大胆方向。", "tw": "帶來你可以為之搭建結構的大膽方向。"}, "ANL": {"en": "Validates your frameworks with data before you over-engineer them.", "zh": "在你过度设计之前，用数据验证你的框架。", "tw": "在你過度設計之前，用資料驗證你的框架。"}}, "OPR": {"ARC": {"en": "Provides the blueprint so your execution has direction.", "zh": "提供蓝图，让你的执行有方向。", "tw": "提供藍圖，讓你的執行有方向。"}, "PIO": {"en": "Generates the opportunities worth executing on.", "zh": "生成值得执行的机会。", "tw": "生成值得執行的機會。"}, "ANL": {"en": "Tells you whether what you're executing actually matters.", "zh": "告诉你正在执行的事是否真的重要。", "tw": "告訴你正在執行的事是否真的重要。"}}, "CON": {"SOV": {"en": "Gives your network gravitational pull — people follow the Sovereign.", "zh": "给你的人脉以重力——人们跟随主权者。", "tw": "給你的人脈以重力——人們跟隨主權者。"}, "CAT": {"en": "Amplifies your warmth into collective energy.", "zh": "把你的温度放大成集体能量。", "tw": "把你的溫度放大成集體能量。"}, "DIP": {"en": "Extends your reach into conflict zones you avoid.", "zh": "把你的触角延伸到你回避的冲突地带。", "tw": "把你的觸角延伸到你迴避的衝突地帶。"}}, "PIO": {"OPR": {"en": "Turns your instincts into shipped products — the finisher you aren't.", "zh": "把你的直觉变成发出去的产品——你欠缺的收尾者。", "tw": "把你的直覺變成發出去的產品——你欠缺的收尾者。"}, "ARC": {"en": "Builds the infrastructure your ideas need to survive contact with reality.", "zh": "为你的想法搭建在现实中存活所需的基础设施。", "tw": "為你的想法搭建在現實中存活所需的基礎設施。"}, "WEA": {"en": "Connects your vision to adjacent worlds you haven't reached yet.", "zh": "把你的愿景连到你还没触及的相邻世界。", "tw": "把你的願景連到你還沒觸及的相鄰世界。"}}, "GUA": {"PIO": {"en": "Brings the bold bets that justify your risk management.", "zh": "带来值得你做风险管理的大胆下注。", "tw": "帶來值得你做風險管理的大膽下注。"}, "ANL": {"en": "Gives your caution a data foundation rather than just instinct.", "zh": "给你的谨慎一个数据基础，而不只是直觉。", "tw": "給你的謹慎一個資料基礎，而不只是直覺。"}, "DIP": {"en": "Handles the human side of stability you sometimes neglect.", "zh": "处理你有时忽略的、稳定中属于人的那一面。", "tw": "處理你有時忽略的、穩定中屬於人的那一面。"}}, "CAT": {"GUA": {"en": "Provides the safety net that lets your ignition sustain.", "zh": "提供让你的点火得以持续的安全网。", "tw": "提供讓你的點火得以持續的安全網。"}, "OPR": {"en": "Converts your momentum into measurable outcomes.", "zh": "把你的势头转化成可衡量的成果。", "tw": "把你的勢頭轉化成可衡量的成果。"}, "WEA": {"en": "Connects your energy to networks and contexts you can't reach alone.", "zh": "把你的能量连到你独自触及不到的网络与情境。", "tw": "把你的能量連到你獨自觸及不到的網路與情境。"}}, "ANL": {"OPR": {"en": "Acts on your findings before the window closes.", "zh": "在窗口关上前对你的发现采取行动。", "tw": "在視窗關上前對你的發現採取行動。"}, "ARC": {"en": "Builds systems to operationalize your insights.", "zh": "把你的洞察搭建成可运转的系统。", "tw": "把你的洞察搭建成可運轉的系統。"}, "CUR": {"en": "Filters the signal you've found into what's worth acting on.", "zh": "把你找到的信号筛成值得行动的东西。", "tw": "把你找到的訊號篩成值得行動的東西。"}}};
const TENSION_WHY = {"ARC": {"DIS": {"en": "You build systems; they destroy them. Productive only when you've agreed on what needs rebuilding.", "zh": "你搭系统，他们拆系统。只有先就'什么该重建'达成一致，才有建设性。", "tw": "你搭系統，他們拆系統。只有先就'什麼該重建'達成一致，才有建設性。"}}, "OPR": {"DIP": {"en": "You move fast; they want everyone aligned first. The friction is real but the outcome is better.", "zh": "你跑得快，他们想先让所有人对齐。摩擦是真的，但结果更好。", "tw": "你跑得快，他們想先讓所有人對齊。摩擦是真的，但結果更好。"}}, "CON": {"ANL": {"en": "You lead with feeling; they lead with data. The tension keeps both honest.", "zh": "你以感受为先，他们以数据为先。这份张力让双方都保持诚实。", "tw": "你以感受為先，他們以資料為先。這份張力讓雙方都保持誠實。"}}, "PIO": {"GUA": {"en": "You move before the map exists; they need the map first. Neither is wrong — time the tension.", "zh": "你在地图出现之前就行动，他们要先有地图。谁都没错——把握张力的时机。", "tw": "你在地圖出現之前就行動，他們要先有地圖。誰都沒錯——把握張力的時機。"}}, "GUA": {"DIS": {"en": "You preserve what works; they question whether anything should be preserved.", "zh": "你保护有效的东西，他们质疑是否有任何东西该被保护。", "tw": "你保護有效的東西，他們質疑是否有任何東西該被保護。"}}, "CAT": {"ANL": {"en": "Your energy resists quantification; their instinct is to measure everything.", "zh": "你的能量抗拒被量化，他们的本能是测量一切。", "tw": "你的能量抗拒被量化，他們的本能是測量一切。"}}, "DIP": {"DIS": {"en": "You build consensus; they dismantle whatever the consensus built.", "zh": "你建立共识，他们拆掉共识建起的东西。", "tw": "你建立共識，他們拆掉共識建起的東西。"}}, "DIS": {"GUA": {"en": "You challenge every constraint; they see constraints as load-bearing walls.", "zh": "你挑战每一条约束，他们把约束看作承重墙。", "tw": "你挑戰每一條約束，他們把約束看作承重牆。"}, "DIP": {"en": "You act; they align. The lag is a feature sometimes, a bug others.", "zh": "你行动，他们对齐。这个时间差有时是特性，有时是缺陷。", "tw": "你行動，他們對齊。這個時間差有時是特性，有時是缺陷。"}}, "CUR": {"PIO": {"en": "You want the best option; they want to move before the best option is clear.", "zh": "你想要最好的选项，他们想在最好的选项明朗之前就行动。", "tw": "你想要最好的選項，他們想在最好的選項明朗之前就行動。"}}, "SOV": {"DIS": {"en": "Two people who don't like being told what to do, in the same room.", "zh": "两个都不喜欢被人指挥的人，待在同一个房间里。", "tw": "兩個都不喜歡被人指揮的人，待在同一個房間裡。"}}, "WEA": {"GUA": {"en": "Your cross-domain fluidity unsettles their need for proven paths.", "zh": "你的跨域流动性，扰动了他们对已验证路径的需要。", "tw": "你的跨域流動性，擾動了他們對已驗證路徑的需要。"}}};

const GEMINI_MODEL = 'gemini-2.5-flash';

function langInstruction(){
  if(S.lang==='zh') return '所有输出内容使用简体中文。';
  if(S.lang==='tw') return '所有輸出內容使用繁體中文（台灣用語）。';
  return 'ALL output content MUST be in English. Do not use Chinese in any field values.';
}

async function callGeminiParts(parts, maxTokens=4096){
  const key = window.__geminiKey;
  if(!key) throw new Error('NO_KEY');
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`;
  const isTextOnly = parts.every(p => !p.inline_data);
  const res = await fetch(url, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      contents:[{ role:'user', parts }],
      generationConfig:{
        temperature:0.2, maxOutputTokens:maxTokens,
        thinkingConfig:{ thinkingBudget:0 },
        ...(isTextOnly ? { responseMimeType:'application/json' } : {}),
      },
    }),
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}
async function callGemini(prompt, maxTokens=2048){ return callGeminiParts([{text:prompt}], maxTokens); }

async function extractRawTextFromFile(content){
  const parts = buildParts(content, 'Extract ALL text content from this resume completely, preserving structure. Output plain text only, no summary or modification.');
  const key = window.__geminiKey;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`;
  const res = await fetch(url, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ contents:[{role:'user',parts}], generationConfig:{ temperature:0, maxOutputTokens:4096 } }),
  });
  const data = await res.json();
  if(data.error) throw new Error('Text extraction failed: '+data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

function cleanJSON(raw){
  let s = raw.trim();
  s = s.replace(/^```(?:json)?\s*/i,'').replace(/\s*```\s*$/i,'').trim();
  const st = s.indexOf('{'); const en = s.lastIndexOf('}');
  if(st!==-1 && en>st) s = s.slice(st, en+1);
  s = s.replace(/\/\/[^\n\r"]*/g,'').replace(/\/\*[\s\S]*?\*\//g,'');
  s = s.replace(/[\u201c\u201d\u201e\u201f\u275d\u275e]/g,'"');
  s = s.replace(/[\u2018\u2019\u201a\u201b\u275b\u275c]/g,"'");
  { let out='', inStr=false, embDepth=0, i=0;
    while(i<s.length){ const ch=s[i];
      if(!inStr){ if(ch==='"'){inStr=true;embDepth=0;out+=ch;i++;} else {out+=ch;i++;} }
      else { if(ch==='\\'){out+=ch+(s[i+1]||'');i+=2;}
        else if(ch==='"'){ const next=s[i+1]||'';
          if(embDepth>0){out+="'";embDepth--;i++;}
          else if(/[a-zA-Z0-9\u4e00-\u9fff(']/.test(next)){out+="'";embDepth++;i++;}
          else {out+='"';inStr=false;i++;} }
        else if(ch==='\n'){out+='\\n';i++;}
        else if(ch==='\r'){out+='\\r';i++;}
        else if(ch==='\t'){out+='\\t';i++;}
        else {out+=ch;i++;} } }
    s=out; }
  s = s.replace(/:\s*(?:string|number|boolean|array|object)(?:\|(?:string|number|boolean|null))*\b/g,': null');
  s = s.replace(/"(?:string|number|boolean|array|object)(?:\|(?:string|number|boolean|null))*"/g,'null');
  s = s.replace(/,(\s*[}\]])/g,'$1');
  s = s.replace(/:\s*undefined\b/g,': null');
  s = s.replace(/(?<!['\w])([a-zA-Z_][a-zA-Z0-9_]*)\s*:/g,'"$1":');
  s = s.replace(/""([a-zA-Z_][a-zA-Z0-9_]*)"":/g,'"$1":');
  s = s.replace(/:\s*'([^'"]*)'/g,': "$1"');
  return s;
}
function safeParseJSON(raw, label){
  const cleaned = cleanJSON(raw);
  try { return JSON.parse(cleaned); }
  catch(e1){
    const pos = parseInt(e1.message.match(/position (\d+)/)?.[1] || '0');
    try {
      let candidate = cleaned.slice(0,pos), depth=0, cutAt=-1;
      for(let i=candidate.length-1;i>=0;i--){ const c=candidate[i];
        if(c==='}') depth++; if(c==='{'){ depth--; if(depth<0){cutAt=i;break;} } }
      if(cutAt>=0){ let d2=0;
        for(let i=cutAt;i<cleaned.length;i++){ if(cleaned[i]==='{')d2++; if(cleaned[i]==='}'){d2--; if(d2===0){ return JSON.parse(cleanJSON(cleaned.slice(cutAt,i+1))); } } } }
    } catch(e2){}
    try { const errorLine=(e1.message.match(/line (\d+)/)?.[1]||0)-1;
      if(errorLine>0){ const lines=cleaned.split('\n'); lines.splice(errorLine,1); return JSON.parse(cleanJSON(lines.join('\n'))); } } catch(e3){}
    throw new Error(label+' parse failed: '+e1.message);
  }
}

async function extractFileContent(file){
  const ext = file.name.split('.').pop().toLowerCase();
  if(ext==='pdf') return { type:'pdf', data: await fileToBase64(file) };
  if(['png','jpg','jpeg'].includes(ext)) return { type:'image', mime: ext==='png'?'image/png':'image/jpeg', data: await fileToBase64(file) };
  if(['doc','docx'].includes(ext)) return { type:'text', data: await extractDocxText(file) };
  return { type:'text', data: await file.text() };
}
function buildParts(content, instruction){
  if(content.type==='pdf') return [{ inline_data:{ mime_type:'application/pdf', data:content.data } }, { text:instruction }];
  if(content.type==='image') return [{ inline_data:{ mime_type:content.mime, data:content.data } }, { text:instruction }];
  return [{ text:`${instruction}\n\nResume content:\n${content.data.slice(0,5000)}` }];
}
function fileToBase64(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(file); }); }
async function extractDocxText(file){
  if(!window.mammoth){ await new Promise((res,rej)=>{ const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }
  const ab = await file.arrayBuffer();
  const r = await window.mammoth.extractRawText({ arrayBuffer: ab });
  return r.value || '';
}

function buildStageDefs(){
  const lang = langInstruction();
  return [
    { id:'basic', maxTokens:2048,
      schema:`Extract basic info only. Output JSON (use null for missing fields):
{"name":"","email":null,"location":null,"currentTitle":null,"totalYears":0,"startupExperience":false,"summary":"Core differentiating traits in 80 chars max","education":[{"school":"","degree":"","major":"","yearStart":null,"yearEnd":null}]}`,
      preamble:(t)=> t==='pdf' ? `This is a resume PDF. Extract candidate basic info, summary and education. Use null for missing. ${lang}`
        : t==='image' ? `This is a resume image. OCR all text, extract basic info, summary and education. Use null for missing. ${lang}`
        : `You are a resume parser. Extract basic info, summary and education. Use null for missing. ${lang}` },
    { id:'exp', maxTokens:3072,
      schema:`Extract work experience. description: max 80 chars single line of key responsibilities and achievements. Output JSON:
{"experience":[{"company":"","title":"","industry":"","yearStart":0,"yearEnd":0,"description":"Key achievements max 80 chars","isStartup":false,"scale":""}]}`,
      preamble:(t)=> t==='pdf' ? `This is a resume PDF. Extract all work experience. description: key achievements max 80 chars single line. ${lang}`
        : t==='image' ? `This is a resume image. OCR all text. Extract work experience. description max 80 chars. ${lang}`
        : `You are a resume parser. Extract all work experience. description max 80 chars single line. ${lang}` },
    { id:'skills', maxTokens:3072,
      schema:`Extract skills. Output JSON (empty array if none):
{"hardSkills":[],"softSkills":[],"languages":[],"tools":[],"industries":[]}`,
      preamble:(t)=> t==='pdf' ? `This is a resume PDF. Extract hard skills, soft skills, languages, tools and industries. Output only valid JSON. ${lang}`
        : t==='image' ? `This is a resume image. OCR all text. Extract skills, languages, tools, industries. Output only valid JSON. ${lang}`
        : `You are a resume parser. Extract hard skills, soft skills, languages, tools, industries. Output only valid JSON. ${lang}` },
  ];
}

async function parseResumeProgressive(input, onStageUpdate){
  let content = typeof input==='string' ? { type:'text', data:input } : await extractFileContent(input);
  let rawText = typeof input==='string' ? input : '';
  if(content.type==='pdf' || content.type==='image'){
    onStageUpdate('basic','loading',null);
    try { rawText = await extractRawTextFromFile(content); content = { type:'text', data:rawText }; }
    catch(e){ console.warn('text extract fallback', e.message); }
  } else { rawText = content.data; }
  const stageDefs = buildStageDefs();
  const collected = {};
  await Promise.all(stageDefs.map(async (stage)=>{
    try {
      const instruction = stage.preamble(content.type) + '\n\n' + stage.schema;
      const parts = buildParts(content, instruction);
      const raw = await callGeminiParts(parts, stage.maxTokens);
      const parsed = safeParseJSON(raw, stage.id);
      collected[stage.id] = parsed;
      onStageUpdate(stage.id,'done',parsed);
    } catch(e){ onStageUpdate(stage.id,'error',null,e.message); }
  }));
  // Assemble unified structure
  const b = collected.basic || {};
  const sk = collected.skills || {};
  const unified = {
    basic: { name:b.name||S.intake.name||'', email:b.email||S.intake.email||null, location:b.location||null,
             currentTitle:b.currentTitle||null, totalYears:b.totalYears||0, startupExperience:!!b.startupExperience,
             summary:b.summary||'', education:b.education||[] },
    exp: { experience:(collected.exp&&collected.exp.experience)||[] },
    skills: { hardSkills:sk.hardSkills||[], softSkills:sk.softSkills||[], languages:sk.languages||[], tools:sk.tools||[], industries:sk.industries||[] },
  };
  S.resume = unified; S.resumeText = rawText;
  return unified;
}

// ── Helper: flatten unified resume to a "person" object for prompts ──────────
function personFromResume(){
  const r = S.resume || { basic:{}, exp:{}, skills:{} };
  return {
    name: r.basic.name, currentTitle: r.basic.currentTitle, totalYears: r.basic.totalYears,
    location: r.basic.location, summary: r.basic.summary,
    experience: r.exp.experience || [],
    hardSkills: r.skills.hardSkills || [], softSkills: r.skills.softSkills || [],
    industries: r.skills.industries || [], languages: r.skills.languages || [], tools: r.skills.tools || [],
    education: r.basic.education || [],
  };
}

// ── computeDualType ──────────────────────────────────────────────────────────
// Returns: { primaryId, secondaryId, axisBias, innerOppositeId,
//            comboName, axisKey, axisInfo }
function computeDualType(pcts) {
  // Step 1: Primary = highest score
  const sorted = Object.entries(pcts).sort((a,b)=>b[1]-a[1]);
  const primaryId = sorted[0][0];
  const innerOppositeId = AXIS_MAP[primaryId];

  // Step 2: Axis bias
  const pPct = pcts[primaryId]  || 0;
  const oPct = pcts[innerOppositeId] || 0;
  const axisBias = Math.round(pPct / (pPct + oPct) * 100);

  // Step 3: Secondary = biggest gap in remaining 5 axes
  let bestSecId = null, bestGap = -1;
  for (const [a, b] of AXES) {
    if (a === primaryId || b === primaryId) continue;
    const gap = Math.abs((pcts[a]||0) - (pcts[b]||0));
    if (gap > bestGap) {
      bestGap = gap;
      bestSecId = (pcts[a]||0) >= (pcts[b]||0) ? a : b;
    }
  }

  // Step 4: Build display name
  const lang = S.lang || 'en';
  const adj  = (ADJ[lang] || ADJ.en)[bestSecId] || '';
  const priArch = ARCHETYPES.find(a=>a.id===primaryId);
  const priName = L(priArch.name).replace(/^The\s+/i,'');
  const comboName = lang==='en'
    ? adj + ' ' + priName
    : adj + '·' + priName;

  // Step 5: Axis info
  const axisKey  = getAxisKey(primaryId);
  const axisInfo = AXIS_META[axisKey] || {};

  // Step 6: Tier label
  const tier = priArch.tier;
  let rarityFlag = '';
  if (tier==='rare')   rarityFlag = '◆ Rare · ';
  if (tier==='scarce') rarityFlag = '◇ ';

  return { primaryId, secondaryId:bestSecId, axisBias,
           innerOppositeId, comboName, axisKey, axisInfo,
           rarityFlag, tier };
}

// ── computeCompatibility ─────────────────────────────────────────────────────
// C(X,Y) = C_comp×0.6 + C_dyn×0.4
// C_comp = complementScore×0.7 + similarityScore×0.3
// C_dyn  = base 50 + synergy bonuses; high-tension flagged not penalised
function computeCompatibility(userDual, partnerDual, userPct, partnerPct) {
  const ids = ARCHETYPES.map(a=>a.id);

  // C_comp: complementarity
  const userSorted = ids.slice().sort((a,b)=>(userPct[a]||0)-(userPct[b]||0));
  const weakest3 = userSorted.slice(0,3);
  const complementScore = weakest3.reduce((s,id)=>s+(partnerPct[id]||0),0) / 3;

  const simNumerator = ids.reduce((s,id)=>s+Math.abs((userPct[id]||0)-(partnerPct[id]||0)),0);
  const similarityScore = Math.max(0, 100 - simNumerator/12);

  const C_comp = complementScore*0.7 + similarityScore*0.3;

  // C_dyn
  let C_dyn = 50;
  if (partnerDual.primaryId===userDual.secondaryId ||
      userDual.primaryId===partnerDual.secondaryId) C_dyn += 20;
  if (partnerDual.secondaryId===userDual.primaryId ||
      userDual.secondaryId===partnerDual.primaryId) C_dyn += 15;
  C_dyn = Math.min(100, C_dyn);

  // High tension flag (no penalty)
  const isHighTension = AXIS_MAP[userDual.primaryId] === partnerDual.primaryId;

  const score = Math.min(100, Math.round(C_comp*0.6 + C_dyn*0.4));
  return { score, isHighTension };
}

// ── STAR CHART (sqrt scale) ──────────────────────────────────────────────────
const TIER_COL={ common:{stroke:'#4A7C59',fill:'rgba(74,124,89,0.08)'}, scarce:{stroke:'#C9A84C',fill:'rgba(201,168,76,0.07)'}, rare:{stroke:'#B08EC8',fill:'rgba(176,142,200,0.08)'} };
function buildStarChart(svgId, norm, R){
  const svg=document.getElementById(svgId); if(!svg)return; svg.innerHTML='';
  const sorted2=ARCHETYPES.map(a=>({a,pct:norm[a.id]})).sort((x,y)=>y.pct-x.pct);
  const pTier=sorted2[0].a.tier;
  function polar(deg,r){ const a=(deg-90)*Math.PI/180; return [Math.cos(a)*r,Math.sin(a)*r]; }
  function ns(t){ return document.createElementNS('http://www.w3.org/2000/svg',t); }
  function sqrtR(pct){ return Math.sqrt(Math.max(0,pct)/100)*R; }
  [[0.245,6],[0.5,25],[0.748,56],[1,100]].forEach(([frac,label])=>{
    const pts=ARCHETYPES.map((_,i)=>{ const [x,y]=polar(i*30,R*frac); return `${x.toFixed(1)},${y.toFixed(1)}`; }).join(' ');
    const p=ns('polygon'); p.setAttribute('points',pts); p.setAttribute('fill','none');
    p.setAttribute('stroke',frac===1?'rgba(201,168,76,0.16)':'rgba(255,255,255,0.05)');
    p.setAttribute('stroke-width',frac===1?'0.8':'0.4');
    if(frac<1)p.setAttribute('stroke-dasharray','2 3'); svg.appendChild(p);
    if(frac<1){ const [lx,ly]=polar(0,R*frac-5); const t=ns('text');
      t.setAttribute('x',lx.toFixed(1)); t.setAttribute('y',(ly-3).toFixed(1)); t.setAttribute('text-anchor','middle');
      t.setAttribute('font-family',"'DM Mono',monospace"); t.setAttribute('font-size','5'); t.setAttribute('fill','rgba(255,255,255,0.18)');
      t.textContent=label+'%'; svg.appendChild(t); }
  });
  ARCHETYPES.forEach((a,i)=>{ const [x,y]=polar(i*30,R); const l=ns('line');
    l.setAttribute('x1','0');l.setAttribute('y1','0');l.setAttribute('x2',x.toFixed(1));l.setAttribute('y2',y.toFixed(1));
    l.setAttribute('stroke',TIER_COL[a.tier].stroke);l.setAttribute('stroke-width','0.4');l.setAttribute('opacity','0.25');svg.appendChild(l); });
  const pts=ARCHETYPES.map((a,i)=>polar(i*30,sqrtR(norm[a.id])));
  const ptStr=pts.map(p=>`${p[0].toFixed(2)},${p[1].toFixed(2)}`).join(' ');
  const fp=ns('polygon'); fp.setAttribute('points',ptStr); fp.setAttribute('fill',TIER_COL[pTier].fill); svg.appendChild(fp);
  pts.forEach((p,i)=>{ const pct=norm[ARCHETYPES[i].id]; const op=0.1+(pct/100)*0.82; const sw=0.3+(pct/100)*2.2;
    const l=ns('line'); l.setAttribute('x1','0');l.setAttribute('y1','0');l.setAttribute('x2',p[0].toFixed(2));l.setAttribute('y2',p[1].toFixed(2));
    l.setAttribute('stroke',TIER_COL[ARCHETYPES[i].tier].stroke); l.setAttribute('stroke-width',sw.toFixed(2)); l.setAttribute('opacity',op.toFixed(2)); l.setAttribute('stroke-linecap','round'); svg.appendChild(l); });
  ARCHETYPES.forEach((a,i)=>{ const [dx,dy]=polar(i*30,sqrtR(norm[a.id])); const d=ns('circle');
    d.setAttribute('cx',dx.toFixed(2));d.setAttribute('cy',dy.toFixed(2));d.setAttribute('r', (1+(norm[a.id]/100)*2.5).toFixed(2));
    d.setAttribute('fill',TIER_COL[a.tier].stroke); svg.appendChild(d); });
  ARCHETYPES.forEach((a,i)=>{ const angle=i*30; const LR=R+18; const [lx,ly]=polar(angle,LR); const pct=norm[a.id]; const isTop=pct>=9;
    const t=ns('text'); t.setAttribute('x',lx.toFixed(1));t.setAttribute('y',ly.toFixed(1)); t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');
    t.setAttribute('font-family',"'DM Mono',monospace"); t.setAttribute('font-size',isTop?'8.5':'7.5'); t.setAttribute('font-weight',isTop?'600':'400');
    t.setAttribute('fill',isTop?TIER_COL[a.tier].stroke:'rgba(255,255,255,0.2)'); t.textContent=a.name.en.replace('The ','').toUpperCase(); svg.appendChild(t);
    if(isTop){ const [px,py]=polar(angle,LR+11); const t2=ns('text'); t2.setAttribute('x',px.toFixed(1));t2.setAttribute('y',py.toFixed(1));
      t2.setAttribute('text-anchor','middle');t2.setAttribute('dominant-baseline','middle');t2.setAttribute('font-family',"'DM Mono',monospace");t2.setAttribute('font-size','7');
      t2.setAttribute('fill',TIER_COL[a.tier].stroke);t2.setAttribute('opacity','0.65'); t2.textContent=Math.round(pct)+'%'; svg.appendChild(t2); } });
}

// Question definitions per stage. type: 'text'|'voice'|'number'. followup:true => AI asks 1.
function guidedSteps(){

      {key:'skills', label:'g_q_skills', ph:'g_q_skills_ph', type:'text'},
      {key:'others', label:'g_q_others', ph:'g_q_others_ph', type:'voice', followup:true},
    ]},

function startGuided(){ S.guided={}; S.guidedExp=[{company:'',title:'',time:'',desc:'',descFu:'',fuAsked:false,_fuQ:''}]; S.guidedExpIdx=0; S.guidedStep=0; showScreen('s-guided'); renderGuidedStep(); }
function renderGuidedStep(){
  const steps=guidedSteps(); const step=steps[S.guidedStep];
  // stage pills
  document.getElementById('guided-pills').innerHTML = steps.map((s,i)=>
    `<span class="g-pill ${i===S.guidedStep?'active':i<S.guidedStep?'done':''}">${i+1}. ${T(s.stage)}</span>`).join('');
  if(step.exp){ renderExpStep(); return; }
  const body=document.getElementById('guided-body'); body.innerHTML='';
  step.items.forEach(it=>{
    const wrap=document.createElement('div'); wrap.className='g-field';
    wrap.innerHTML=`<label class="g-label">${T(it.label)}</label>`;
    if(it.type==='number'){
      const inp=document.createElement('input'); inp.type='number'; inp.className='g-input'; inp.id='g-'+it.key;
      inp.placeholder=T(it.ph); inp.value=S.guided[it.key]||''; inp.oninput=()=>{S.guided[it.key]=inp.value;};
      wrap.appendChild(inp);
    } else if(it.type==='voice'){
      const va=makeVoiceTextarea('g-'+it.key, T(it.ph), S.guided[it.key]||'', v=>{S.guided[it.key]=v;});
      wrap.appendChild(va);
    } else {
      const inp=document.createElement('input'); inp.type='text'; inp.className='g-input'; inp.id='g-'+it.key;
      inp.placeholder=T(it.ph); inp.value=S.guided[it.key]||''; inp.oninput=()=>{S.guided[it.key]=inp.value;};
      wrap.appendChild(inp);
    }
    // followup slot
    if(it.followup){
      const fu=document.createElement('div'); fu.className='g-followup'; fu.id='fu-'+it.key; fu.style.display='none';
      wrap.appendChild(fu);
    }
    body.appendChild(wrap);
  });
  const nav=document.getElementById('guided-nav');
  const isLast=S.guidedStep===steps.length-1;
  nav.innerHTML=`
    ${S.guidedStep>0?`<button class="btn-nav mono" onclick="guidedPrev()">${T('back_btn')}</button>`:'<span></span>'}
    <button class="btn-next mono" id="g-next-btn" onclick="guidedNext()">${isLast?T('g_next'):T('g_next')}</button>`;
}
async function maybeFollowup(){
  const steps=guidedSteps(); const step=steps[S.guidedStep];
  for(const it of step.items){
    if(it.followup && !S.guided['_fu_'+it.key]){
      const ans=S.guided[it.key]||'';
      if(ans.trim().length<8) continue;
      const slot=document.getElementById('fu-'+it.key); if(!slot)continue;
      slot.style.display='block';
      slot.innerHTML=`<div class="g-fu-q mono"><span class="spinner-sm"></span> ${T('g_thinking')}</div>`;
      const q = await aiFollowup(T(it.label), ans);
      S.guided['_fu_'+it.key]=true;
      if(q){
        slot.innerHTML=`<div class="g-fu-q"><span class="g-fu-tag mono">${T('g_followup')}</span> ${q}</div>`;
        const va=makeVoiceTextarea('g-'+it.key+'-fu', T(it.ph), S.guided[it.key+'_fu']||'', v=>{S.guided[it.key+'_fu']=v;}, 2);
        slot.appendChild(va);
        return true; // stop to let user answer follow-up
      } else { slot.style.display='none'; }
    }
  }
  return false;
}
async function guidedNext(){
  if(!requireKey())return;
  // try a follow-up first (non-blocking flow: if shown, user answers then clicks next again)
  const btn=document.getElementById('g-next-btn');
  btn.disabled=true; const orig=btn.textContent; btn.innerHTML=`<span class="spinner-sm"></span>`;
  let shown=false;
  try { shown = await maybeFollowup(); } catch(e){}
  btn.disabled=false; btn.textContent=orig;
  if(shown) return;
  const steps=guidedSteps();
  if(S.guidedStep<steps.length-1){ S.guidedStep++; renderGuidedStep(); }
  else finishGuided();
}
function guidedPrev(){ if(S.guidedStep>0){ S.guidedStep--; renderGuidedStep(); } }

function renderExpNav(idx){
  const nav=document.getElementById('guided-nav');
  const left = idx>0
    ? `<button class="btn-nav mono" onclick="expPrevCard()">${T('g_exp_prev_card')}</button>`
    : (S.guidedStep>0?`<button class="btn-nav mono" onclick="guidedPrev()">${T('back_btn')}</button>`:'<span></span>');
  let right='';
  if(idx < S.guidedExp.length-1){
    right=`<button class="btn-next mono" id="g-next-btn" onclick="expAdvance('card')">${T('g_exp_next_card')}</button>`;
  } else {
    const addBtn = S.guidedExp.length<3 ? `<button class="btn-add mono" id="g-add-btn" onclick="expAdvance('add')">${T('g_exp_add')}</button>` : '';
    right=`${addBtn}<button class="btn-next mono" id="g-next-btn" onclick="expAdvance('next')">${T('g_next')}</button>`;
  }
  nav.innerHTML=`${left}<div class="g-nav-right">${right}</div>`;
}
function expPrevCard(){ if(S.guidedExpIdx>0){ S.guidedExpIdx--; renderGuidedStep(); } }
function validateCurrentExpCard(){
  const c=S.guidedExp[S.guidedExpIdx];
  return !!(c && c.company && c.company.trim() && c.title && c.title.trim() && c.desc && c.desc.trim());
}
function isShortDesc(t){
  t=(t||'').trim();
  if(S.lang==='en') return t.split(/\s+/).filter(Boolean).length < 15;
  return t.length < 20;
}
async function maybeExpFollowup(){
  const card=S.guidedExp[S.guidedExpIdx];
  if(!card || card.fuAsked) return false;
  const d=(card.desc||'').trim();
  if(d.length<2 || !isShortDesc(d)) return false; // only when description is short
  const slot=document.getElementById('fu-exp'); if(!slot) return false;
  slot.style.display='block';
  slot.innerHTML=`<div class="g-fu-q mono"><span class="spinner-sm"></span> ${T('g_thinking')}</div>`;
  const q = await aiFollowup(T('g_q_edesc')+' @ '+(card.title||card.company||''), d);
  card.fuAsked=true;
  if(q){
    card._fuQ=q;
    slot.innerHTML=`<div class="g-fu-q"><span class="g-fu-tag mono">${T('g_followup')}</span> ${q}</div>`;
    const va=makeVoiceTextarea('g-exp-fu', T('g_q_edesc_ph'), card.descFu||'', v=>{card.descFu=v;}, 2);
    slot.appendChild(va);
    return true; // stop to let user answer
  } else { slot.style.display='none'; }
  return false;
}
async function expAdvance(action){
  if(!requireKey())return;
  const warn=document.getElementById('exp-warn');
  if(!validateCurrentExpCard()){ if(warn) warn.style.display='block'; return; }
  if(warn) warn.style.display='none';
  const btn=document.getElementById('g-next-btn'); let orig;
  if(btn){ orig=btn.textContent; btn.disabled=true; btn.innerHTML=`<span class="spinner-sm"></span>`; }
  let shown=false;
  try { shown = await maybeExpFollowup(); } catch(e){}
  if(btn){ btn.disabled=false; btn.textContent=orig; }
  if(shown) return;
  if(action==='card'){ S.guidedExpIdx++; renderGuidedStep(); }
  else if(action==='add'){ S.guidedExp.push({company:'',title:'',time:'',desc:'',descFu:'',fuAsked:false,_fuQ:''}); S.guidedExpIdx=S.guidedExp.length-1; renderGuidedStep(); }
  else { S.guidedStep++; renderGuidedStep(); }
}

async function goToScore(){

}
const SCORE_DIMS=[['clarity','sc_d_clarity'],['quantified','sc_d_quant'],['archetype_fit','sc_d_arch'],['market','sc_d_market'],['completeness','sc_d_complete']];
function scoreColor(v){ return v>=8?'var(--sage-pale)':v>=6?'var(--gold2)':v>=4?'var(--gold-dim)':'#C48080'; }
function renderScore(){
  const sc=S.score; const el=document.getElementById('score-grid');
  el.innerHTML=SCORE_DIMS.map(([k,tk])=>{
    const v=sc.scores?sc.scores[k]:null; const pct=v==null?0:v*10;
    return `<div class="score-row">
      <div class="score-top"><span class="score-name">${T(tk)}</span><span class="score-num mono" style="color:${scoreColor(v)}">${v==null?'—':v.toFixed(1)}</span></div>
      <div class="score-track"><div class="score-fill" style="width:${pct}%;background:${scoreColor(v)}"></div></div>
      <div class="score-comment">${esc(sc.comments?sc.comments[k]:'')}</div>
    </div>`;
  }).join('');
  document.getElementById('score-overall-num').textContent = sc.overall!=null? sc.overall : '—';

}

  if(sc){ html+=`<h2>${T('sc_title')}</h2>${SCORE_DIMS.map(([k,tk])=>`<div class="pr-score"><b>${T(tk)}: ${sc.scores[k]??'—'}/10</b> — ${esc(sc.comments?sc.comments[k]:'')}</div>`).join('')}<p><b>${T('sc_overall')}: ${sc.overall??'—'}</b> — ${esc(sc.overall_summary||'')}</p>`; }
  if(p){
    html+=`<h2>${T('pl_paths')}</h2>${(p.paths||[]).map(pa=>`<div class="pr-path"><b>${esc(pa.name)} (${pa.match_score||''}%)</b><div>${esc(pa.desc)}</div><div><i>${esc(pa.why)}</i></div></div>`).join('')}`;

function doPrint(mode){
  const area=document.getElementById('print-area');

// ── API KEY (⑭) ──────────────────────────────────────────────────────────────
function loadKey(){
  try{ const k=localStorage.getItem('syncmii_gemini_key'); if(k){ window.__geminiKey=k; document.getElementById('f-key').value=k; setKeyStatus('ok'); } }catch(e){}
}
function setKeyStatus(st, msg){
  const el=document.getElementById('key-status');
  if(st==='ok'){ el.className='key-status ok'; el.textContent=T('key_ok'); }
  else if(st==='bad'){ el.className='key-status bad'; el.textContent=T('key_bad')+(msg?(' · '+msg.slice(0,50)):''); }
  else { el.className='key-status'; el.textContent=''; }
}
async function verifyKey(){
  const k=(document.getElementById('f-key').value||'').trim();
  if(!k){ setKeyStatus('bad'); return; }
  const btn=document.getElementById('btn-key'); btn.disabled=true; const o=btn.textContent; btn.innerHTML=`<span class="spinner-sm"></span>${T('key_verifying')}`;
  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${k}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{role:'user',parts:[{text:'ping'}]}],generationConfig:{maxOutputTokens:5,thinkingConfig:{thinkingBudget:0}}}),
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    window.__geminiKey=k; try{localStorage.setItem('syncmii_gemini_key',k);}catch(e){}
    setKeyStatus('ok');
  }catch(e){ setKeyStatus('bad', e.message); }
  btn.disabled=false; btn.textContent=o;
}
function toggleKeyCard(){ document.getElementById('key-card').classList.toggle('open'); }

// ── VOICE INPUT (Web Speech) ─────────────────────────────────────────────────
function makeVoiceTextarea(id, placeholder, value, onChange, rows){
  const wrap=document.createElement('div'); wrap.className='voice-wrap';
  const ta=document.createElement('textarea'); ta.className='voice-ta'; ta.id=id; ta.placeholder=placeholder; ta.value=value||''; ta.rows=rows||3;
  ta.oninput=()=>onChange(ta.value);
  wrap.appendChild(ta);
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    const btn=document.createElement('button'); btn.type='button'; btn.className='voice-btn'; btn.textContent='🎤';
    let rec=null, recording=false;
    btn.onclick=()=>{
      if(recording){ try{rec&&rec.stop();}catch(e){} return; }
      rec=new SR(); rec.continuous=true; rec.interimResults=true;
      rec.lang = S.lang==='en'?'en-US':(S.lang==='tw'?'zh-TW':'zh-CN');
      let base=ta.value;
      rec.onresult=e=>{ let interim='',final=''; for(let i=e.resultIndex;i<e.results.length;i++){ if(e.results[i].isFinal)final+=e.results[i][0].transcript; else interim+=e.results[i][0].transcript; }
        if(final){ base=base+final; } ta.value=base+interim; onChange(ta.value); };
      rec.onerror=()=>{ recording=false; btn.classList.remove('recording'); btn.textContent='🎤'; };
      rec.onend=()=>{ recording=false; btn.classList.remove('recording'); btn.textContent='🎤'; ta.value=base; onChange(base); };
      try{ rec.start(); recording=true; btn.classList.add('recording'); btn.textContent='⏹'; }catch(e){}
    };
    wrap.appendChild(btn);
  }
  return wrap;
}
