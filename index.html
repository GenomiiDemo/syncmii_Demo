<script>
const ARCHETYPES = [{"id": "ARC", "name": {"en": "The Architect", "zh": "建构者", "tw": "建構者"}, "tagline": {"en": "You see the system others miss.", "zh": "你能看见别人忽略的系统。", "tw": "你能看見別人忽略的系統。"}, "def": {"en": "You turn chaos into order. While others are still debating what to do, you've already drawn the map.", "zh": "你把混乱变成秩序。当别人还在争论该做什么时，你已经画好了地图。", "tw": "你把混亂變成秩序。當別人還在爭論該做什麼時，你已經畫好了地圖。"}, "power": {"en": "Systems Building — You have a natural gift for seeing how things connect. When a new project kicks off, your first instinct is 'what's the structure here, where are the dependencies, and where will this break?' Your presence saves teams from 30% of avoidable detours.", "zh": "系统搭建 —— 你天生就能看见事物之间如何连接。新项目一启动，你的第一反应是：'结构是什么？依赖在哪里？哪里会崩？'你的存在能帮团队避开约 30% 本可绕开的弯路。", "tw": "系統搭建 —— 你天生就能看見事物之間如何連線。新專案一啟動，你的第一反應是：'結構是什麼？依賴在哪裡？哪裡會崩？'你的存在能幫團隊避開約 30% 本可繞開的彎路。"}, "value": {"en": "Before the problem actually hits, you've already spotted the gap nobody else noticed.", "zh": "在真正问题发生之前，你能看见别人还没意识到的漏洞。", "tw": "在真正問題發生之前，你能看見別人還沒意識到的漏洞。"}, "flaw": {"en": "'Just one more round of validation' is your most-used phrase — and the most common reason things ship late.", "zh": "「再完善一下」是你最常说的话，也是项目最常 delay 的原因。", "tw": "「再完善一下」是你最常說的話，也是專案最常 delay 的原因。"}, "quote": {"en": "\"The Architect's plan was perfect. It was also three months late.\"", "zh": "\"建构者的方案堪称完美。可惜也晚了三个月。\"", "tw": "\"建構者的方案堪稱完美。可惜也晚了三個月。\""}, "growth": {"en": "You build the map everyone else navigates by — but maps don't ship products. Your next level is learning to launch at 80% and iterate in the open. The system in your head is only valuable when it exists in the world. Try a personal rule: if you've spent more than two days planning without executing a single thing, stop and ship something small.", "zh": "你搭出了所有人赖以导航的地图——但地图本身不会交付产品。你的下一阶段是学会在 80% 时就上线，然后公开迭代。脑子里的系统只有落地到世界上才有价值。给自己定个规则：连续两天只规划、没有交付任何东西，就停下来先发一个小东西出去。", "tw": "你搭出了所有人賴以導航的地圖——但地圖本身不會交付產品。你的下一階段是學會在 80% 時就上線，然後公開迭代。腦子裡的系統只有落地到世界上才有價值。給自己定個規則：連續兩天只規劃、沒有交付任何東西，就停下來先發一個小東西出去。"}, "partners": ["Operator", "Pioneer", "Analyst"], "tension": ["Disruptor"], "scarcity": 1.0, "tier": "common", "rarityLabel": null}, {"id": "OPR", "name": {"en": "The Operator", "zh": "执行者", "tw": "執行者"}, "tagline": {"en": "You ship when others are still talking.", "zh": "别人还在说，你已经做完了。", "tw": "別人還在說，你已經做完了。"}, "def": {"en": "You are the person who actually finishes things. Not 'mostly done.' Finished.", "zh": "你是那个真正把事情做完的人。不是'差不多了'，是'完成了'。", "tw": "你是那個真正把事情做完的人。不是'差不多了'，是'完成了'。"}, "power": {"en": "Execution Density — The volume of real work you complete per unit of time far exceeds most people's definition of hardworking. Deadlines are fuel, not pressure.", "zh": "执行密度 —— 你在单位时间里完成的真实工作量，远超多数人对'勤奋'的定义。截止日期对你是燃料，不是压力。", "tw": "執行密度 —— 你在單位時間裡完成的真實工作量，遠超多數人對'勤奮'的定義。截止日期對你是燃料，不是壓力。"}, "value": {"en": "The team hands things to you and stops worrying. You push projects from 60% to 100%. While everyone debates, you've already shipped v1.", "zh": "团队把事情交给你，就不再担心。你能把项目从 60% 推到 100%。当大家还在争论时，你已经把 v1 发出去了。", "tw": "團隊把事情交給你，就不再擔心。你能把專案從 60% 推到 100%。當大家還在爭論時，你已經把 v1 發出去了。"}, "flaw": {"en": "The Why Blind Spot — You're so skilled at how that you sometimes skip why. When the direction is wrong, your execution becomes an accelerator, not a brake.", "zh": "'为什么'盲区 —— 你太擅长'怎么做'，有时会跳过'为什么'。当方向错了，你的执行力会变成加速器，而不是刹车。", "tw": "'為什麼'盲區 —— 你太擅長'怎麼做'，有時會跳過'為什麼'。當方向錯了，你的執行力會變成加速器，而不是剎車。"}, "quote": {"en": "\"The Operator finished the project on time. Nobody had thought to ask if it was the right project.\"", "zh": "\"执行者按时完成了项目。没人想过先问一句：这是对的项目吗？\"", "tw": "\"執行者按時完成了專案。沒人想過先問一句：這是對的專案嗎？\""}, "growth": {"en": "You finish what others can't. But finishing the wrong thing faster isn't progress — it's efficient waste. Build the habit of asking 'why are we doing this?' before 'how do we do this?' One good question before every major task will compound into significantly better outcomes over a year.", "zh": "你能完成别人完不成的事。但把错的事做得更快，不是进步，是高效地浪费。养成习惯：在问'怎么做'之前先问'我们为什么要做这件事'。每个重要任务前多问一个好问题，一年累积下来会带来显著更好的结果。", "tw": "你能完成別人完不成的事。但把錯的事做得更快，不是進步，是高效地浪費。養成習慣：在問'怎麼做'之前先問'我們為什麼要做這件事'。每個重要任務前多問一個好問題，一年累積下來會帶來顯著更好的結果。"}, "partners": ["Architect", "Pioneer", "Analyst"], "tension": ["Diplomat"], "scarcity": 1.0, "tier": "common", "rarityLabel": null}, {"id": "CON", "name": {"en": "The Connector", "zh": "连接者", "tw": "連線者"}, "tagline": {"en": "Every room gets warmer when you walk in.", "zh": "你一进门，整个房间都暖了。", "tw": "你一進門，整個房間都暖了。"}, "def": {"en": "Your superpower is people. You remember names, what they care about, what they need — then you bring the right people together.", "zh": "你的超能力是人。你记得名字、记得他们在意什么、需要什么——然后把对的人凑到一起。", "tw": "你的超能力是人。你記得名字、記得他們在意什麼、需要什麼——然後把對的人湊到一起。"}, "power": {"en": "Relationship Network Building — You don't just have a wide network; you actually care about people. That's why your relationships have depth, not just breadth.", "zh": "关系网络搭建 —— 你不只是人脉广，你是真的在乎人。所以你的关系有深度，不只有广度。", "tw": "關係網路搭建 —— 你不只是人脈廣，你是真的在乎人。所以你的關係有深度，不只有廣度。"}, "value": {"en": "Cross-functional projects don't collapse when you're involved. Information moves faster through organizations with you in them.", "zh": "有你参与，跨部门项目就不会散。信息在有你的组织里流动得更快。", "tw": "有你參與，跨部門專案就不會散。資訊在有你的組織裡流動得更快。"}, "flaw": {"en": "Relationship-Captured Decision-Making — You care too much about how everyone feels, which sometimes prevents the right call.", "zh": "被关系绑架的决策 —— 你太在意每个人的感受，有时这会拦住那个正确的决定。", "tw": "被關係綁架的決策 —— 你太在意每個人的感受，有時這會攔住那個正確的決定。"}, "quote": {"en": "\"The Connector knew the right answer. She just couldn't bring herself to say it.\"", "zh": "\"连接者知道正确答案。她只是说不出口。\"", "tw": "\"連線者知道正確答案。她只是說不出口。\""}, "growth": {"en": "Your network is your superpower, but it's only as powerful as your honesty within it. Practice delivering hard truths with warmth — not softening them into meaninglessness. People trust connectors who tell them what they need to hear, not just what feels safe. Your relationships can handle more directness than you think.", "zh": "你的人脉是超能力，但它的力量取决于你在其中有多诚实。练习把难听的真话讲得有温度——而不是软化到失去意义。人们信任那些愿意说他们需要听的话、而不只是说安全话的连接者。你的关系比你想的更能承受直接。", "tw": "你的人脈是超能力，但它的力量取決於你在其中有多誠實。練習把難聽的真話講得有溫度——而不是軟化到失去意義。人們信任那些願意說他們需要聽的話、而不只是說安全話的連線者。你的關係比你想的更能承受直接。"}, "partners": ["Sovereign", "Catalyst", "Diplomat"], "tension": ["Analyst"], "scarcity": 1.0, "tier": "common", "rarityLabel": null}, {"id": "PIO", "name": {"en": "The Pioneer", "zh": "先行者", "tw": "先行者"}, "tagline": {"en": "You live three years ahead of everyone.", "zh": "你活在所有人前面三年。", "tw": "你活在所有人前面三年。"}, "def": {"en": "You have a near-instinctive sense for the future. When others say 'that's not possible,' you're already thinking about how to make it happen.", "zh": "你对未来几乎有种本能的嗅觉。当别人说'这不可能'时，你已经在想怎么让它发生。", "tw": "你對未來幾乎有種本能的嗅覺。當別人說'這不可能'時，你已經在想怎麼讓它發生。"}, "power": {"en": "Opportunity Sensing — You detect trends before they form. Your thinking is non-linear — jumping from A to F, treating B through E as details.", "zh": "机会嗅觉 —— 你在趋势成形之前就能察觉。你的思维是非线性的——从 A 直接跳到 F，把 B 到 E 当成细节。", "tw": "機會嗅覺 —— 你在趨勢成形之前就能察覺。你的思維是非線性的——從 A 直接跳到 F，把 B 到 E 當成細節。"}, "value": {"en": "You're the voice saying 'this is crazy but it might work.' Your presence breaks teams out of path dependence.", "zh": "你是那个说'这听着很疯但也许行'的声音。你的存在能把团队从路径依赖里拽出来。", "tw": "你是那個說'這聽著很瘋但也許行'的聲音。你的存在能把團隊從路徑依賴裡拽出來。"}, "flaw": {"en": "Strong Starts, Weak Finishes — New things excite you. The 'boring execution phase' drains your enthusiasm fast. Your track record includes a lot of beautifully started projects.", "zh": "起步强、收尾弱 —— 新东西让你兴奋。'无聊的执行阶段'会迅速耗光你的热情。你的履历里有一大堆漂亮的烂尾项目。", "tw": "起步強、收尾弱 —— 新東西讓你興奮。'無聊的執行階段'會迅速耗光你的熱情。你的履歷裡有一大堆漂亮的爛尾專案。"}, "quote": {"en": "\"The Pioneer had seventeen brilliant ideas this year. Two of them were finished.\"", "zh": "\"先行者今年有十七个绝妙的点子。其中两个做完了。\"", "tw": "\"先行者今年有十七個絕妙的點子。其中兩個做完了。\""}, "growth": {"en": "You see the future clearly — the problem is nobody else is there yet. Your next evolution is learning to bring people with you rather than leaving them behind. Spend deliberate time translating your instincts into frameworks others can act on. Find an Operator partner and make it a formal arrangement: you ignite, they execute.", "zh": "你把未来看得很清楚——问题是别人还没到那里。你的下一步进化，是学会带着人一起走，而不是把他们落在后面。刻意花时间把你的直觉翻译成别人能执行的框架。找一个执行者搭档，正式约定下来：你点火，他们落地。", "tw": "你把未來看得很清楚——問題是別人還沒到那裡。你的下一步進化，是學會帶著人一起走，而不是把他們落在後面。刻意花時間把你的直覺翻譯成別人能執行的框架。找一個執行者搭檔，正式約定下來：你點火，他們落地。"}, "partners": ["Operator", "Architect", "Weaver"], "tension": ["Guardian"], "scarcity": 1.1, "tier": "scarce", "rarityLabel": "Scarce"}, {"id": "GUA", "name": {"en": "The Guardian", "zh": "守护者", "tw": "守護者"}, "tagline": {"en": "When everything breaks, you hold.", "zh": "当一切崩塌时，你稳住了。", "tw": "當一切崩塌時，你穩住了。"}, "def": {"en": "You are the ballast that keeps the ship steady. When the storm hits, everyone else is scrambling. You're stabilizing.", "zh": "你是让船保持平稳的压舱石。风暴来袭，别人乱作一团，你在稳定局面。", "tw": "你是讓船保持平穩的壓艙石。風暴來襲，別人亂作一團，你在穩定局面。"}, "power": {"en": "Stability and Risk Pre-sensing — You're naturally attuned to where things can go wrong. While everyone celebrates, you're already thinking through next week's contingencies.", "zh": "稳定与风险预感 —— 你天生对'哪里会出问题'敏感。当大家在庆祝时，你已经在推演下周的应急预案。", "tw": "穩定與風險預感 —— 你天生對'哪裡會出問題'敏感。當大家在慶祝時，你已經在推演下週的應急預案。"}, "value": {"en": "You're the safety net that lets the team take real risks. You prevent 90% of 'entirely avoidable' crises.", "zh": "你是那张让团队敢冒真风险的安全网。你能预防 90% '本可完全避免'的危机。", "tw": "你是那張讓團隊敢冒真風險的安全網。你能預防 90% '本可完全避免'的危機。"}, "flaw": {"en": "Change Resistance — Rapid change takes you longer to absorb than most. Your stability is an asset in stable periods — drag during rapid transformation.", "zh": "抗拒变化 —— 快速变化你比多数人需要更长时间消化。你的稳定在平稳期是资产——在剧烈转型期会变成阻力。", "tw": "抗拒變化 —— 快速變化你比多數人需要更長時間消化。你的穩定在平穩期是資產——在劇烈轉型期會變成阻力。"}, "quote": {"en": "\"The Guardian kept the ship steady. Unfortunately, the destination had changed.\"", "zh": "\"守护者让船稳稳前行。可惜，目的地已经变了。\"", "tw": "\"守護者讓船穩穩前行。可惜，目的地已經變了。\""}, "growth": {"en": "You are the reason teams can take real risks — because you catch what everyone else misses. But not every risk needs to be mitigated. Practice tolerating productive discomfort: let small fires burn so the team learns to put them out. Your stability becomes a ceiling when it prevents necessary change.", "zh": "你是团队敢冒真风险的原因——因为你能接住所有人忽略的东西。但不是每个风险都需要被化解。练习容忍'有建设性的不适'：让一些小火苗烧一会儿，好让团队学会自己扑灭。当你的稳定开始阻止必要的改变时，它就成了天花板。", "tw": "你是團隊敢冒真風險的原因——因為你能接住所有人忽略的東西。但不是每個風險都需要被化解。練習容忍'有建設性的不適'：讓一些小火苗燒一會兒，好讓團隊學會自己撲滅。當你的穩定開始阻止必要的改變時，它就成了天花板。"}, "partners": ["Pioneer", "Analyst", "Diplomat"], "tension": ["Disruptor"], "scarcity": 1.0, "tier": "common", "rarityLabel": null}, {"id": "CAT", "name": {"en": "The Catalyst", "zh": "点燃者", "tw": "點燃者"}, "tagline": {"en": "You make people believe in things they didn't know they wanted.", "zh": "你能让人相信他们本不知道自己想要的东西。", "tw": "你能讓人相信他們本不知道自己想要的東西。"}, "def": {"en": "You are the ignition. You walk into a room, and it's different when you leave.", "zh": "你是点火器。你走进一个房间，离开时它已经不一样了。", "tw": "你是點火器。你走進一個房間，離開時它已經不一樣了。"}, "power": {"en": "Motivational Activation — You sense what each person wants at their core and unlock it at the right moment. Not through scripted speeches — through genuine emotional resonance.", "zh": "动机激活 —— 你能感知每个人内心真正想要什么，并在对的时刻把它解锁。不是靠套路演讲，而是靠真实的情绪共鸣。", "tw": "動機啟用 —— 你能感知每個人內心真正想要什麼，並在對的時刻把它解鎖。不是靠套路演講，而是靠真實的情緒共鳴。"}, "value": {"en": "You make 'impossible' tasks possible through collective belief. You are a culture carrier — the atmosphere follows you.", "zh": "你能用集体的信念把'不可能'变成可能。你是文化的载体——气氛跟着你走。", "tw": "你能用集體的信念把'不可能'變成可能。你是文化的載體——氣氛跟著你走。"}, "flaw": {"en": "Bidirectional Energy — Lighting others up costs you heavily. When you crash, the crash propagates through the team.", "zh": "双向能量 —— 点亮别人会大量消耗你自己。当你崩溃时，崩溃会在团队里扩散。", "tw": "雙向能量 —— 點亮別人會大量消耗你自己。當你崩潰時，崩潰會在團隊裡擴散。"}, "quote": {"en": "\"The Catalyst inspired everyone in the room. Then went home and stared at the ceiling for four hours.\"", "zh": "\"点燃者激励了房间里的每一个人。然后回到家，盯着天花板看了四个小时。\"", "tw": "\"點燃者激勵了房間裡的每一個人。然後回到家，盯著天花板看了四個小時。\""}, "growth": {"en": "You light rooms on fire — but fire needs fuel. Energy management is your highest-leverage skill, and you're probably treating it as optional. Build refueling rituals before you hit empty, not after. Partner with a Guardian to provide the stability that lets your ignition sustain. One catalyst who crashes takes the whole team's momentum with them.", "zh": "你能把房间点燃——但火需要燃料。能量管理是你回报最高的技能，而你大概把它当成了可选项。在油箱见底之前就建立补给仪式，而不是之后。找一个守护者搭档，给你提供让点火得以持续的稳定。一个崩溃的点燃者，会把整个团队的势头一起带走。", "tw": "你能把房間點燃——但火需要燃料。能量管理是你回報最高的技能，而你大概把它當成了可選項。在油箱見底之前就建立補給儀式，而不是之後。找一個守護者搭檔，給你提供讓點火得以持續的穩定。一個崩潰的點燃者，會把整個團隊的勢頭一起帶走。"}, "partners": ["Guardian", "Operator", "Weaver"], "tension": ["Analyst"], "scarcity": 1.1, "tier": "scarce", "rarityLabel": "Scarce"}, {"id": "ANL", "name": {"en": "The Analyst", "zh": "洞察者", "tw": "洞察者"}, "tagline": {"en": "You find the truth hiding in the noise.", "zh": "你能在噪音里找到藏着的真相。", "tw": "你能在噪音裡找到藏著的真相。"}, "def": {"en": "While everyone else is arguing based on gut feel, you've already found the data.", "zh": "当所有人凭直觉争论时，你已经找到了数据。", "tw": "當所有人憑直覺爭論時，你已經找到了資料。"}, "power": {"en": "Information Penetration — Ambiguity drives you to find clearer answers. You cut through noise to find the signal that matters, and catch flaws everyone else accepted.", "zh": "信息穿透 —— 模糊会驱使你去寻找更清晰的答案。你能穿过噪音找到真正重要的信号，并抓出别人都默认接受的漏洞。", "tw": "資訊穿透 —— 模糊會驅使你去尋找更清晰的答案。你能穿過噪音找到真正重要的訊號，並抓出別人都預設接受的漏洞。"}, "value": {"en": "Team decisions are built on facts, not assumptions. You're the one who says 'the emperor has no clothes' — and can prove it.", "zh": "团队的决策建立在事实而非假设之上。你是那个会说'国王没穿衣服'——并且能证明它的人。", "tw": "團隊的決策建立在事實而非假設之上。你是那個會說'國王沒穿衣服'——並且能證明它的人。"}, "flaw": {"en": "Analysis Paralysis — Your threshold for 'enough information' is too high. You keep collecting data past the point where a decision was needed.", "zh": "分析瘫痪 —— 你对'信息够了'的门槛太高。过了该做决定的点，你还在继续收集数据。", "tw": "分析癱瘓 —— 你對'資訊夠了'的門檻太高。過了該做決定的點，你還在繼續收集資料。"}, "quote": {"en": "\"The Analyst had the answer. She was still verifying the third decimal place when the window closed.\"", "zh": "\"洞察者握着答案。窗口关上时，她还在核对第三位小数。\"", "tw": "\"洞察者握著答案。視窗關上時，她還在核對第三位小數。\""}, "growth": {"en": "Your analysis is only valuable when it drives action. The perfect answer delivered after the window closes is worth nothing. Set a decision deadline for every analysis task — a fixed time box to find the best available answer, not unlimited time for the perfect one. Start practicing the phrase: 'Based on what we know now, I recommend...'", "zh": "你的分析只有在驱动行动时才有价值。窗口关上后才交出的完美答案，一文不值。给每个分析任务设一个决策截止时间——一个固定的时间盒，去找'当下最好的答案'，而不是无限时间去找'完美答案'。开始练习这句话：'基于目前所知，我建议……'", "tw": "你的分析只有在驅動行動時才有價值。視窗關上後才交出的完美答案，一文不值。給每個分析任務設一個決策截止時間——一個固定的時間盒，去找'當下最好的答案'，而不是無限時間去找'完美答案'。開始練習這句話：'基於目前所知，我建議……'"}, "partners": ["Operator", "Architect", "Curator"], "tension": ["Pioneer"], "scarcity": 1.0, "tier": "common", "rarityLabel": null}, {"id": "DIP", "name": {"en": "The Diplomat", "zh": "斡旋者", "tw": "斡旋者"}, "tagline": {"en": "You make hard conversations feel safe.", "zh": "你能让艰难的对话变得安全。", "tw": "你能讓艱難的對話變得安全。"}, "def": {"en": "You are the person who makes conflict disappear and consensus appear. Not by avoiding it — by genuinely understanding every side.", "zh": "你是那个让冲突消失、让共识浮现的人。不是靠回避，而是靠真正理解每一方。", "tw": "你是那個讓衝突消失、讓共識浮現的人。不是靠迴避，而是靠真正理解每一方。"}, "power": {"en": "Consensus Architecture — You make people with opposing positions all feel heard, then guide everyone toward common ground. You're not smoothing things over — you genuinely see each side.", "zh": "共识架构 —— 你能让立场对立的人都感到被听见，再引导大家走向共同点。你不是和稀泥——你是真的看见了每一面。", "tw": "共識架構 —— 你能讓立場對立的人都感到被聽見，再引導大家走向共同點。你不是和稀泥——你是真的看見了每一面。"}, "value": {"en": "Cross-functional projects stuck for weeks come unstuck after one meeting with you. Your presence reduces organizational friction.", "zh": "卡了几周的跨部门项目，跟你开一次会就松动了。你的存在能降低组织摩擦。", "tw": "卡了幾周的跨部門專案，跟你開一次會就鬆動了。你的存在能降低組織摩擦。"}, "flaw": {"en": "Position Ambiguity — You're so skilled at understanding everyone that people sometimes can't tell what you actually think.", "zh": "立场模糊 —— 你太擅长理解每个人，以至于别人有时分不清你自己到底怎么想。", "tw": "立場模糊 —— 你太擅長理解每個人，以至於別人有時分不清你自己到底怎麼想。"}, "quote": {"en": "\"The Diplomat understood everyone's position perfectly. No one was quite sure what his own position was.\"", "zh": "\"斡旋者完美地理解了每个人的立场。没人确定他自己的立场是什么。\"", "tw": "\"斡旋者完美地理解了每個人的立場。沒人確定他自己的立場是什麼。\""}, "growth": {"en": "You make the room feel safe — but you sometimes disappear in the process. Before every mediation or alignment conversation, privately clarify your own position: 'If I had to pick a side, which one?' Then bring that anchor into the room. Diplomatic effectiveness requires a point of view, not just the ability to hold space for everyone else's.", "zh": "你让房间感到安全——但你有时会在这个过程里消失。每次调解或对齐对话之前，私下先厘清自己的立场：'如果必须选一边，我选哪边？'然后把这个锚带进房间。外交式的有效，需要一个观点，而不只是为别人撑住空间的能力。", "tw": "你讓房間感到安全——但你有時會在這個過程裡消失。每次調解或對齊對話之前，私下先釐清自己的立場：'如果必須選一邊，我選哪邊？'然後把這個錨帶進房間。外交式的有效，需要一個觀點，而不只是為別人撐住空間的能力。"}, "partners": ["Sovereign", "Connector", "Guardian"], "tension": ["Disruptor"], "scarcity": 1.0, "tier": "common", "rarityLabel": null}, {"id": "DIS", "name": {"en": "The Disruptor", "zh": "破局者", "tw": "破局者"}, "tagline": {"en": "You break things that need breaking.", "zh": "你专门打破那些该被打破的东西。", "tw": "你專門打破那些該被打破的東西。"}, "def": {"en": "'Because we've always done it this way' triggers a physical reaction in you. Your reason for existing is to tear down what shouldn't exist.", "zh": "'我们一直这么做'会在你身上引发生理反应。你存在的理由，就是拆掉不该存在的东西。", "tw": "'我們一直這麼做'會在你身上引發生理反應。你存在的理由，就是拆掉不該存在的東西。"}, "power": {"en": "Breakthrough Force — You see the emperor's new clothes that everyone politely ignores. When an entire industry follows unquestioned rules, you ask why — and act.", "zh": "破局之力 —— 你能看见所有人礼貌地视而不见的'皇帝新衣'。当整个行业遵循着没人质疑的规则时，你会问为什么——然后动手。", "tw": "破局之力 —— 你能看見所有人禮貌地視而不見的'皇帝新衣'。當整個行業遵循著沒人質疑的規則時，你會問為什麼——然後動手。"}, "value": {"en": "You prevent the company from being disrupted by someone else — because you're disrupting it from within. You break path dependence.", "zh": "你让公司不至于被别人颠覆——因为你正从内部颠覆它。你打破路径依赖。", "tw": "你讓公司不至於被別人顛覆——因為你正從內部顛覆它。你打破路徑依賴。"}, "flaw": {"en": "Demolition Exceeds Construction — Your disruptive impulse sometimes outpaces actual need. You may tear down something working fine because it wasn't perfect.", "zh": "拆得比建得多 —— 你的破坏冲动有时超过实际需要。你可能因为某样东西'不够完美'，就把运转正常的它拆掉。", "tw": "拆得比建得多 —— 你的破壞衝動有時超過實際需要。你可能因為某樣東西'不夠完美'，就把運轉正常的它拆掉。"}, "quote": {"en": "\"The Disruptor burned down the old system. It took three years to rebuild it. No one was sure the new one was better.\"", "zh": "\"破局者烧掉了旧系统。重建花了三年。没人确定新的是不是更好。\"", "tw": "\"破局者燒掉了舊系統。重建花了三年。沒人確定新的是不是更好。\""}, "growth": {"en": "You see the emperor's new clothes — but demolition without architecture leaves rubble. Before every 'burn it down' impulse, ask: what in this existing structure is worth keeping? Your most powerful moments aren't when you destroy what's wrong — they're when you replace it with something better. Find an Architect partner.", "zh": "你能看见皇帝的新衣——但没有架构的拆除只会留下废墟。每次'烧掉它'的冲动之前，先问：现有结构里有什么是值得保留的？你最有力的时刻，不是摧毁错的东西，而是用更好的东西替换它。找一个建构者搭档。", "tw": "你能看見皇帝的新衣——但沒有架構的拆除只會留下廢墟。每次'燒掉它'的衝動之前，先問：現有結構裡有什麼是值得保留的？你最有力的時刻，不是摧毀錯的東西，而是用更好的東西替換它。找一個建構者搭檔。"}, "partners": ["Architect", "Weaver"], "tension": ["Guardian", "Diplomat"], "scarcity": 1.2, "tier": "rare", "rarityLabel": "Rare · Top 4%"}, {"id": "CUR", "name": {"en": "The Curator", "zh": "甄别者", "tw": "甄別者"}, "tagline": {"en": "You know what matters and what doesn't.", "zh": "你知道什么重要，什么不重要。", "tw": "你知道什麼重要，什麼不重要。"}, "def": {"en": "You are the quality gatekeeper. In an age of infinite everything, you're the one who knows what's worth keeping.", "zh": "你是质量的守门人。在一个什么都无限多的时代，你是那个知道什么值得留下的人。", "tw": "你是質量的守門人。在一個什麼都無限多的時代，你是那個知道什麼值得留下的人。"}, "power": {"en": "Signal Selection — You have an innate sense of the gap between good and good enough. You scan 100 options and immediately narrow to the 3 worth pursuing deeply.", "zh": "信号筛选 —— 你天生能感知'好'与'够好'之间的差距。你扫过 100 个选项，立刻收窄到值得深挖的那 3 个。", "tw": "訊號篩選 —— 你天生能感知'好'與'夠好'之間的差距。你掃過 100 個選項，立刻收窄到值得深挖的那 3 個。"}, "value": {"en": "The team's energy goes toward things that actually matter. What you produce never needs a second quality pass.", "zh": "团队的精力会投向真正重要的事。你产出的东西，从不需要二次质检。", "tw": "團隊的精力會投向真正重要的事。你產出的東西，從不需要二次質檢。"}, "flaw": {"en": "The Perfectionism Tax — Your high standards sometimes lock you in a 'never quite good enough' loop. The market moves while you're finishing draft seven.", "zh": "完美主义税 —— 你的高标准有时会把你锁在'总差一点'的循环里。当你在打磨第七版草稿时，市场已经走了。", "tw": "完美主義稅 —— 你的高標準有時會把你鎖在'總差一點'的迴圈裡。當你在打磨第七版草稿時，市場已經走了。"}, "quote": {"en": "\"The Curator's work was flawless. It shipped six months after the market had moved on.\"", "zh": "\"甄别者的作品无可挑剔。它在市场转向六个月之后才上线。\"", "tw": "\"甄別者的作品無可挑剔。它在市場轉向六個月之後才上線。\""}, "growth": {"en": "Your signal detection is extraordinary — the problem is you sometimes keep detecting instead of committing. Practice deciding faster by setting a rule: once you've identified your top three options, you have 24 hours to pick one. The market rewards the person who ships a good enough product, not the one who perfects it.", "zh": "你的信号检测能力非凡——问题是你有时只顾着继续检测，却不肯下注。练习更快地决定：定个规则，一旦你锁定了前三个选项，就有 24 小时选出一个。市场奖励那个发出'够好'产品的人，而不是那个把它打磨到完美的人。", "tw": "你的訊號檢測能力非凡——問題是你有時只顧著繼續檢測，卻不肯下注。練習更快地決定：定個規則，一旦你鎖定了前三個選項，就有 24 小時選出一個。市場獎勵那個發出'夠好'產品的人，而不是那個把它打磨到完美的人。"}, "partners": ["Operator", "Analyst", "Weaver"], "tension": ["Pioneer"], "scarcity": 1.1, "tier": "scarce", "rarityLabel": "Scarce"}, {"id": "SOV", "name": {"en": "The Sovereign", "zh": "主权者", "tw": "主權者"}, "tagline": {"en": "People follow you before you ask them to.", "zh": "人们在你开口之前就跟随你。", "tw": "人們在你開口之前就跟隨你。"}, "def": {"en": "You don't need a title. You don't need an invitation. You walk into the room, and the dynamic shifts.", "zh": "你不需要头衔，不需要邀请。你走进房间，气场就变了。", "tw": "你不需要頭銜，不需要邀請。你走進房間，氣場就變了。"}, "power": {"en": "Natural Authority — Not dominance. Something harder to describe: a field. When you make a decision, people follow — not out of fear, but because your judgment makes them feel secure.", "zh": "天然权威 —— 不是支配，是一种更难描述的东西：一个场。当你做决定时，人们会跟随——不是出于恐惧，而是因为你的判断让他们感到安全。", "tw": "天然權威 —— 不是支配，是一種更難描述的東西：一個場。當你做決定時，人們會跟隨——不是出於恐懼，而是因為你的判斷讓他們感到安全。"}, "value": {"en": "You move things forward without formal authorization. In crises, everyone automatically looks to you.", "zh": "你不需要正式授权就能推动事情。危机时刻，所有人会自动看向你。", "tw": "你不需要正式授權就能推動事情。危機時刻，所有人會自動看向你。"}, "flaw": {"en": "Authority Dependency — You're so accustomed to being the final decision-maker that operating without that role is genuinely uncomfortable.", "zh": "权威依赖 —— 你太习惯当那个最终拍板的人，以至于在没有这个角色时会真切地感到不适。", "tw": "權威依賴 —— 你太習慣當那個最終拍板的人，以至於在沒有這個角色時會真切地感到不適。"}, "quote": {"en": "\"The Sovereign was the best person in the room. She was also the hardest to manage.\"", "zh": "\"主权者是房间里最优秀的人，也是最难被管理的人。\"", "tw": "\"主權者是房間裡最優秀的人，也是最難被管理的人。\""}, "growth": {"en": "You command rooms before you speak — but authority built on presence alone is fragile. Invest in genuine curiosity about others' inner worlds. Ask questions you don't already know the answer to. The leaders who last aren't just followed — they make the people around them feel seen. Your power grows when it includes others rather than emanating from you alone.", "zh": "你在开口之前就掌控了房间——但只靠气场建立的权威是脆弱的。投资于对他人内心世界真实的好奇。问那些你并不已经知道答案的问题。能走得长远的领导者，不只是被追随——他们让身边的人感到被看见。当你的力量包含他人、而非只从你一人散发时，它才会增长。", "tw": "你在開口之前就掌控了房間——但只靠氣場建立的權威是脆弱的。投資於對他人內心世界真實的好奇。問那些你並不已經知道答案的問題。能走得長遠的領導者，不只是被追隨——他們讓身邊的人感到被看見。當你的力量包含他人、而非只從你一人散發時，它才會增長。"}, "partners": ["Diplomat", "Connector"], "tension": ["Disruptor"], "scarcity": 1.2, "tier": "rare", "rarityLabel": "Rare · Top 3%"}, {"id": "WEA", "name": {"en": "The Weaver", "zh": "织网者", "tw": "織網者"}, "tagline": {"en": "You connect dots no one else sees.", "zh": "你能连起别人看不见的点。", "tw": "你能連起別人看不見的點。"}, "def": {"en": "You live at the intersection of different worlds. Others work in parallel lines. You build bridges between them.", "zh": "你活在不同世界的交界处。别人在平行线上工作，你在它们之间搭桥。", "tw": "你活在不同世界的交界處。別人在平行線上工作，你在它們之間搭橋。"}, "power": {"en": "Cross-Domain Synthesis — You connect ideas, fields, and people that seem completely unrelated, creating unexpected value from the intersection.", "zh": "跨域综合 —— 你能把看似毫不相关的想法、领域和人连接起来，从交界处创造出意料之外的价值。", "tw": "跨域綜合 —— 你能把看似毫不相關的想法、領域和人連線起來，從交界處創造出意料之外的價值。"}, "value": {"en": "You're the catalyst for cross-industry collaboration. You solve problems that domain experts can't — because the answer was outside the domain.", "zh": "你是跨行业协作的催化剂。你能解决领域专家解不了的问题——因为答案在领域之外。", "tw": "你是跨行業協作的催化劑。你能解決領域專家解不了的問題——因為答案在領域之外。"}, "flaw": {"en": "KPI Invisibility — Your contributions are of the 'this wouldn't have happened without you' variety, not 'you completed X producing Y.' In traditional performance systems, you're chronically undervalued.", "zh": "KPI 隐形 —— 你的贡献属于'没有你就不会发生'那一类，而不是'你完成了 X，产出了 Y'。在传统绩效体系里，你长期被低估。", "tw": "KPI 隱形 —— 你的貢獻屬於'沒有你就不會發生'那一類，而不是'你完成了 X，產出了 Y'。在傳統績效體系裡，你長期被低估。"}, "quote": {"en": "\"The Weaver's contribution was invisible until it wasn't there.\"", "zh": "\"织网者的贡献一直是隐形的——直到它不在了。\"", "tw": "\"織網者的貢獻一直是隱形的——直到它不在了。\""}, "growth": {"en": "You live at the intersection of worlds that don't normally talk to each other — which makes you invaluable and nearly invisible at the same time. Learn to translate your cross-domain value into language traditional evaluation systems understand: 'I connected X and Y, which made Z possible.' Develop one signature strength others can point to, without losing your range.", "zh": "你活在那些平时互不交谈的世界的交界处——这让你既无可替代，又几乎隐形。学会把你的跨域价值翻译成传统评估体系能理解的语言：'我连接了 X 和 Y，让 Z 成为可能。'发展出一个别人能指着说的标志性强项，同时不失去你的广度。", "tw": "你活在那些平時互不交談的世界的交界處——這讓你既無可替代，又幾乎隱形。學會把你的跨域價值翻譯成傳統評估體系能理解的語言：'我連線了 X 和 Y，讓 Z 成為可能。'發展出一個別人能指著說的標誌性強項，同時不失去你的廣度。"}, "partners": ["Analyst", "Operator", "Pioneer"], "tension": ["Guardian"], "scarcity": 1.2, "tier": "rare", "rarityLabel": "Rare · Top 3%"}];

const GEMINI_MODEL = 'gemini-2.5-flash';

function langInstruction(){
  if(S.lang==='zh') return '所有输出内容使用简体中文。';
  if(S.lang==='tw') return '所有輸出內容使用繁體中文（台灣用語）。';
  return 'ALL output content MUST be in English. Do not use Chinese in any field values.';
}

async function callGeminiParts(parts, maxTokens=4096){
  const key = window.__geminiKey;
  if(!key) throw new Error('NO_KEY');
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`;
  const isTextOnly = parts.every(p => !p.inline_data);
  const res = await fetch(url, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      contents:[{ role:'user', parts }],
      generationConfig:{
        temperature:0.2, maxOutputTokens:maxTokens,
        thinkingConfig:{ thinkingBudget:0 },
        ...(isTextOnly ? { responseMimeType:'application/json' } : {}),
      },
    }),
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}
async function callGemini(prompt, maxTokens=2048){ return callGeminiParts([{text:prompt}], maxTokens); }

async function extractRawTextFromFile(content){
  const parts = buildParts(content, 'Extract ALL text content from this resume completely, preserving structure. Output plain text only, no summary or modification.');
  const key = window.__geminiKey;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`;
  const res = await fetch(url, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ contents:[{role:'user',parts}], generationConfig:{ temperature:0, maxOutputTokens:4096 } }),
  });
  const data = await res.json();
  if(data.error) throw new Error('Text extraction failed: '+data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

function cleanJSON(raw){
  let s = raw.trim();
  s = s.replace(/^```(?:json)?\s*/i,'').replace(/\s*```\s*$/i,'').trim();
  const st = s.indexOf('{'); const en = s.lastIndexOf('}');
  if(st!==-1 && en>st) s = s.slice(st, en+1);
  s = s.replace(/\/\/[^\n\r"]*/g,'').replace(/\/\*[\s\S]*?\*\//g,'');
  s = s.replace(/[\u201c\u201d\u201e\u201f\u275d\u275e]/g,'"');
  s = s.replace(/[\u2018\u2019\u201a\u201b\u275b\u275c]/g,"'");
  { let out='', inStr=false, embDepth=0, i=0;
    while(i<s.length){ const ch=s[i];
      if(!inStr){ if(ch==='"'){inStr=true;embDepth=0;out+=ch;i++;} else {out+=ch;i++;} }
      else { if(ch==='\\'){out+=ch+(s[i+1]||'');i+=2;}
        else if(ch==='"'){ const next=s[i+1]||'';
          if(embDepth>0){out+="'";embDepth--;i++;}
          else if(/[a-zA-Z0-9\u4e00-\u9fff(']/.test(next)){out+="'";embDepth++;i++;}
          else {out+='"';inStr=false;i++;} }
        else if(ch==='\n'){out+='\\n';i++;}
        else if(ch==='\r'){out+='\\r';i++;}
        else if(ch==='\t'){out+='\\t';i++;}
        else {out+=ch;i++;} } }
    s=out; }
  s = s.replace(/:\s*(?:string|number|boolean|array|object)(?:\|(?:string|number|boolean|null))*\b/g,': null');
  s = s.replace(/"(?:string|number|boolean|array|object)(?:\|(?:string|number|boolean|null))*"/g,'null');
  s = s.replace(/,(\s*[}\]])/g,'$1');
  s = s.replace(/:\s*undefined\b/g,': null');
  s = s.replace(/(?<!['\w])([a-zA-Z_][a-zA-Z0-9_]*)\s*:/g,'"$1":');
  s = s.replace(/""([a-zA-Z_][a-zA-Z0-9_]*)"":/g,'"$1":');
  s = s.replace(/:\s*'([^'"]*)'/g,': "$1"');
  return s;
}
function safeParseJSON(raw, label){
  const cleaned = cleanJSON(raw);
  try { return JSON.parse(cleaned); }
  catch(e1){
    const pos = parseInt(e1.message.match(/position (\d+)/)?.[1] || '0');
    try {
      let candidate = cleaned.slice(0,pos), depth=0, cutAt=-1;
      for(let i=candidate.length-1;i>=0;i--){ const c=candidate[i];
        if(c==='}') depth++; if(c==='{'){ depth--; if(depth<0){cutAt=i;break;} } }
      if(cutAt>=0){ let d2=0;
        for(let i=cutAt;i<cleaned.length;i++){ if(cleaned[i]==='{')d2++; if(cleaned[i]==='}'){d2--; if(d2===0){ return JSON.parse(cleanJSON(cleaned.slice(cutAt,i+1))); } } } }
    } catch(e2){}
    try { const errorLine=(e1.message.match(/line (\d+)/)?.[1]||0)-1;
      if(errorLine>0){ const lines=cleaned.split('\n'); lines.splice(errorLine,1); return JSON.parse(cleanJSON(lines.join('\n'))); } } catch(e3){}
    throw new Error(label+' parse failed: '+e1.message);
  }
}

async function extractFileContent(file){
  const ext = file.name.split('.').pop().toLowerCase();
  if(ext==='pdf') return { type:'pdf', data: await fileToBase64(file) };
  if(['png','jpg','jpeg'].includes(ext)) return { type:'image', mime: ext==='png'?'image/png':'image/jpeg', data: await fileToBase64(file) };
  if(['doc','docx'].includes(ext)) return { type:'text', data: await extractDocxText(file) };
  return { type:'text', data: await file.text() };
}
function buildParts(content, instruction){
  if(content.type==='pdf') return [{ inline_data:{ mime_type:'application/pdf', data:content.data } }, { text:instruction }];
  if(content.type==='image') return [{ inline_data:{ mime_type:content.mime, data:content.data } }, { text:instruction }];
  return [{ text:`${instruction}\n\nResume content:\n${content.data.slice(0,5000)}` }];
}
function fileToBase64(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(file); }); }
async function extractDocxText(file){
  if(!window.mammoth){ await new Promise((res,rej)=>{ const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }
  const ab = await file.arrayBuffer();
  const r = await window.mammoth.extractRawText({ arrayBuffer: ab });
  return r.value || '';
}

function buildStageDefs(){
  const lang = langInstruction();
  return [
    { id:'basic', maxTokens:2048,
      schema:`Extract basic info only. Output JSON (use null for missing fields):
{"name":"","email":null,"location":null,"currentTitle":null,"totalYears":0,"startupExperience":false,"summary":"Core differentiating traits in 80 chars max","education":[{"school":"","degree":"","major":"","yearStart":null,"yearEnd":null}]}`,
      preamble:(t)=> t==='pdf' ? `This is a resume PDF. Extract candidate basic info, summary and education. Use null for missing. ${lang}`
        : t==='image' ? `This is a resume image. OCR all text, extract basic info, summary and education. Use null for missing. ${lang}`
        : `You are a resume parser. Extract basic info, summary and education. Use null for missing. ${lang}` },
    { id:'exp', maxTokens:3072,
      schema:`Extract work experience. description: max 80 chars single line of key responsibilities and achievements. Output JSON:
{"experience":[{"company":"","title":"","industry":"","yearStart":0,"yearEnd":0,"description":"Key achievements max 80 chars","isStartup":false,"scale":""}]}`,
      preamble:(t)=> t==='pdf' ? `This is a resume PDF. Extract all work experience. description: key achievements max 80 chars single line. ${lang}`
        : t==='image' ? `This is a resume image. OCR all text. Extract work experience. description max 80 chars. ${lang}`
        : `You are a resume parser. Extract all work experience. description max 80 chars single line. ${lang}` },
    { id:'skills', maxTokens:3072,
      schema:`Extract skills. Output JSON (empty array if none):
{"hardSkills":[],"softSkills":[],"languages":[],"tools":[],"industries":[]}`,
      preamble:(t)=> t==='pdf' ? `This is a resume PDF. Extract hard skills, soft skills, languages, tools and industries. Output only valid JSON. ${lang}`
        : t==='image' ? `This is a resume image. OCR all text. Extract skills, languages, tools, industries. Output only valid JSON. ${lang}`
        : `You are a resume parser. Extract hard skills, soft skills, languages, tools, industries. Output only valid JSON. ${lang}` },
  ];
}

async function parseResumeProgressive(input, onStageUpdate){
  let content = typeof input==='string' ? { type:'text', data:input } : await extractFileContent(input);
  let rawText = typeof input==='string' ? input : '';
  if(content.type==='pdf' || content.type==='image'){
    onStageUpdate('basic','loading',null);
    try { rawText = await extractRawTextFromFile(content); content = { type:'text', data:rawText }; }
    catch(e){ console.warn('text extract fallback', e.message); }
  } else { rawText = content.data; }
  const stageDefs = buildStageDefs();
  const collected = {};
  await Promise.all(stageDefs.map(async (stage)=>{
    try {
      const instruction = stage.preamble(content.type) + '\n\n' + stage.schema;
      const parts = buildParts(content, instruction);
      const raw = await callGeminiParts(parts, stage.maxTokens);
      const parsed = safeParseJSON(raw, stage.id);
      collected[stage.id] = parsed;
      onStageUpdate(stage.id,'done',parsed);
    } catch(e){ onStageUpdate(stage.id,'error',null,e.message); }
  }));
  // Assemble unified structure
  const b = collected.basic || {};
  const sk = collected.skills || {};
  const unified = {
    basic: { name:b.name||S.intake.name||'', email:b.email||S.intake.email||null, location:b.location||null,
             currentTitle:b.currentTitle||null, totalYears:b.totalYears||0, startupExperience:!!b.startupExperience,
             summary:b.summary||'', education:b.education||[] },
    exp: { experience:(collected.exp&&collected.exp.experience)||[] },
    skills: { hardSkills:sk.hardSkills||[], softSkills:sk.softSkills||[], languages:sk.languages||[], tools:sk.tools||[], industries:sk.industries||[] },
  };
  S.resume = unified; S.resumeText = rawText;
  return unified;
}

// ── Helper: flatten unified resume to a "person" object for prompts ──────────
function personFromResume(){
  const r = S.resume || { basic:{}, exp:{}, skills:{} };
  return {

    location: r.basic.location, summary: r.basic.summary,
    experience: r.exp.experience || [],
    hardSkills: r.skills.hardSkills || [], softSkills: r.skills.softSkills || [],
    industries: r.skills.industries || [], languages: r.skills.languages || [], tools: r.skills.tools || [],
    education: r.basic.education || [],
  };
}

// ── QUIZ ─────────────────────────────────────────────────────────────────────
function renderQuestion() {
  const q    = QUESTIONS[S.currentQ];
  const lang = S.lang || 'en';
  const pct  = ((S.currentQ + 1) / QUESTIONS.length * 100).toFixed(0);

  document.getElementById('progress-frac').textContent = `${S.currentQ + 1} / ${QUESTIONS.length}`;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-number').textContent =
    `Question ${String(S.currentQ + 1).padStart(2, '0')}`;
  document.getElementById('q-text-en').textContent = q.en;
  const _cn = document.getElementById('q-text-cn'); if(_cn) _cn.textContent = lang === 'tw' ? (q.tw || q.cn) : q.cn;

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';

  // ── LIKERT ────────────────────────────────────────────────────
  if (q.type === 'likert') {
    const hint = lang === 'en' ? q.hint_en : (q.hint_cn || q.hint_en);
    if (hint) {
      const hintEl = document.createElement('span');
      hintEl.className = 'q-hint';
      hintEl.textContent = hint;
      grid.appendChild(hintEl);
    }

    const LABELS = {
      en: ['Not me', 'Not really', 'Somewhat', 'Definitely me'],
      zh: ['完全不像', '不太像', '有点像', '非常像'],
      tw: ['完全不像', '不太像', '有點像', '非常像'],
    };
    const labels = LABELS[lang] || LABELS.en;

    const wrap  = document.createElement('div');
    wrap.className = 'likert-wrap';

    const poles = document.createElement('div');
    poles.className = 'likert-poles';
    poles.innerHTML = `<span class="likert-pole">${labels[0]}</span>
                       <span class="likert-pole">${labels[3]}</span>`;
    wrap.appendChild(poles);

    const btns = document.createElement('div');
    btns.className = 'likert-btns';
    const saved = S.answers[S.currentQ];

    labels.forEach((lbl, i) => {
      const val = i + 1;
      const btn = document.createElement('button');
      btn.className = 'likert-btn' + (saved === val ? ' selected' : '');
      btn.dataset.val = val;
      btn.innerHTML = `<div class="lk-circle"></div><span class="lk-label">${lbl}</span>`;
      btn.onclick = () => selectLikert(val);
      btns.appendChild(btn);
    });

    wrap.appendChild(btns);
    grid.appendChild(wrap);

  // ── SITUATION ─────────────────────────────────────────────────
  } else {
    const KEYS = ['A', 'B', 'C', 'D'];
    const saved = S.answers[S.currentQ];
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'situation-opt' + (saved === i ? ' selected' : '');
      const cnText = lang === 'tw' ? (opt.tw || opt.cn) : opt.cn;
      btn.innerHTML = `
        <span class="opt-key-badge">${KEYS[i]}</span>
        <div class="opt-body-en">${opt.en}</div>
        <div class="opt-body-cn">${cnText}</div>`;
      btn.onclick = () => selectSituation(i);
      grid.appendChild(btn);
    });
  }

  document.getElementById('btn-prev').disabled = S.currentQ === 0;
  document.getElementById('btn-next').disabled = S.answers[S.currentQ] === null;
  document.getElementById('btn-next').textContent =
    S.currentQ === QUESTIONS.length - 1 ? 'Submit \u2192' : 'Next \u2192';

  // Card animation
  const card = document.getElementById('quiz-card');
  card.style.opacity = '0';
  card.style.transform = 'translateY(12px)';
  requestAnimationFrame(() => {
    card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
    card.style.opacity = '1';
    card.style.transform = 'translateY(0)';
  });
}

function selectLikert(val) {
  S.answers[S.currentQ] = val;
  document.querySelectorAll('.likert-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.val) === val);
  });
  document.getElementById('btn-next').disabled = false;
}

function selectSituation(idx) {
  S.answers[S.currentQ] = idx;
  document.querySelectorAll('.situation-opt').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
  });
  document.getElementById('btn-next').disabled = false;
}


function selectOption(idx){
  S.answers[S.currentQ]=idx;
  document.querySelectorAll('.option-btn').forEach((b,i)=>b.classList.toggle('selected',i===idx));
  document.getElementById('btn-next').disabled=false;
}
function nextQ(){
  if(S.answers[S.currentQ]===null) return;
  if(S.currentQ<QUESTIONS.length-1){ S.currentQ++; renderQuestion(); }
  else calculateResults();
}
function prevQ(){ if(S.currentQ>0){ S.currentQ--; renderQuestion(); } }

覆", "axis_tension_en": "Build vs Disrupt"}, "ARC_DIP": {"id": 8, "name_cn": "融通·建构者", "name_en": "The Diplomatic Architect", "tagline_cn": "你是那个在利益错综复杂的利益集团中，悄无声息铺设公共基础设施的共识大师。", "description_cn": "你搭系统，但你知道系统能不能跑起来，关键不在技术，在人。你在设计阶段就把所有干系人的诉求想进去了，所以你的方案通常不需要大幅修改——不是因为它完美，而是因为所有人从一开始就参与了。", "work_style_cn": "你在正式开始建系统之前，会先跟每一个受影响的人聊一遍，把他们的顾虑变成系统设计里的一个考量。", "strengths_cn": ["你的系统落地阻力极小，因为相关的人从设计阶段就被带进来了", "能在不同诉求之间找到一个大家都能接受的架构底层逻辑"], "blindspots_cn": ["为了兼顾所有人的意见，有时系统设计会做出不必要的妥协，降低了整体效率"], "careers_cn": ["大厂政企大客户技术 VP", "复杂联盟链架构师", "组织架构变革专家"], "celebrity_hook": {"en": "Satya Nadella (Microsoft CEO - 靠外交手腕与云转型重塑微软生态) |", "zh": "陆奇 (奇绩创坛创始人 - 华人在硅谷及国内兼具顶级架构与极高融通口碑的公约数)", "tw": "陆奇 (奇绩创坛创始人 - 华人在硅谷及国内兼具顶级架构与极高融通口碑的公约数)"}, "tier": "common", "primary_id": "ARC", "secondary_id": "DIP", "inner_opposite_id": "DIS", "axis_num": 1, "axis_cn": "变革轴", "axis_en": "Transformation Axis", "axis_tension_cn": "建设 vs 颠覆", "axis_tension_en": "Build vs Disrupt"}, "ARC_SOV": {"id": 9, "name_cn": "掌控·建构者", "name_en": "The Imperial Architect", "tagline_cn": "你是那个视整个企业为精密沙盘，不允许任何一个模块脱离绝对统治的铁血君王。", "description_cn": "你建系统，而且你说了算。你不需要很多人同意才开始，你需要的是一个清晰的判断和足够的空间去执行。你的框架设计通常很难被质疑，不是因为你压制不同意见，而是因为你想得比别人透。", "work_style_cn": "你习惯独立做完完整的系统设计，然后以「这就是我们要做的」的方式来推进，而不是逐步求共识。", "strengths_cn": ["决策快，推进有力，在需要快速建立框架的阶段效率极高", "你的判断通常是对的，不需要反复验证才能让人信服"], "blindspots_cn": ["有时太快进入「已经想好了」的状态，跳过了本可以发现问题的讨论阶段"], "careers_cn": ["集团董事会主席", "铁腕重组专家", "国防级核心系统总指挥"], "celebrity_hook": {"en": "Larry Ellison (Oracle 创始人 - 极度强势的软件帝国统治者) |", "zh": "任正非 (华为创始人 - 带有强烈军事化统御与系统防线建构色彩)", "tw": "任正非 (华为创始人 - 带有强烈军事化统御与系统防线建构色彩)"}, "tier": "common", "primary_id": "ARC", "secondary_id": "SOV", "inner_opposite_id": "DIS", "axis_num": 1, "axis_cn": "变革轴", "axis_en": "Transformation Axis", "axis_tension_cn": "建设 vs 颠覆", "axis_tension_en": "Build vs Disrupt"}, "ARC_CUR": {"id": 10, "name_cn": "精准·建构者", "name_en": "The High-Fidelity Architect", "tagline_cn": "你是那个对平庸容忍度为零，在显微镜下雕刻完美数字圣殿的极简主义者。", "description_cn": "你是那种会主动把系统范围缩小的建构者。当所有人都在想「还能加什么」，你在想「哪些东西不该有」。你的系统精简、清晰、没有多余的部件，因为你只保留真正必要的。", "work_style_cn": "你在开始建之前会先做一轮「这个到底需不需要」的过滤，把不必要的功能和模块从设计稿上删掉。", "strengths_cn": ["你建的系统维护成本低，因为没有多余的复杂度", "在资源有限的情况下，你能做出最高信息密度的架构决策"], "blindspots_cn": ["有时删得太干净，把本来有价值的扩展可能性也一起砍掉了"], "careers_cn": ["顶级奢侈品/高端硬件产品 VP", "核心算法评审委员会主席", "基础科学研究领头人", "打破常规", "逆向思维", "非线性突破。当他们借助其他轴发力"], "celebrity_hook": {"en": "Jonathan Ive (前 Apple 首席设计官) |", "zh": "张小龙 (微信创始人 - 带有强烈极简与精细化筛选逻辑的产品教父)", "tw": "张小龙 (微信创始人 - 带有强烈极简与精细化筛选逻辑的产品教父)"}, "tier": "common", "primary_id": "ARC", "secondary_id": "CUR", "inner_opposite_id": "DIS", "axis_num": 1, "axis_cn": "变革轴", "axis_en": "Transformation Axis", "axis_tension_cn": "建设 vs 颠覆", "axis_tension_en": "Build vs Disrupt"}, "DIS_ARC": {"id": 11, "name_cn": "构筑·破局者", "name_en": "The Reconstructionist", "tagline_cn": "你是那个在废墟上直接克隆出未来都市的硬核颠覆者。", "description_cn": "你打破旧系统，然后立刻建一个更好的。你不是只会破坏的人——你的颠覆是有建设性的，每次推倒都是为了建出更合理的替代品。这让你比一般的「颠覆者」更难被忽视。", "work_style_cn": "你习惯先拆解现有系统找到根本缺陷，然后直接提出替代框架，跳过「小修小补」的阶段。", "strengths_cn": ["能在别人还在维护旧系统时，直接提出根本性替代方案", "对「这样做是因为一直都是这样」的逻辑有天然免疫力"], "blindspots_cn": ["推倒重建的冲动有时来得比理由更快，没给现有系统公平评估的机会"], "careers_cn": ["Web3 协议创始人", "颠覆性 AI 硬件发明人", "破坏性创新中心 GM"], "celebrity_hook": {"en": "", "zh": "", "tw": ""}, "tier": "rare", "primary_id": "DIS", "secondary_id": "ARC", "inner_opposite_id": "ARC", "axis_num": 1, "axis_cn": "变革轴", "axis_en": "Transformation Axis", "axis_tension_cn": "建设 vs 颠覆", "axis_tension_en": "Build vs Disrupt"}, "DIS_GUA": {"id": 12, "name_cn": "稳健·破局者", "name_en": "The Calculated Rebel", "tagline_cn": "你是那个兜里揣着退路、穿着防弹衣去引爆炸药库的精准逆袭者。", "description_cn": "你是那种「打破，但有节制」的颠覆者。你知道不是所有东西都该被打破，你会花时间判断哪些是真的该换掉的，哪些是需要保留的核心。你的变革是有计划的，不是冲动的。", "work_style_cn": "你打破陈旧规则，但会确保过渡期稳定——变革之前先确认基本盘没有问题。", "strengths_cn": ["能在颠覆的同时保护关键的基础不受损", "变革推进有节奏，团队不会因为变化太快而失去方向感"], "blindspots_cn": ["想同时保住稳定和推进颠覆，有时两边都做不彻底"], "careers_cn": ["激进型危机公关专家", "反垄断诉讼首席律师", "红蓝对抗黑客大统领"], "celebrity_hook": {"en": "", "zh": "", "tw": ""}, "tier": "rare", "primary_id": "DIS", "secondary_id": "GUA", "inner_opposite_id": "ARC", "axis_num": 1, "axis_cn": "变革轴", "axis_en": "Transformation Axis", "axis_tension_cn": "建设 vs 颠覆", "axis_tension_en": "Build vs Disrupt"}, "DIS_PIO": {"id": 13, "name_cn": "先锋·破局者", "name_en": "The Wild West Raider", "tagline_cn": "你是那个不带任何补给，提着刀直接杀进无人区抢占水源的职业悍匪。", "description_cn": "你不只挑战现状，你还同时在探索下一个可能。你的脑子里同时运行着「这个为什么不行」和「接下来可以是什么」两条线。你不等方向确定再行动，你在破坏的过程里就已经在找替代答案了。", "work_style_cn": "你不只挑战现状，还走在最前面探索替代方案，破坏和开拓同时进行。", "strengths_cn": ["同时具备破除旧框架和探索新可能的双重驱动力", "在没有地图的领域也能快速找到方向"], "blindspots_cn": ["探索欲太强，有时一个方向还没跑通就跳到下一个了"], "careers_cn": ["流量黑客（Growth Hacker）", "冷启动阶段产品 VP", "高风险投资人"], "celebrity_hook": {"en": "", "zh": "", "tw": ""}, "tier": "rare", "primary_id": "DIS", "secondary_id": "PIO", "inner_opposite_id": "ARC", "axis_num": 1, "axis_cn": "变革轴", "axis_en": "Transformation Axis", "axis_tension_cn": "建设 vs 颠覆", "axis_tension_en": "Build vs Disrupt"}, "DIS_OPR": {"id": 14, "name_cn": "实战·破局者", "name_en": "The Guerrilla Operative", "tagline_cn": "你是那个不跟你谈战略ppt，直接用纯熟的刺杀技巧干掉竞争对手的泥腿子刺客。", "description_cn": "你打破旧流程的速度，和建立新流程的速度一样快。你不会让颠覆停留在「破坏」阶段，你的下一步永远已经准备好了。别人看到的是破坏，你看到的是重建的机会。", "work_style_cn": "你打破旧流程，然后立刻建立可以运转的替代方案，不留真空。", "strengths_cn": ["颠覆行动有极强的落地性，不停留在概念层面", "打破旧系统的同时能快速建立可运转的替代方案"], "blindspots_cn": ["执行太快，有时跳过了需要说服其他人的关键步骤"], "careers_cn": ["特殊项目突击队长", "企业恶意收购清洗官", "高增长业务线肉搏战负责人"], "celebrity_hook": {"en": "", "zh": "", "tw": ""}, "tier": "rare", "primary_id": "DIS", "secondary_id": "OPR", "inner_opposite_id": "ARC", "axis_num": 1, "axis_cn": "变革轴", "axis_en": "Transformation Axis", "axis_tension_cn": "建设 vs 颠覆", "axis_tension_en": "Build vs Disrupt"}, "DIS_WEA": {"id": 15, "name_cn": "跨界·破局者", "name_en": "The Parasitic Disrupter", "tagline_cn": "你是那个借助别人的网络和供应链，悄悄孵化出自己绞杀武器的寄生虫之王。", "description_cn": "你通过连接不同领域的视角来发现现有系统的盲点。你颠覆的灵感通常来自「别的地方早就有更好的方式了」，然后你把它带过来，让这里的人见识到另一种可能。", "work_style_cn": "你通过连接不同领域的视角发现系统盲点，然后用跨界资源重建更合理的方案。", "strengths_cn": ["能从完全不同的领域找到颠覆当前系统的灵感和资源", "破坏后的重建方案往往比原有方案更具跨界视野"], "blindspots_cn": ["想法来自四面八方，有时难以聚焦在一个最有价值的突破口上"], "careers_cn": ["开放生态套利专家", "跨国流量操盘手", "Web3 商业闭环架构师"], "celebrity_hook": {"en": "", "zh": "", "tw": ""}, "tier": "rare", "primary_id": "DIS", "secondary_id": "WEA", "inner_opposite_id": "ARC", "axis_num": 1, "axis_cn": "变革轴", "axis_en": "Transformation Axis", "axis_tension_cn": "建设 vs 颠覆", "axis_tension_en": "Build vs Disrupt"}, "DIS_ANL": {"id": 16, "name_cn": "深析·破局者", "name_en": "The Logic Assassin", "tagline_cn": "你是那个在精算了几百个技术指标后，一枪打中行业核心死穴的致命刺客。", "description_cn": "你不是随机颠覆的人。你用数据找到系统最脆弱的地方，然后从那里开始破局。你的颠覆有理有据，别人很难说「你只是在破坏」，因为你能清楚地说明为什么这个东西必须被打破。", "work_style_cn": "你用数据找到系统最脆弱的地方，然后精准攻破，不是随机颠覆，是有依据的破局。", "strengths_cn": ["颠覆行动有数据支撑，不是情绪驱动的莽撞", "能清晰说明「为什么这个系统必须被打破」"], "blindspots_cn": ["分析阶段太长，有时错过了最佳的破局时间窗口"], "careers_cn": ["顶级做空机构合伙人", "反垄断经济学家", "AI 自动化替代架构师"], "celebrity_hook": {"en": "", "zh": "", "tw": ""}, "tier": "rare", "primary_id": "DIS", "secondary_id": "ANL", "inner_opposite_id": "ARC", "axis_num": 1, "axis_cn": "变革轴", "axis_en": "Transformation Axis", "axis_tension_cn": "建设 vs 颠覆", "axis_tension_en": "Build vs Disrupt"}, "DIS_CAT": {"id": 17, "name_cn": "燃动·破局者", "name_en": "The Ideological Insurgent", "tagline_cn": "你是那个一句话就能煽动底层员工起义、或者让全网用户对传统大厂发起圣战的狂热旗手。", "description_cn": "你能让别人相信「现状必须改变」。你的颠覆不是一个人的行动，你会把人带动起来，让大家都觉得旧的方式已经不够好了。你是那种能发动变革运动的人，而不只是一个人在角落里抱怨。", "work_style_cn": "你用高度感染力的方式传播「现状必须改变」，让更多人加入颠覆的队伍。", "strengths_cn": ["能将颠覆的必要性讲得让人心甘情愿跟上", "变革运动的天然发起者，不需要正式授权就能凝聚人心"], "blindspots_cn": ["感召力太强，有时把人带动起来了，但具体怎么做还没想清楚"], "careers_cn": ["颠覆性品牌创始人", "危机公关战总指挥", "极端社区意见领袖（KOL）"], "celebrity_hook": {"en": "", "zh": "", "tw": ""}, "tier": "rare", "primary_id": "DIS", "secondary_id": "CAT", "inner_opposite_id": "ARC", "axis_num": 1, "axis_cn": "变革轴", "axis_en": "Transformation Axis", "axis_tension_cn": "建设 vs 颠覆", "axis_tension_en": "Build vs Disrupt"}, "DIS_DIP": {"id": 18, "name_cn": "融通·破局者", "name_en": "The Velvet Revolutionary", "tagline_cn": "你是那个面带微笑、在优雅的举杯碰撞中悄然完成政变的丝绒杀手。", "description_cn": "你是那种让变革悄悄发生的人。你不需要正面冲突，你会通过高超的沟通和关系管理，让所有人觉得「改变是自然而然的事」。等大家发现旧规则已经不存在了，你早就走了三步了。", "work_style_cn": "你用高超的沟通技巧悄悄推进颠覆，让所有人觉得这是他们自己的想法。", "strengths_cn": ["颠覆过程几乎不产生阻力，因为你让所有人都觉得自己是受益者", "能在最保守的组织里推动根本性变革"], "blindspots_cn": ["过于迂回，在需要快速行动的危机时刻反应会慢"], "careers_cn": ["企业合规与重组顾问", "多方跨境破产清算专家", "组织变革温和推进者"], "celebrity_hook": {"en": "", "zh": "", "tw": ""}, "tier": "rare", "primary_id": "DIS", "secondary_id": "DIP", "inner_opposite_id": "ARC", "axis_num": 1, "axis_cn": "变革轴", "axis_en": "Transformation Axis", "axis_tension_cn": "建设 vs 颠覆", "axis_tension_en": "Build vs Disrupt"}, "DIS_SOV": {"id": 19, "name_cn": "掌控·破局者", "name_en": "The Dictatorial Rebel", "tagline_cn": "你是那个打着解放旗号砸碎旧神座，却在当天下午为自己建立更宏大王座的暴君。", "description_cn": "你不需要征求同意就能推进颠覆。你有一种天然的权威感，让「打破规则」这件事在你身上显得理所当然。别人颠覆需要争取支持，你只需要宣布你要做什么。", "work_style_cn": "你不需要太多人同意就能推进颠覆，你的权威感让改变自然而然地发生。", "strengths_cn": ["颠覆行动有强大的执行力和推进速度", "天然具备让他人追随的权威，不需要解释太多"], "blindspots_cn": ["有时跳过了必要的对齐步骤，变革落地后发现团队没跟上"], "careers_cn": ["激进维权基金管理人（Hostile Takeover Artist）", "风投机构清理门户的合伙人"], "celebrity_hook": {"en": "", "zh": "", "tw": ""}, "tier": "rare", "primary_id": "DIS", "secondary_id": "SOV", "inner_opposite_id": "ARC", "axis_num": 1, "axis_cn": "变革轴", "axis_en": "Transformation Axis", "axis_tension_cn": "建设 vs 颠覆", "axis_tension_en": "Build vs Disrupt"}, "DIS_CUR": {"id": 20, "name_cn": "精准·破局者", "name_en": "The Surgical Sniper", "tagline_cn": "你是那个嫌弃满街垃圾，只用一刀就精准切除行业毒瘤的手术刀医生。", "description_cn": "你不会随便颠覆。你有很高的标准来判断「哪个东西值得被打破」，不是所有旧规则都在你的打击范围里——只有那些真正应该被替换的。你的颠覆是有选择的，所以每次破局都打在要害上。", "work_style_cn": "你只颠覆值得颠覆的，用高度的判断力决定哪些系统该被打破，哪些该被保留。", "strengths_cn": ["不会随机破坏，每一次颠覆都是经过判断的精准行动", "能区分「需要颠覆的旧规则」和「值得保留的核心价值」"], "blindspots_cn": ["判断标准太高，有时错过了用小颠覆快速验证的机会"], "careers_cn": ["独立精品 App 创始人", "前沿美学设计总监", "流程诊断专家", "高可用性", "防御性架构", "合规合流"], "celebrity_hook": {"en": "", "zh": "", "tw": ""}, "tier": "rare", "primary_id": "DIS", "secondary_id": "CUR", "inner_opposite_id": "ARC", "axis_num": 1, "axis_cn": "变革轴", "axis_en": "Transformation Axis", "axis_tension_cn": "建设 vs 颠覆", "axis_tension_en": "Build vs Disrupt"}, "GUA_ARC": {"id": 21, "name_cn": "蓝图·守护者", "name_en": "The Industrial Standardizer", "tagline_cn": "你是那个用冰冷的工业级标准，为行业强行套上安全枷锁的终极判官。", "description_cn": "你守护的不是「现在有的东西」，而是「应该长期存在的框架」。你会主动去建立那些能让团队稳定运转很多年的系统，然后把它们保护起来不被随意改动。", "work_style_cn": "你在稳住现有基础的同时，会主动建立能长期运转的框架，让稳定有系统的支撑。", "strengths_cn": ["能在保持稳定的同时建立可以长期使用的系统", "你守护的东西往往比你预期的活得更久"], "blindspots_cn": ["对框架的执着有时会让你对真正该更新的部分过于保守"], "careers_cn": ["首席质量官（CQO）", "国家级基础建设总工程师", "行业标准评审委员会主席"], "celebrity_hook": {"en": "W. Edwards Deming（戴明，质量管理大师）", "zh": "国家电网/中国中铁的核心总工程师", "tw": "国家电网/中国中铁的核心总工程师"}, "tier": "common", "primary_id": "GUA", "secondary_id": "ARC", "inner_opposite_id": "PIO", "axis_num": 2, "axis_cn": "探索轴", "axis_en": "Exploration Axis", "axis_tension_cn": "稳定 vs 探索", "axis_tension_en": "Stability vs Explore"}, "GUA_DIS": {"id": 22, "name_cn": "逆向·守护者", "name_en": "The Red-Team Defended", "tagline_cn": "为了打造绝对不崩的防线，你每天都在脑海里将自己的公司毁灭一千次。", "description_cn": "你是那种「保守型颠覆者」——这听起来矛盾，但你就是这样。你不会随便推倒现有的东西，但当你确认某样东西真的该换掉，你会比任何人都干净利落。", "work_style_cn": "你平时会守住基本盘，但一旦判断某个部分必须改变，你会快速、彻底地执行，没有拖泥带水。", "strengths_cn": ["你的改变有充分依据，不是冲动之举，落地后的阻力很小", "能在稳定和变革之间找到别人找不到的平衡点"], "blindspots_cn": ["启动改变的门槛太高，有时在该更快行动的时候还在评估风险"], "careers_cn": ["首席信息安全官（CISO）", "混沌工程总监", "企业破局压力测试专家"], "celebrity_hook": {"en": "Adrian Cockcroft（Netflix 混沌工程混沌猴子 Chaos Monkey 的主导者）", "zh": "头部科技大厂重组期的核心安全架构师", "tw": "头部科技大厂重组期的核心安全架构师"}, "tier": "common", "primary_id": "GUA", "secondary_id": "DIS", "inner_opposite_id": "PIO", "axis_num": 2, "axis_cn": "探索轴", "axis_en": "Exploration Axis", "axis_tension_cn": "稳定 vs 探索", "axis_tension_en": "Stability vs Explore"}, "GUA_PIO": {"id": 23, "name_cn": "拓荒·守护者", "name_en": "The Forward Sentry", "tagline_cn": "你是那个把防线直接推进到敌方前沿、在无主之地修筑防波堤的铁血前哨。", "description_cn": "你的探索是有安全网的。你对新方向很感兴趣，但你不会在没有退路的情况下押注。你的进取不是冲动，而是「做好了准备才往前走」的那种稳健的探索。", "work_style_cn": "你在探索新方向之前，会先确认基本盘是安全的，给自己留好退路，然后才往前走。", "strengths_cn": ["能在保持稳定的 2, "axis_cn": "探索轴", "axis_en": "Exploration Axis", "axis_tension_cn": "稳定 vs 探索", "axis_tension_en": "Stability vs Explore"}, "PIO_GUA": {"id": 33, "name_cn": "固防·先行者", "name_en": "The Armored Explorer", "tagline_cn": "你可以冲进没有任何补给的无人区，但你必须穿着全套的重型防弹衣。", "description_cn": "你是那种「做好了准备再出发」的探索者。你对新方向很感兴趣，但你不会在没有退路的情况下押注。你的探索是稳健的，你知道怎么在前进的同时保护好已有的成果。", "work_style_cn": "你在探索新方向之前，会先确保基本盘稳固，给自己留好退路。", "strengths_cn": ["你的探索几乎不会让团队陷入失控", "在不确定的环境里，你是少数既能往前走又能守住的人"], "blindspots_cn": ["准备阶段可能拉得太长，在窗口期有限的情况下容易慢半拍"], "careers_cn": ["创新业务风控副总裁", "硬科技出海合规负责人", "大型企业“第二曲线”转型总指挥"], "celebrity_hook": {"en": "Satya Nadella (Microsoft CEO - 带领微软全面向 AI 转型，但每一步都伴随着严苛的企业级合规与安全防线)", "zh": "头部金融科技巨头中，负责探索 Web3/RWA 资产代币化等前沿业务的温和合规派掌门", "tw": "头部金融科技巨头中，负责探索 Web3/RWA 资产代币化等前沿业务的温和合规派掌门"}, "tier": "scarce", "primary_id": "PIO", "secondary_id": "GUA", "inner_opposite_id": "GUA", "axis_num": 2, "axis_cn": "探索轴", "axis_en": "Exploration Axis", "axis_tension_cn": "稳定 vs 探索", "axis_tension_en": "Stability vs Explore"}, "PIO_OPR": {"id": 34, "name_cn": "铁履·先行者", "name_en": "The Trench Warfare Captain", "tagline_cn": "别跟我谈虚无缥缈的未来，老子只想带着突击队，在天亮前拿下这块阵地。", "description_cn": "你发现机会，然后立刻开始执行。你不是那种「想了很久但没有做」的人，你想到了就开始动。你的探索和你的行动力是一体的，所以你往往是第一个把新想法变成现实的人。", "work_style_cn": "你在发现新机会之后不会花太多时间准备，你习惯边做边学，用行动来验证方向。", "strengths_cn": ["发现机会到开始行动的速度极快，很少会「想得太多但做得太少」", "能在早期就建立起在新领域的先发优势"], "blindspots_cn": ["行动太快，有时在方向还没有完全验证的时候就投入了太多资源"], "careers_cn": ["新业务线落地负责人", "铁血增长总监（Head of Execution）", "企业突击队 Captain"], "celebrity_hook": {"en": "Andy Jassy (Amazon 前 AWS 主管兼现任 CEO - 将贝佐斯的云主张用恐怖的工程执行力逐一在地面建成的铁履者)", "zh": "字节跳动/拼多多早期带队深入一线、用高强度执行力硬啃新业务的核心副总裁", "tw": "字节跳动/拼多多早期带队深入一线、用高强度执行力硬啃新业务的核心副总裁"}, "tier": "scarce", "primary_id": "PIO", "secondary_id": "OPR", "inner_opposite_id": "GUA", "axis_num": 2, "axis_cn": "探索轴", "axis_en": "Exploration Axis", "axis_tension_cn": "稳定 vs 探索", "axis_tension_en": "Stability vs Explore"}, "PIO_WEA": {"id": 35, "name_cn": "蛛网·先行者", "name_en": "The Ecosystem Arbitrageur", "tagline_cn": "你从不自己制造武器，你只负责在新旧大陆之间搭建桥梁，收干所有的暴利差价。", "description_cn": "你探索新领域，同时在不同世界之间建立连接。你是那种能看出「这两件本来没有关系的事其实可以结合在一起」的人，而且你会真的去做这个结合。", "work_style_cn": "你在探索的过程中会主动寻找跨领域的连接机会，让不同世界的资源为你的新方向服务。", "strengths_cn": ["你发现的新机会往往有多个领域的资源支撑，落地能力更强", "跨界视野让你能看到单一领域的人看不到的机会"], "blindspots_cn": ["方向太多，有时难以聚焦，每一件事都想做但每一件都做得浅"], "careers_cn": ["跨国商务拓展高级副总裁（SVP of Global BD）", "生态投资合伙人", "平台型产品首席大客户架构师"], "celebrity_hook": {"en": "Yuri Milner (DST Global 创始人 - 凭借独特的全球科技生态网络，精准在早期跨国捕获社交与电商红利的巨鳄)", "zh": "跨境电商/出海链条中，将中国供应链与海外红人流量网络精妙拼接的超级资源操盘手", "tw": "跨境电商/出海链条中，将中国供应链与海外红人流量网络精妙拼接的超级资源操盘手"}, "tier": "scarce", "primary_id": "PIO", "secondary_id": "WEA", "inner_opposite_id": "GUA", "axis_num": 2, "axis_cn": "探索轴", "axis_en": "Exploration Axis", "axis_tension_cn": "稳定 vs 探索", "axis_tension_en": "Stability vs Explore"}, "PIO_ANL": {"id": 36, "name_cn": "精算·先行者", "name_en": "The Algorithm Hunter", "tagline_cn": "你的直觉来自于冰冷的数学公式。在风口形成的三年前，你已经在数据洪流中看到了它的骸骨。", "description_cn": "你探索新方向，但你需要数据来确认你走的是对的路。你不是盲目的探索者，你会在前进的过程中持续收集信号，用来验证方向或调整路线。你的探索是有方法论的。", "work_style_cn": "你在探索的同时持续收集和分析数据，用来验证方向是否值得继续，而不是凭感觉一路走到底。", "strengths_cn": ["你的探索有数据支撑，不是纯粹的直觉驱动", "能在探索的过程中及时发现方向偏差并修正"], "blindspots_cn": ["对数据的需求有时会让你在早期信号不足的情况下踌躇不前"], "careers_cn": ["首席数据科学家", "硬科技风投量化合伙人", "前沿 AI 算法战略总监"], "celebrity_hook": {"en": "Jensen Huang (NVIDIA 创始人 - 坚信加速计算与物理模拟的第一性原理，在 AI 爆发十年前就完成了铁血布局)", "zh": "宿华 (快手联合创始人 - 用严密的算法与数据逻辑推演，在早期定义并捕获短视频红利的数字极客)", "tw": "宿华 (快手联合创始人 - 用严密的算法与数据逻辑推演，在早期定义并捕获短视频红利的数字极客)"}, "tier": "scarce", "primary_id": "PIO", "secondary_id": "ANL", "inner_opposite_id": "GUA", "axis_num": 2, "axis_cn": "探索轴", "axis_en": "Exploration Axis", "axis_tension_cn": "稳定 vs 探索", "axis_tension_en": "Stability vs Explore"}, "PIO_CAT": {"id": 37, "name_cn": "神启·先行者", "name_en": "The Messianic Pioneer", "tagline_cn": "你只需要振臂一呼，所有人就会像着了魔一样，变卖资产跟着你冲向未知的火山。", "description_cn": "你是那种让人跟着你一起往未知跑的人。你对新方向的热情是真实的，而且具有感染力——别人不是被你说服的，是被你感染的。你开路的时候身后总是有一批人。", "work_style_cn": "你用你对新方向的真实热情来带动别人，让探索变成一件大家都想参与的事。", "strengths_cn": ["你的探索从来不是一个人的冒险，你天然会吸引同行者", "能让团队在不确定的情况下保持兴奋和信心"], "blindspots_cn": ["有时带着大家冲向一个还没有完全想清楚的方向，导致集体走了弯路"], "careers_cn": ["颠覆性创业公司 CEO", "首席布道师（Chief Evangelist）", "早期项目天使合伙人"], "celebrity_hook": {"en": "Elon Musk (Tesla/SpaceX 创始人 - 完美的先行者与疯狂布道者的结合体，靠愿景和硬核技术双轮引爆世界)", "zh": "罗永浩 (在多次科技/电商连续创业早期，具备恐怖声量与粉丝自发追随能量的布道领袖)", "tw": "罗永浩 (在多次科技/电商连续创业早期，具备恐怖声量与粉丝自发追随能量的布道领袖)"}, "tier": "scarce", "primary_id": "PIO", "secondary_id": "CAT", "inner_opposite_id": "GUA", "axis_num": 2, "axis_cn": "探索轴", "axis_en": "Exploration Axis", "axis_tension_cn": "稳定 vs 探索", "axis_tension_en": "Stability vs Explore"}, "PIO_DIP": {"id": 38, "name_cn": "穿梭·先行者", "name_en": "The Frontier Diplomat", "tagline_cn": "你是那个在未知星系与土著酋长优雅碰杯，在无声间为帝国带回一整个星系开采权的穿梭外交官。", "description_cn": "你在进入新领域的时候，会先建立关系。你知道在陌生的地方单打独斗很难，所以你会先找到当地的关键人物，建立信任，然后再真正开始探索。你的探索是有外交手腕的。", "work_style_cn": "你在探索新方向时，会先花时间建立与关键人物的关系，把进入新领域的阻力降到最低。", "strengths_cn": ["你在新领域的适应速度很快，因为你总能找到对的人帮助你", "能在陌生环境里快速建立信任和合作基础"], "blindspots_cn": ["关系建立的过程有时会拖慢探索的速度，在时间窗口很短的情况下代价较大"], "careers_cn": ["全球政府关系副总裁", "复杂牌照准入特使", "跨行业战略重组总操盘手"], "celebrity_hook": {"en": "Eric Schmidt (前 Google CEO - 专门负责在谷歌全球扩张早期，处理政府关系、法律版权与错综复杂多方博弈的穿梭者)", "zh": "大厂里负责带队杀入传统垄断行业（如智慧医疗、网约车合规化）并成功摆平各方行政关系的 GR 顶级高管", "tw": "大厂里负责带队杀入传统垄断行业（如智慧医疗、网约车合规化）并成功摆平各方行政关系的 GR 顶级高管"}, "tier": "scarce", "primary_id": "PIO", "secondary_id": "DIP", "inner_opposite_id": "GUA", "axis_num": 2, "axis_cn": "探索轴", "axis_en": "Exploration Axis", "axis_tension_cn": "稳定 vs 探索", "axis_tension_en": "Stability vs Explore"}, "PIO_SOV": {"id": 39, "name_cn": "封疆·先行者", "name_en": "The Shadow Overlord", "tagline_cn": "你打下这片江山不是为了给皇帝进贡，而是为了在离中央最远的地方，建立你自己的独立王国。", "description_cn": "你走在前面，而且你确信自己的方向是对的。你不需要太多人同意你才开始探索，你的判断力和权威感让你能独立开路。别人可能一开始觉得你太冒险，但最后往往是你对的。", "work_style_cn": "你在判断一个新方向值得探索之后，不需要太多授权就能快速推进，你的权威感是你的执行力的一部分。", "strengths_cn": ["探索速度快，不会因为等待共识而错过时机", "你的判断有足够的可信度，让跟随你的人能放心往前走"], "blindspots_cn": ["有时过于相信自己的判断，在需要更多信息的情况下过早锁定方向"], "careers_cn": ["集团独立子公司 CEO", "全权分部（Region）总裁", "恶意收购与重组基金管理人"], "celebrity_hook": {"en": "Robert Moses (罗伯特·摩西 - 纽约城市规划史上的“筑路总师”，在远离市长的边缘部门建立起庞大的基建割据帝国)", "zh": "大厂早期带队开拓西南/海外分公司，成气候后彻底将分部做成“独立割据王国”的铁血封疆大吏", "tw": "大厂早期带队开拓西南/海外分公司，成气候后彻底将分部做成“独立割据王国”的铁血封疆大吏"}, "tier": "scarce", "primary_id": "PIO", "secondary_id": "SOV", "inner_opposite_id": "GUA", "axis_num": 2, "axis_cn": "探索轴", "axis_en": "Exploration Axis", "axis_tension_cn": "稳定 vs 探索", "axis_tension_en": "Stability vs Explore"}, "PIO_CUR": {"id": 40, "name_cn": "挑剔·先行者", "name_en": "The Luxury Treasure Hunter", "tagline_cn": "新大陆遍地都是垃圾，而你只会在满地淤泥中，精准挖出那一颗价值连城的极简钻石。", "description_cn": "你探索很多，但你只追求值得追的。你的好奇心是真实的，但你不会对所有新方向都投入一样的精力——你有很高的判断力来决定「这个值不值得深入」。你的探索有选择性，所以每次押注都比较准。", "work_style_cn": "你在发现新方向之后，会先做一轮快速评估，确认它值得投入，再真正开始探索。", "strengths_cn": ["你的探索资源不会被分散在不值得的方向上", "每次真正投入的探索，成功率都比一般探索者高"], "blindspots_cn": ["筛选标准太高，有时在评估阶段就否定了本来值得一试的方向"], "careers_cn": ["前沿设计驱动型硬件 Product VP", "高端风投审美合伙人（Sourcing Partner）", "精品应用工作室创始人", "里程碑强力推进", "超强工程化交付", "拒绝一切概念虚妄"], "celebrity_hook": {"en": "Brian Chesky (Airbnb 创始人 - 拥有强烈的设计师内核，在一片混乱的短租市场中靠极致的设计审美和筛选机制趟出一条血路)", "zh": "独立出海精品消费级硬件/轻奢级 App 创始人 (对产品的极致克制、调性与品味死死卡住的先行者)", "tw": "独立出海精品消费级硬件/轻奢级 App 创始人 (对产品的极致克制、调性与品味死死卡住的先行者)"}, "tier": "scarce", "primary_id": "PIO", "secondary_id": "CUR", "inner_opposite_id": "GUA", "axis_num": 2, "axis_cn": "探索轴", "axis_en": "Exploration Axis", "axis_tension_cn": "稳定 vs 探索", "axis_tension_en": "Stability vs Explore"}, "OPR_ARC": {"id": 41, "name_cn": "蓝图·执行者", "name_en": "The Master General Contractor", "tagline_cn": "把天马行空的 PPT 宏大愿景，变成脚下每一颗精准浇灌的钢筋混凝土。", "description_cn": "你是那种「想清楚了就开始做」的人，但你想得比别人都快。你能在很短的时间内把一个方向转化成可以执行的计划，然后立刻开始推进。你不需要完整的蓝图才能动，你边做边完善。", "work_style_cn": "你会在脑子里快速建立一个系统框架，然后立刻开始执行，不等到框架完整才动。", "strengths_cn": ["在需要快速建立可运转框架的场景里，你是最高效的人", "能同时保持战略清晰度和执行速度，不互相牺牲"], "blindspots_cn": ["有时框架没想透就开始做，中途需要大幅修正，反而比慢下来想清楚花的时间更多"], "careers_cn": ["首席运营官（COO）", "超级项目总指挥（Program Director）", "复杂硬件平台交付总监"], "celebrity_hook": {"en": "Gwynne Shotwell (SpaceX 总裁兼 COO s_num": 3, "axis_cn": "边界轴", "axis_en": "Boundary Axis", "axis_tension_cn": "专注 vs 跨界", "axis_tension_en": "Focus vs Synthesize"}, "OPR_PIO": {"id": 44, "name_cn": "奔袭·执行者", "name_en": "The Long-Range Campaigner", "tagline_cn": "不需要后方补给，不需要集团安慰，给我一个方向，天亮前老子把红旗插上山头。", "description_cn": "你是那种「发现机会之后立刻把它做出来」的人。你不只是在看趋势，你在把趋势变成产品、流程或结果。你的执行力让你能比别人更快地把新方向变成现实。", "work_style_cn": "你在发现新机会后会快速评估可行性，然后立刻开始执行，不在讨论阶段停留太久。", "strengths_cn": ["从发现机会到开始执行的速度极快，经常是第一个把新想法做出来的人", "能在不确定的环境里保持高速的行动节奏"], "blindspots_cn": ["行动太快，有时在方向还没有充分验证的情况下就投入了大量资源"], "careers_cn": ["新业务冷启动负责人", "高风险出海业务线 GM", "竞争性攻坚项目突击队 Captain"], "celebrity_hook": {"en": "George S. Patton (巴顿将军 - 以不顾后勤补给、超速超长距离大纵深奔袭闪电战著称的铁血将领)", "zh": "大厂开拓五环外下沉市场、社区团购或出海地推早期，带领几百个地推铁军疯狂开城的野战高管", "tw": "大厂开拓五环外下沉市场、社区团购或出海地推早期，带领几百个地推铁军疯狂开城的野战高管"}, "tier": "common", "primary_id": "OPR", "secondary_id": "PIO", "inner_opposite_id": "WEA", "axis_num": 3, "axis_cn": "边界轴", "axis_en": "Boundary Axis", "axis_tension_cn": "专注 vs 跨界", "axis_tension_en": "Focus vs Synthesize"}, "OPR_WEA": {"id": 45, "name_cn": "整合·执行者", "name_en": "The Supply-Chain Maestro", "tagline_cn": "我不需要自己会写代码或造硬件，我只需要把全世界最顶级的供应商像齿轮一样咬合起来。", "description_cn": "你是那种能把跨界资源快速变成可交付成果的人。你不只是连接不同领域，你能把这些连接转化成实际的产出。你的执行力让跨界合作不停留在「聊一聊」的阶段。", "work_style_cn": "你会在跨领域合作中快速识别可以执行的节点，推动合作从讨论变成实际的交付物。", "strengths_cn": ["能把跨界合作的结果快速落地，不停留在会议和框架层面", "在多方协作的项目里，你是推进速度最快的那个"], "blindspots_cn": ["有时为了快速推进，跳过了一些需要更深度整合的跨领域细节"], "careers_cn": ["首席供应链官（CSCO）", "全球外包集成总监", "跨界平台生态总交付"], "celebrity_hook": {"en": "Tim Cook (Apple 早期作为运营 VP，重构全球苹果供应链、将其精细化控制到零库存的运营大师形态)", "zh": "头部新能源车企/跨境电商平台中，负责调度上万家跨界供应商并在既定时间推出爆款硬件的供应链老大", "tw": "头部新能源车企/跨境电商平台中，负责调度上万家跨界供应商并在既定时间推出爆款硬件的供应链老大"}, "tier": "common", "primary_id": "OPR", "secondary_id": "WEA", "inner_opposite_id": "WEA", "axis_num": 3, "axis_cn": "边界轴", "axis_en": "Boundary Axis", "axis_tension_cn": "专注 vs 跨界", "axis_tension_en": "Focus vs Synthesize"}, "OPR_ANL": {"id": 46, "name_cn": "极数·执行者", "name_en": "The Digital Taskmaster", "t "}, "WEA_OPR": {"id": 55, "name_cn": "督工·织网者", "name_en": "The Supply-Chain Maestro", "tagline_cn": "我不需要我的团队写一行代码、干一件脏活，我只负责让上千家外包像钟表齿轮一样为我交付。", "description_cn": "你是那种能把跨界资源快速变成可交付成果的人。你不只是在不同领域之间建立连接，你还能把这些连接转化成实际的项目和产出。你的执行力让跨界合作不停留在「聊一聊」的层面。", "work_style_cn": "你在识别跨界连接机会之后会快速推进落地，不让它停留在想法阶段。", "strengths_cn": ["跨界合作在你手上能快速从想法变成实际产出", "在多方协作的项目里，你是推进速度最快的人"], "blindspots_cn": ["有时为了快速推进而跳过了跨领域整合中需要更深度处理的细节"], "careers_cn": ["首席供应链官（CSCO）", "全球外包集成总监", "跨界平台生态总交付"], "celebrity_hook": {"en": "Tim Cook (Apple 早期作为运营 VP，重构全球苹果供应链、将其精细化控制到零库存的运营大师形态)", "zh": "头部跨境电商平台中，负责调度数万家中小外贸工厂、并在最短时间内将柔性供应链商品送达全球的硬核运营负责人", "tw": "头部跨境电商平台中，负责调度数万家中小外贸工厂、并在最短时间内将柔性供应链商品送达全球的硬核运营负责人"}, "tier": "rare", "primary_id": "WEA", "secondary_id": "OPR", "inner_opposite_id": "OPR", "axis_num": 3, "axis_cn": "边界轴", "axis_en": "Boundary Axis", "axis_tension_cn": "专注 vs 跨界", "axis_tension_en": "Focus vs Synthesize"}, "WEA_ANL": {"id": 56, "name_cn": "数网·织网者", "name_en": "The Data Network Actuary", "tagline_cn": "人情会撒谎，但生态节点之间的调用数据、资金流向和降维概率模型，从来不骗人。", "description_cn": "你从不同领域收集信号，然后用分析来找到这些信号之间的规律。你是那种能看到「三个本来没有关系的趋势，其实在指向同一个方向」的人。你的洞察来自跨界，你的分析让它变得可信。", "work_style_cn": "你会系统性地收集不同领域的信号，然后用分析框架把它们整合成有意义的洞察。", "strengths_cn": ["能从跨领域信号里发现别人看不到的规律", "你的跨界洞察有数据支撑，不是纯粹的直觉"], "blindspots_cn": ["信息来源太多，有时分析的工作量超过了洞察的实际价值"], "careers_cn": ["首席数据官（CDO）", "流量清算系统架构师", "AI 自动化生态机制设计总监"], "celebrity_hook": {"en": "Harry Markowitz (马科维茨，现代投资组合理论奠基人 - 将各类资产进行精妙量化拼接的先驱)", "zh": "大厂广告联盟 / 算法派发系统（如穿山甲、广告交易平台 ADX）背后的首席量化流量机制架构师", "tw": "大厂广告联盟 / 算法派发系统（如穿山甲、广告交易平台 ADX）背后的首席量化流量机制架构师"}, "tier": "rare", "primary_id": "WEA", "secondary_id": "ANL", "inner_opposite_id": "OPR", "axis_num": 3, "axis_cn": "边界轴", "axis_en": "Boundary Axis", "axis_tension_cn": "专注 vs 跨界", "axis_tension_en": "Focus vs Synthesize"}, "WEA_CAT": {"id": 57, "name_cn": "布道·织网者", "name_en": "The Ideological Networker", "tagline_cn": "你的网不需要金钱和协议去维系，你只用一句话，就能让上百万独立个体为了一个共同愿景疯狂共建。", "description_cn": "你是那种能让来自不同世界的人为同一件事兴奋起来的人。你建立连接，然后用你的热情让这些连接激活。你不只是中间人，你是催化剂——你在场的时候，合作会比没有你的时候进展快很多。", "work_style_cn": "你用你对跨界合作的真实热情来带动不同领域的人，让合作从可能变成真实发生。", "strengths_cn": ["能让来自完全不同背景的人对同一个目标感到兴奋", "你的存在让跨界合作的推进速度比一般协调者快很多"], "blindspots_cn": ["热情有时掩盖了合作中真实存在的利益冲突，等热情消退后问题才浮现"], "careers_cn": ["全球开发者生态总监（Head of DevRel）", "开源基金会执行主席", "首席创作者生态官"], "celebrity_hook": {"en": "Linus Torvalds (Linux 之父) / 早期具有极强现实扭曲场的开源生态旗手", "zh": "罗永浩 (在多次科技/电商连续创业早期，具备恐怖声量并能迅速组建跨界粉丝生态的领袖)", "tw": "罗永浩 (在多次科技/电商连续创业早期，具备恐怖声量并能迅速组建跨界粉丝生态的领袖)"}, "tier": "rare", "primary_id": "WEA", "secondary_id": "CAT", "inner_opposite_id": "OPR", "axis_num": 3, "axis_cn": "边界轴", "axis_en": "Boundary Axis", "axis_tension_cn": "专注 vs 跨界", "axis_tension_en": "Focus vs Synthesize"}, "WEA_DIP": {"id": 58, "name_cn": "融通·织网者", "name_en": "The Velvet Alliance Architect", "tagline_cn": "在利益错综复杂的修罗场里，你在面带微笑的杯盏碰撞中，悄无声息地完成了整个行业的合纵连横。", "description_cn": "你是职场里的黄金枢纽——你能看懂不同领域和利益集团的逻辑，然后找到让大家各取所需的合作方式。你的谈判不是对立的，是帮所有人找到一个「我也得到了我想要的」的方案。", "work_style_cn": "你在跨界合作中扮演翻译者和调解者的角色，让不同背景的人能真正对话，而不只是表面上达成共识。", "strengths_cn": ["能在跨领域合作中让各方都感到自己的诉求被理解", "你促成的合作往往比其他方式达成的更持久"], "blindspots_cn": ["照顾各方利益的过程有时会让推进节奏慢于实际需要"], "careers_cn": ["多方战略重组落地协调官", "复杂合资企业生态总经理", "集团政企大客户战略 VP"], "celebrity_hook": {"en": "Henry Kissinger (基辛格，均势外交与风险制衡大师)", "zh": "陆奇 (奇绩创坛创始人 - 在多方复杂背景大厂中，兼具顶级整合手腕与极高各方融通公约数的教父)", "tw": "陆奇 (奇绩创坛创始人 - 在多方复杂背景大厂中，兼具顶级整合手腕与极高各方融通公约数的教父)"}, "tier": "rare", "primary_id": "WEA", "secondary_id": "DIP", "inner_opposite_id": "OPR", "axis_num": 3, "axis_cn": "边界轴", "axis_en": "Boundary Axis", "axis_tension_cn": "专注 vs 跨界", "axis_tension_en": "Focus vs Synthesize"}, "WEA_SOV": {"id": 59, "name_cn": "掌控·织网者", "name_en": "The Imperial Ecosystem Overlord", "tagline_cn": "我允许你在我的网里赚取财富，但你必须明白：谁才是这个数字帝国的唯一君王。", "description_cn": "你的网络是你权威的来源。你认识的人、你建立的跨界连接，给了你一种超越职位本身的影响力。你不需要正式头衔，你的存在本身就是一种资源。", "work_style_cn": "你通过建立广泛的跨界网络来积累影响力，让你的判断和行动有更多人愿意支持。", "strengths_cn": ["你的影响力来自真实的网络价值，不依赖职位", "在需要跨界协调的场景里，你的权威无可替代"], "blindspots_cn": ["权威太分散，有时在需要快速集中决策的场景里显得不够果断"], "careers_cn": ["集团独立子公司 CEO", "超级平台生态掌门人", "集团董事会主席"], "celebrity_hook": {"en": "Larry Ellison (Oracle 创始人 - 极度强势的软件、数据库生态及集权网络统治者)", "zh": "任正非 (华为创始人 - 带有强烈军事化统御与系统防线建构色彩)", "tw": "任正非 (华为创始人 - 带有强烈军事化统御与系统防线建构色彩)"}, "tier": "rare", "primary_id": "WEA", "secondary_id": "SOV", "inner_opposite_id": "OPR", "axis_num": 3, "axis_cn": "边界轴", "axis_en": "Boundary Axis", "axis_tension_cn": "专注 vs 跨界", "axis_tension_en": "Focus vs Synthesize"}, "WEA_CUR": {"id": 60, "name_cn": "精准·织网者", "name_en": "The High-Fidelity Curator", "tagline_cn": "我的网络里不需要数百万的垃圾流量，我只要那十个能改变世界品味的顶级节点。", "description_cn": "你接触很多领域，但你只连接值得连接的。你有很高的判断力来决定「哪个跨界合作真的有价值，哪个只是看起来有趣」。你的网络不是最广的，但每一个连接都是精选过的。", "work_style_cn": "你在拓展跨界网络的同时，会用高标准来筛选值得深入的连接，不把精力分散在低价值的合作上。", "strengths_cn": ["你的跨界网络质量极高，每一个连接都有明确的价值", "在需要调用资源的时候，你的网络几乎不会让你失望"], "blindspots_cn": ["筛选标准太高，有时在早期就否定了本来值得探索的连接机会"], "careers_cn": ["核心生态评审委员会主席", "精品消费级硬件 Product VP", "高端美学设计总监", "因果推演", "底层模型", "客观冷酷"], "celebrity_hook": {"en": "Jonathan Ive (前 Apple 首席设计官 - 极简美学与硬核软硬件生态整合的代表)", "zh": "张小龙 (微信创始人 - 带有强烈极简与精细化筛选逻辑、对合作入口死死克制的产品教父)", "tw": "张小龙 (微信创始人 - 带有强烈极简与精细化筛选逻辑、对合作入口死死克制的产品教父)"}, "tier": "rare", "primary_id": "WEA", "secondary_id": "CUR", "inner_opposite_id": "OPR", "axis_num": 3, "axis_cn": "边界轴", "axis_en": "Boundary Axis", "axis_tension_cn": "专注 vs 跨界", "axis_tension_en": "Focus vs Synthesize"}, "ANL_ARC": {"id": 61, "name_cn": "架构·洞察者", "name_en": "The Algorithm Architect", "tagline_cn": "你拒绝一切玄学。你负责将错综复杂的现实商业，降维重构为严密的代码与算法母舰。", "description_cn": "你用数据来设计系统。你不只是在分析现状，你在用分析结果来决定「接下来应该建什么」。你的系统设计不是来自直觉，而是来自你对底层数据的深度理解。", "work_style_cn": "你在开始设计之前会先做深度的数据分析，用分析结果来指导架构决策。", "strengths_cn": ["你的系统设计有数据支撑，不是靠感觉建的", "能在分析阶段发现别人在建好了才会发现的问题"], "blindspots_cn": ["分析做得太深，有时在该开始建的阶段还在继续分析"], "careers_cn": ["核心 AI 算法架构总监", "硬科技投研总监", "首席数据官（CDO）"], "celebrity_hook": {"en": "Jensen Huang (NVIDIA 创始人 - 坚定的计算物理第一性原理建构者) HTML", "zh": "宿华 (快手联合创始人 - 算法与系统建构的典型代表) HTML", "tw": "宿华 (快手联合创始人 - 算法与系统建构的典型代表) HTML"}, "tier": "common", "primary_id": "ANL", "secondary_id": "ARC", "inner_opposite_id": "CAT", "axis_num": 4, "axis_cn": "驱动轴", "axis_en": "Drive Axis", "axis_tension_cn": "理性 vs 感召", "axis_tension_en": "Analyze vs Evangelize"}, "ANL_DIS": {"id": 62, "name_cn": "破局·洞察者", "name_en": "The Vulnerability Hunter", "tagline_cn": "你的每一次破坏都不是因为愤怒，而是你在精算了几百个技术指标后，一枪打中了行业的死穴。", "description_cn": "你用数据来找到系统最该被打破的地方。你的颠覆不是随机的，你有明确的依据说明「为什么这里必须改变」，这让你的批评比一般的「我觉得这样不对」更有说服力。", "work_style_cn": "你会用数据来识别现有系统的根本性缺陷，然后以此为依据提出颠覆性的替代方案。", "strengths_cn": ["你的颠覆有数据支撑，别人很难反驳你的判断", "能精准找到系统里最值得被挑战的假设"], "blindspots_cn": ["分析阶段太长，有时错过了最佳的行动时机"], "careers_cn": ["顶级做空机构合伙人", "反垄断经济学家", "AI 漏洞挖掘与自动化替代架构师"], "celebrity_hook": {"en": "Bill Ackman (华尔街著名维权投资者 / 做空鳄鱼) HTML", "zh": "大厂内审团队中，通过蛛丝马迹的底层财务与日志数据，一举清洗掉百亿规模腐败链条的硬核清道夫", "tw": "大厂内审团队中，通过蛛丝马迹的底层财务与日志数据，一举清洗掉百亿规模腐败链条的硬核清道夫"}, "tier": "common", "primary_id": "ANL", "secondary_id": "DIS", "inner_opposite_id": "CAT", "axis_num": 4, "axis_cn": "驱动轴", "axis_en": "Drive Axis", "axis_tension_cn": "理性 vs 感召", "axis_tension_en": "Analyze vs Evangelize"}, "ANL_GUA": {"id": 63, "name_cn": "御防·洞察者", "name_en": "The Actuarial Deity", "tagline_cn": "你的世界里没有奇迹。你用最严密的概率公式，算死了黑天鹅降临的每一种路径。", "description_cn": "你是那种用数据来预防问题的人。你不等到问题出现才分析，你持续监测关键指标，在问题还是小苗的时候就发现了。你的团队觉得你有点杞人忧天，但事后往往感谢你的提前预警。", "work_style_cn": "你会建立持续的数据监测机制，让问题在变成危机之前就进入你的视野。", "strengths_cn": ["预警能力极强，团队很少需要「紧急救火」", "你的数据让「这件事安不安全」有了客观的判断依据"], "blindspots_cn": ["对风险指标的敏感有时会让你在该放手推进的时候过于谨慎"], "careers_cn": ["首席风险控制官（CRO）", "高频量化对冲风控总监", "复杂灾备基础设施总工程师"], "celebrity_hook": {"en": "Harry Markowitz (马科维茨，现代投资组合理论奠基人) HTML", "zh": "顶级金融集团或主权基金的首席风险官（CRO） HTML", "tw": "顶级金融集团或主权基金的首席风险官（CRO） HTML"}, "tier": "common", "primary_id": "ANL", "secondary_id": "GUA", "inner_opposite_id": "CAT", "axis_num": 4, "axis_cn": "驱动轴", "axis_en": "Drive Axis", "axis_tension_cn": "理性 vs 感召", "axis_tension_en": "Analyze vs Evangelize"}, "ANL_PIO": {"id": 64, "name_cn": "远征·洞察者", "name_en": "The Trend Speculator", "tagline_cn": "别人在热点里疯狂 FOMO，而你在三年前的数据洪流里，就已经看到了今天风口的骸骨。", "description_cn": "你在探索新方向的同时，用数据来验证每一步走的是否正确。你是那种「有数据的探索者」——你的直觉不是盲目的，你能为它找到支撑，或者在数据告诉你方向不对的时候及时调整。", "work_style_cn": "你在探索的过程中持续收集数据，用数据来验证方向是否值得继续，而不是完全依赖直觉。", "strengths_cn": ["你的探索有数据支撑，能更快地确认或否定一个方向", "能在探索过程中及时发现偏差并修正，不会走太远的弯路"], "blindspots_cn": ["对数据的依赖有时会让你在早期信号不足的情况下对新方向过于犹豫"], "careers_cn": ["科技巨头首席战略官（CSO）", "前沿科技风险投资合伙人", "首席趋势精算师"], "celebrity_hook": {"en": "Yuri Milner (DST Global 创始人 - 依靠独家科技生态数据模型，冷酷捕获跨国大盘红利的巨鳄) HTML", "zh": "顶级科技风投机构里，通过追踪全球开源代码库提交频次与顶尖论文引用率、精准捕获下一个硬科技独角兽的深析合伙人", "tw": "顶级科技风投机构里，通过追踪全球开源代码库提交频次与顶尖论文引用率、精准捕获下一个硬科技独角兽的深析合伙人"}, "tier": "common", "primary_id": "ANL", "secondary_id": "PIO", "inner_opposite_id": "CAT", "axis_num": 4, "axis_cn": "驱动轴", "axis_en": "Drive Axis", "axis_tension_cn": "理性 vs 感召", "axis_tension_en": "Analyze vs Evangelize"}, "ANL_OPR": {"id": 65, "name_cn": "督工·洞察者", "name_en": "The Efficiency Taskmaster", "tagline_cn": "我不看你的工作态度，我只看你昨天的代码千行 Bug 率和系统吞吐量。数字代表一切。", "description_cn": "你是最精准的执行者。你在动手之前验证，确认值得做，然后高效推进。你几乎不做需要推倒重来的工作，因为你在开始之前已经知道这件事是对的。", "work_style_cn": "你先用数据验证方向，确认之后才开始执行，不做无效工作。", "strengths_cn": ["执行的无效率极低，几乎不做需要重来的工作", "能在行动之前快速判断什么值得做"], "blindspots_cn": ["验证阶段有时比需要的更长，在时间窗口短的情况下慢半拍"], "careers_cn": ["精益生产总监", "大规模云服务器效能精算专家", "大厂降本增效总指挥"], "celebrity_hook": {"en": "Frederick Winslow Taylor (泰勒 - 科学管理原理之父，将工人动作和损耗精确量化到秒的极数者) HTML", "zh": "互联网巨头中，负责搭建并高频死磕算法派发及人员提效系统（如外卖骑手调度、精益生产控制）的量化运营高管 HTML", "tw": "互联网巨头中，负责搭建并高频死磕算法派发及人员提效系统（如外卖骑手调度、精益生产控制）的量化运营高管 HTML"}, "tier": "common", "primary_id": "ANL", "secondary_id": "OPR", "inner_opposite_id": "CAT", "axis_num": 4, "axis_cn": "驱动轴", "axis_en": "Drive Axis", "axis_tension_cn": "理性 vs 感召", "axis_tension_en": "Analyze vs Evangelize"}, "ANL_WEA": {"id": 66, "name_cn": "织网·洞察者", "name_en": "The Network Arbitrageur", "tagline_cn": "所有的战略联姻都是虚伪的。我只看两个平台、多个生态节点之间的 API 调用流向与降维利润率。", "description_cn": "你从不同领域的数据中找到别人没有发现的规律。你是那种能说「这三个表面上不相关的趋势其实在指向同一个方向」的人，而且你能用数据证明它。你的洞察来自广度，你的可信度来自严谨。", "work_style_cn": "你会系统性地收集来自不同领域的数据信号，然后用分析框架把它们整合成有意义的洞察。", "strengths_cn": ["能从跨领域的数据里发现别人看不到的规律", "你的跨界洞察有数据支撑，不是纯粹的直觉连接"], "blindspots_cn": ["信息来源太多，有时分析的工作量超过了洞察的实际价值"], "careers_cn": ["生态投资合伙人", "平台广告机制首席架构师", "首席创作者生态清算官"], "celebrity_hook": {"en": "广告交易巨头（如 Google AdMob / DoubleClick 早期）背后的算法结算机制设计师", "zh": "大厂开放平台广告联盟 / 跨界流量清算系统的首席量化机制架构师 HTML", "tw": "大厂开放平台广告联盟 / 跨界流量清算系统的首席量化机制架构师 HTML"}, "tier": "common", "primary_id": "ANL", "secondary_id": "WEA", "inner_opposite_id": "CAT", "axis_num": 4, "axis_cn": "驱动轴", "axis_en": "Drive Axis", "axis_tension_cn": "理性 vs 感召", "axis_tension_en": "Analyze vs Evangelize"}, "ANL_CAT": {"id": 67, "name_cn": "燃动·洞察者", "name_en": "The Messianic Intellect", "tagline_cn": "用神棍般的情绪温度去描述最冰冷的算法。你是那个在讲台上让所有人为底层代码流泪的冷面神父。", "description_cn": "你给人打气靠的是逻辑和数据，不是情绪。你能讲出一个让人振奋的方向，同时甩出一整套无懈可击的数据来证明它是对的。你让人燃起来，而且燃得有道理，不是盲目的热情。", "work_style_cn": "你用数据和逻辑来支撑你的感召力，让大家的热情建立在可靠的基础上，而不只是情绪。", "strengths_cn": ["能同时打动感性和理性的人——用数据说服一类，用愿景感召另一类", "你激发的热情有实质支撑，不容易在遇到困难时崩塌"], "blindspots_cn": ["有时分析的准备过程太长，错过了最佳的感召时机"], "careers_cn": ["顶级科技巨头创始人", "首席产品布道师（Chief Evangelist）", "硬科技超级项目合伙人"], "celebrity_hook": {"en": "Steve Jobs (在解释苹果产品软硬件底层因果关系时，具备恐怖现实扭曲场的产品布道师) HTML", "zh": "罗永浩 (在发布会上将硬核工业设计、算法逻辑用极致幽默与情绪张力包装得恰到好处的布道领袖) HTML", "tw": "罗永浩 (在发布会上将硬核工业设计、算法逻辑用极致幽默与情绪张力包装得恰到好处的布道领袖) HTML"}, "tier": "common", "primary_id": "ANL", "secondary_id": "CAT", "inner_opposite_id": "CAT", "axis_num": 4, "axis_cn": "驱动轴", "axis_en": "Drive Axis", "axis_tension_cn": "理性 vs 感召", "axis_tension_en": "Analyze vs Evangelize"}, "ANL_DIP": {"id": 68, "name_cn": "融通·洞察者", "name_en": "The Analytical Diplomat", "tagline_cn": "我看穿了你们每一个派系的面具和底牌。我面带微笑，只是为了在因果链条里寻找最符合我利益的等式。", "description_cn": "你是那种用数据来达成共识的人。你不用「我觉得」来说服别人，你用「数据显示」。你能在多方利益冲突的情况下，找到一个所有人都难以反驳的数字基础，然后在这个基础上建立共识。", "work_style_cn": "你在调解或谈判中会先建立客观的数据基础，让讨论从各说各话变成对着同一套数字说话。", "strengths_cn": ["你达成的共识有数据支撑，不容易被情绪反转", "能在高冲突的环境里用理性框架降温，让讨论回到事实"], "blindspots_cn": ["过于依赖数据，有时忽略了纯粹的情绪诉求，让对方感到不被理解"], "careers_cn": ["集团跨国并购总操盘手", "复杂利益干系人对齐特使", "董事会首席清算与战略智 // ── computeDualType ──────────────────────────────────────────────────────────
// Returns: { primaryId, secondaryId, axisBias, innerOppositeId,
//            comboName, axisKey, axisInfo }
function computeDualType(pcts) {
  // Step 1: Primary = highest score
  const sorted = Object.entries(pcts).sort((a,b)=>b[1]-a[1]);
  const primaryId = sorted[0][0];
  const innerOppositeId = AXIS_MAP[primaryId];

  // Step 2: Axis bias
  const pPct = pcts[primaryId]  || 0;
  const oPct = pcts[innerOppositeId] || 0;
  const axisBias = Math.round(pPct / (pPct + oPct) * 100);

  // Step 3: Secondary = biggest gap in remaining 5 axes
  let bestSecId = null, bestGap = -1;
  for (const [a, b] of AXES) {
    if (a === primaryId || b === primaryId) continue;
    const gap = Math.abs((pcts[a]||0) - (pcts[b]||0));
    if (gap > bestGap) {
      bestGap = gap;
      bestSecId = (pcts[a]||0) >= (pcts[b]||0) ? a : b;
    }
  }

  // Step 4: Build display name
  const lang = S.lang || 'en';
  const adj  = (ADJ[lang] || ADJ.en)[bestSecId] || '';
  const priArch = ARCHETYPES.find(a=>a.id===primaryId);
  const priName = L(priArch.name).replace(/^The\s+/i,'');
  const comboName = lang==='en'
    ? adj + ' ' + priName
    : adj + '·' + priName;

  // Step 5: Axis info
  const axisKey  = getAxisKey(primaryId);
  const axisInfo = AXIS_META[axisKey] || {};

  // Step 6: Tier label
  const tier = priArch.tier;
  let rarityFlag = '';
  if (tier==='rare')   rarityFlag = '◆ Rare · ';
  if (tier==='scarce') rarityFlag = '◇ ';

  return { primaryId, secondaryId:bestSecId, axisBias,
           innerOppositeId, comboName, axisKey, axisInfo,
           rarityFlag, tier };
}

// ── computeCompatibility ─────────────────────────────────────────────────────
// C(X,Y) = C_comp×0.6 + C_dyn×0.4
// C_comp = complementScore×0.7 + similarityScore×0.3
// C_dyn  = base 50 + synergy bonuses; high-tension flagged not penalised
function computeCompatibility(userDual, partnerDual, userPct, partnerPct) {
  const ids = ARCHETYPES.map(a=>a.id);

  // C_comp: complementarity
  const userSorted = ids.slice().sort((a,b)=>(userPct[a]||0)-(userPct[b]||0));
  const weakest3 = userSorted.slice(0,3);
  const complementScore = weakest3.reduce((s,id)=>s+(partnerPct[id]||0),0) / 3;

  const simNumerator = ids.reduce((s,id)=>s+Math.abs((userPct[id]||0)-(partnerPct[id]||0)),0);
  const similarityScore = Math.max(0, 100 - simNumerator/12);

  const C_comp = complementScore*0.7 + similarityScore*0.3;

  // C_dyn
  let C_dyn = 50;
  if (partnerDual.primaryId===userDual.secondaryId ||
      userDual.primaryId===partnerDual.secondaryId) C_dyn += 20;
  if (partnerDual.secondaryId===userDual.primaryId ||
      userDual.secondaryId===partnerDual.primaryId) C_dyn += 15;
  C_dyn = Math.min(100, C_dyn);

  // High tension flag (no penalty)
  const isHighTension = AXIS_MAP[userDual.primaryId] === partnerDual.primaryId;

  const score = Math.min(100, Math.round(C_comp*0.6 + C_dyn*0.4));
  return { score, isHighTension };
}


function calculateResults(){
  showScreen('s-calc');
  buildCalcBars();

  const AXIS_OPP = {
    ARC:'DIS',DIS:'ARC',GUA:'PIO',PIO:'GUA',
    OPR:'WEA',WEA:'OPR',ANL:'CAT',CAT:'ANL',
    DIP:'SOV',SOV:'DIP',CON:'CUR',CUR:'CON',
  };

  const raw = {};
  ARCHETYPES.forEach(a => raw[a.id] = 0);

  S.answers.forEach((ans, qi) => {
    if (ans === null || ans === undefined) return;
    const q = QUESTIONS[qi];
    if (!q) return;

    if (q.type === 'likert') {
      const val = ans; // 1-4
      const pri = q.axis;
      const opp = AXIS_OPP[q.axis];
      if (q.dir === 1) {
        raw[pri] = (raw[pri] || 0) + val;
        raw[opp] = (raw[opp] || 0) + (5 - val);
      } else {
        raw[opp] = (raw[opp] || 0) + val;
        raw[pri] = (raw[pri] || 0) + (5 - val);
      }
    } else {
      // situation question
      const s = q.opts[ans] ? q.opts[ans].scores : {};
      Object.keys(s).forEach(k => { raw[k] = (raw[k] || 0) + s[k]; });
    }
  });

  const weighted = {};
  ARCHETYPES.forEach(a => { weighted[a.id] = raw[a.id] * a.scarcity; });

  const total = Object.values(weighted).reduce((s, v) => s + v, 0);
  const pcts  = {};
  ARCHETYPES.forEach(a => { pcts[a.id] = total > 0 ? (weighted[a.id] / total * 100) : 0; });

  setTimeout(() => {
    animateCalcBars(pcts);
    setTimeout(() => renderResults(pcts), 1800);
  }, 400);
}

function buildCalcBars(){
  const el=document.getElementById('calc-bars'); el.innerHTML='';
  ARCHETYPES.forEach(a=>{ el.innerHTML+=`<div class="calc-bar-row"><span class="calc-bar-label mono">${a.id}</span><div class="calc-bar-track"><div class="calc-bar-fill" id="cb-${a.id}"></div></div></div>`; });
}
function animateCalcBars(pcts){
  const maxPct=Math.max(...Object.values(pcts));
  ARCHETYPES.forEach((a,i)=>setTimeout(()=>{ const el=document.getElementById('cb-'+a.id); if(el)el.style.width=(pcts[a.id]/maxPct*100)+'%'; }, i*70));
}
