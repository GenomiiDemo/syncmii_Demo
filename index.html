// ── PREVIEW RESULT (demo mode) ────────────────────────────────────────────────
function previewResult(primaryId, secondaryId) {
  // Build synthetic pcts that will produce the desired primary + secondary
  // Primary gets highest score, secondary axis gets a clear gap
  const AXIS_MAP_P = {
    ARC:'DIS',DIS:'ARC',GUA:'PIO',PIO:'GUA',
    OPR:'WEA',WEA:'OPR',ANL:'CAT',CAT:'ANL',
    DIP:'SOV',SOV:'DIP',CON:'CUR',CUR:'CON',
  };
  const AXES_P = [
    ['ARC','DIS'],['GUA','PIO'],['OPR','WEA'],
    ['ANL','CAT'],['DIP','SOV'],['CON','CUR'],
  ];

  // Start with neutral base
  const pcts = {};
  ARCHETYPES.forEach(a => pcts[a.id] = 8);

  // Boost primary strongly
  pcts[primaryId] = 28;
  // Suppress inner opposite
  pcts[AXIS_MAP_P[primaryId]] = 4;

  // Boost secondary on its axis
  pcts[secondaryId] = 18;
  // Suppress secondary's opposite
  pcts[AXIS_MAP_P[secondaryId]] = 6;

  // Normalize to 100
  const total = Object.values(pcts).reduce((a,b)=>a+b,0);
  ARCHETYPES.forEach(a => pcts[a.id] = pcts[a.id] / total * 100);

  // Set S state
  S.answers = new Array(QUESTIONS.length).fill(0);
  S.pcts = pcts;

  renderResults(pcts);
}

function renderResults(pcts){
  const sorted = ARCHETYPES.map(a=>({...a,pct:pcts[a.id]})).sort((a,b)=>b.pct-a.pct);
  S.sorted = sorted;
  const primary = sorted[0]; S.primary = primary;
  const lang    = S.lang || 'en';

  // ── Compute dual type ──────────────────────────────────────────────
  const dual      = computeDualType(pcts);
  S.dual          = dual;
  const secArch   = ARCHETYPES.find(a => a.id === dual.secondaryId);
  const innerArch = ARCHETYPES.find(a => a.id === dual.innerOppositeId);
  const combo     = lookupCombo(dual.primaryId, dual.secondaryId);

  // ── i18n helpers ──────────────────────────────────────────────────
  const isEn = lang === 'en';
  function setT(id, en, zh){ const el=document.getElementById(id); if(el) el.textContent = isEn?en:zh; }
  function setH(id, en, zh){ const el=document.getElementById(id); if(el) el.innerHTML  = isEn?en:zh; }
  function el(id){ return document.getElementById(id); }

  // ═══════════════════════════════════════════════════════
  // SECTION 1 — WHO YOU ARE
  // ═══════════════════════════════════════════════════════

  // Rarity badge
  const rbc = el('rarity-badge-container'); rbc.innerHTML = '';
  if(primary.tier==='rare'){
    rbc.innerHTML = `<div class="rarity-badge mono"><span class="rarity-dot"></span>${primary.rarityLabel||'◆ Rare'} · ${T('rare_top')}</div>`;
  } else if(primary.tier==='scarce'){
    rbc.innerHTML = `<div class="rarity-badge mono" style="border-color:var(--gold-dim);color:var(--gold-dim)"><span class="rarity-dot" style="background:var(--gold-dim)"></span>◇ ${isEn?'Scarce':'稀缺型'}</div>`;
  }

  // Axis pill
  const axisLabel = isEn
    ? `${dual.axisInfo.tension_en||''} · Axis ${dual.axisInfo.num}`
    : `第${dual.axisInfo.num}轴 · ${dual.axisInfo.tension_cn||''}`;
  setT('rp-axis-pill', axisLabel, axisLabel);

  // ── IDENTITY BADGE ROW ───────────────────────────────────────────
  const badgeRow = el('identity-badge-row');
  if(badgeRow){
    badgeRow.innerHTML = '';

    // Badge 1: personality archetype label
    const IDENTITY_LABELS = {
      en: {
        ARC: 'Systems Thinker', OPR: 'Execution Machine', CON: 'People Magnet',
        PIO: 'First Mover',     GUA: 'Steady Hand',       CAT: 'Energy Source',
        ANL: 'Signal Finder',   DIP: 'Bridge Builder',    DIS: 'Status Quo Breaker',
        CUR: 'High Standards',  SOV: 'Natural Authority', WEA: 'Cross-Domain Mind',
      },
      zh: {
        ARC: '系统思维型', OPR: '执行机器型', CON: '人脉磁铁型',
        PIO: '先行者型',   GUA: '稳定锚点型', CAT: '能量来源型',
        ANL: '信号猎手型', DIP: '桥梁建造型', DIS: '打破现状型',
        CUR: '高标准型',   SOV: '天然权威型', WEA: '跨界思维型',
      },
    };

    // Badge 2: special identity tag based on tier + bias
    const SPECIAL_TAGS = {
      en: {
        rare_high:    '◆ One of a Kind',
        rare_normal:  '◆ Rare Profile',
        scarce_high:  '◇ Uncommon Type',
        scarce_normal:'◇ Scarce Profile',
        bias_extreme: '⚡ Single-Minded',
        bias_balanced:'⚖️ The Paradox',
        common_high:  '✦ Super Individual',
        common_normal:'✦ Well-Rounded',
      },
      zh: {
        rare_high:    '◆ 独一无二',
        rare_normal:  '◆ 极稀缺人格',
        scarce_high:  '◇ 少见类型',
        scarce_normal:'◇ 稀缺人格',
        bias_extreme: '⚡ 六边形战士',
        bias_balanced:'⚖️ 矛盾体',
        common_high:  '✦ 超级个体',
        common_normal:'✦ 全能选手',
      },
    };

    const labels = IDENTITY_LABELS[lang] || IDENTITY_LABELS.en;
    const tags   = SPECIAL_TAGS[lang]    || SPECIAL_TAGS.en;

    // Badge 1: archetype label
    const arcLabel = labels[dual.primaryId] || '';
    if(arcLabel){
      const b = document.createElement('span');
      b.className = 'identity-badge neutral';
      b.textContent = arcLabel;
      badgeRow.appendChild(b);
    }

    // Badge 2: special tag
    let specialTag = '';
    if(primary.tier === 'rare'){
      specialTag = dual.axisBias >= 70 ? tags.rare_high : tags.rare_normal;
    } else if(primary.tier === 'scarce'){
      specialTag = dual.axisBias >= 70 ? tags.scarce_high : tags.scarce_normal;
    } else if(dual.axisBias >= 75){
      specialTag = tags.bias_extreme;   // 六边形战士 / Single-Minded
    } else if(dual.axisBias <= 55){
      specialTag = tags.bias_balanced;  // 矛盾体 / The Paradox
    } else {
      specialTag = tags.common_high;    // 超级个体 / Super Individual
    }

    if(specialTag){
      const b2 = document.createElement('span');
      b2.className = 'identity-badge' + (primary.tier==='rare' ? ' rare' : '');
      b2.textContent = specialTag;
      badgeRow.appendChild(b2);
    }
  }


  // Name
  el('result-name').textContent = dual.comboName;
  el('result-cn').textContent   = isEn
    ? (combo ? combo.name_cn : '')
    : dual.comboName;

  // Tagline
  const taglineText = combo && combo.tagline_cn
    ? combo.tagline_cn
    : L(primary.tagline);
  el('result-tagline').textContent = taglineText;

  // Identity cells
  setT('lbl-power',     '⚡ Your Superpower',     '⚡ 超级能力');
  setT('lbl-flaw',      '✦ Watch Out For',       '✦ 注意这里');
  setT('lbl-celeb',     '👤 You Remind Us Of',    '👤 名人参照');

  // Power: first sentence of primary.power
  const powerFull = L(primary.power) || '';
  const powerShort = powerFull.split('—')[0].split('–')[0].trim();
  el('rp-power-text').textContent = powerShort;

  // Flaw
  el('rp-flaw-text').textContent = L(primary.flaw) || '';

  // ── IG PROFILE CARD ─────────────────────────────────────────────
  const daily = DAILY_DATA[dual.primaryId + '_' + dual.secondaryId] || null;

  const igBlock = el('rp-id-celeb');
  if(daily){
    setT('lbl-celeb', '👤 You might follow', '👤 你可能会关注的人');

    const igBio   = isEn ? daily.ig_bio_en   : daily.ig_bio_cn;
    const igLoc   = isEn ? daily.ig_location_en : daily.ig_location_cn;
    const igLabel = isEn ? 'This person gets it' : '这类人懂你';

        '<div class="ig-inline-handle">' + daily.ig_handle + '</div>' +
        '<div class="ig-inline-meta">' + igTitle + '</div>' +
        '<div class="ig-inline-bio">' + igBio + '</div>' +
        '<div class="ig-inline-loc">📍 ' + igLoc + '</div>' +
        '<div class="ig-inline-label">' + igLabel + '</div>' +
      '</div>';
  } else {
    // fallback: classic celebrity hook
    let celebText = '';
    if(combo && combo.celebrity_hook){
      celebText = isEn
        ? combo.celebrity_hook.en
        : (lang==='tw' ? combo.celebrity_hook.tw : combo.celebrity_hook.zh);
      celebText = celebText || combo.celebrity_hook.en || '';
    }
    if(celebText){
      const parts = celebText.split('——');
      el('rp-celeb-text').innerHTML = parts.length >= 2
        ? `<strong>${parts[0].trim()}</strong> — ${parts.slice(1).join('——').trim()}`
        : celebText;
    } else {
      if(igBlock) igBlock.style.display = 'none';
    }
  }

  // ── DAILY MOMENTS SECTION (bottom of Section 2) ──────────────────
  const dailyWrap = el('rp-careers-wrap');
  if(daily && dailyWrap){
    // Remove stale daily section from previous render
    const oldDaily = document.getElementById('rp-daily');
    if(oldDaily) oldDaily.parentNode.removeChild(oldDaily);

    // Single language only
    const dailyItems = (lang === 'en') ? daily.daily_en : daily.daily_cn;
    const dailyTitle = (lang === 'en') ? '✦ Your Reality' : '✦ 你的日常';

    const dailyEl = document.createElement('div');
    dailyEl.className = 'daily-section';
    dailyEl.id = 'rp-daily';

    const itemsHTML = dailyItems.map(item =>
      '<div class="daily-item"><div class="daily-dot"></div><div class="daily-text">' +
      item + '</div></div>'
    ).join('');

    dailyEl.innerHTML =
      '<div class="daily-header"><div class="daily-title">' + dailyTitle + '</div></div>' +
      '<div class="daily-items">' + itemsHTML + '</div>';

    dailyWrap.parentNode.insertBefore(dailyEl, dailyWrap.nextSibling);
  }

  // Tension strip
  const biasW = dual.axisBias;
  el('rp-tension-fill').style.width = biasW + '%';
  el('rp-tension-you-name').textContent  = L(primary.name).replace(/^The\s+/i,'');
  el('rp-tension-opp-name').textContent  = innerArch ? L(innerArch.name).replace(/^The\s+/i,'') : '';
  setT('rp-tension-you-label', 'YOU',     '你');
  setT('rp-tension-opp-label', 'SHADOW',  '内在对立');

  const badge = el('rp-tension-badge');
  if(biasW >= 75){
    badge.textContent = isEn ? '⚡ Extreme Focus' : '⚡ 极端纯粹';
    badge.className   = 'rp-tension-badge rp-tension-badge--extreme';
  } else if(biasW <= 55){
    badge.textContent = isEn ? '⚖️ Inner Tension' : '⚖️ 轴内平衡';
    badge.className   = 'rp-tension-badge rp-tension-badge--balanced';
  } else {
    badge.textContent = biasW + '% ' + (isEn ? 'lean' : '倾斜');
    badge.className   = 'rp-tension-badge rp-tension-badge--normal';
  }

  // ═══════════════════════════════════════════════════════
  // SECTION 2 — HOW YOU WORK
  // ═══════════════════════════════════════════════════════

  setT('rp-section-num-2', '02', '02'); // no-op if doesn't exist

  // Section header labels
  const secTitle2 = el('lbl-how-title');
  const secSub2   = el('lbl-how-sub');
  if(secTitle2) secTitle2.textContent = isEn ? 'How You Work' : '你怎么工作';
  if(secSub2)   secSub2.textContent   = isEn ? 'Your patterns & blind spots' : '你的行为模式与盲点';

  // Description
  const descText = combo && combo.description_cn ? combo.description_cn : L(primary.def);
  el('rp-desc-text').textContent = descText;

  // Work style
  setT('lbl-ws', 'IN PRACTICE', '工作方式');
  const wsText = combo && combo.work_style_cn ? combo.work_style_cn : '';
  if(wsText){
    el('rp-ws-text').textContent = wsText;
  } else {
    const wsCard = el('rp-workstyle-card');
    if(wsCard) wsCard.style.display = 'none';
  }

  // Strengths
  setT('lbl-strengths',  'Strengths', '核心优势');
  const strengths = combo && combo.strengths_cn && combo.strengths_cn.length
    ? combo.strengths_cn
    : [];
  const strEl = el('rp-strengths-list');
  strEl.innerHTML = strengths.length
    ? strengths.map(s=>`<li>${s}</li>`).join('')
    : (primary.value ? `<li>${L(primary.value)}</li>` : '');

  // Blindspots
  setT('lbl-blindspots', 'Watch Out', '盲点警告');
  const blindspots = combo && combo.blindspots_cn && combo.blindspots_cn.length
    ? combo.blindspots_cn
    : [];
  const blindEl = el('rp-blindspots-list');
  blindEl.innerHTML = blindspots.length
    ? blindspots.map(b=>`<li>${b}</li>`).join('')
    : (primary.flaw ? `<li>${L(primary.flaw)}</li>` : '');

  // Careers
  setT('lbl-careers', 'Where You Thrive', '适合的职业方向');
  const careers = combo && combo.careers_cn && combo.careers_cn.length
    ? combo.careers_cn
    : [];
  const careersEl = el('rp-careers-chips');
  careersEl.innerHTML = careers.map(c=>`<span class="rp-career-chip">${c}</span>`).join('');
  if(!careers.length) el('rp-careers-wrap').style.display = 'none';

  // DNA toggle label
  setT('lbl-dna-toggle', 'See your 12-dimension DNA chart', '查看12维职场基因图');

  // Build star chart (hidden until expanded)
  buildStarChart('star-svg', pcts, 108);
  const chipsEl = el('star-chips');
  chipsEl.innerHTML = '';
  sorted.slice(0,5).forEach((a,rank)=>{
    const isRare = a.tier==='rare';
    const isSec  = a.id === dual.secondaryId;
    const cls    = isRare?'rare':rank===0?'p1':rank<=2?'p2':'p3';
    chipsEl.innerHTML += `<span class="star-chip ${cls}${isSec?' secondary-chip':''}">${isRare?'◆ ':''}${a.name.en.replace('The ','')} ${Math.round(a.pct)}%${isSec?' ✦':''}</span>`;
  });

  // ═══════════════════════════════════════════════════════
  // SECTION 3 — WHO YOU CLICK WITH
  // ═══════════════════════════════════════════════════════

  // Section labels
  const secTitle3 = el('lbl-compat-title');
  const secSub3   = el('lbl-compat-sub');
  if(secTitle3) secTitle3.textContent = isEn ? 'Who You Click With' : '你和谁最合';
  if(secSub3)   secSub3.textContent   = isEn ? 'Click a card to compare radars' : '点击卡片对比雷达图';

  setT('lbl-my-radar',    'You',        '你');
  setT('lbl-best-matches', isEn?'⚡ Best Matches':'⚡ 最佳搭档',
                            isEn?'⚡ Best Matches':'⚡ 最佳搭档');
  setT('lbl-friction',    isEn?'🔥 Most Friction':'🔥 最容易产生摩擦',
                            isEn?'🔥 Most Friction':'🔥 最容易产生摩擦');

  // Build my radar
  buildRadarChart('my-radar-svg', pcts, dual.primaryId, 100, false);

  // Compute compat scores
  const allCombos = Object.values(COMBO_MAP);
  const scored = allCombos.map(c => {
    const partnerPct  = RADAR_PROFILES[c.primary_id] || {};
    const partnerDual = { primaryId: c.primary_id, secondaryId: c.secondary_id };
    const { score, isHighTension } = computeCompatibility(dual, partnerDual, pcts, partnerPct);
    return { combo: c, score, isHighTension };
  });
  scored.sort((a,b) => b.score - a.score);

  const best3    = scored.slice(0, 3);
  const friction2= scored.slice(-2).reverse();

  // Best match labels
  const MATCH_LABELS = {
    best: isEn ? ['天配', '强搭配', '好搭配'] : ['天配', '强搭配', '好搭配'],
    en:   ['Perfect match', 'Strong pair', 'Good pair'],
  };

  // Render best cards
  const bestEl = el('rp-best-cards');
  bestEl.innerHTML = '';
  best3.forEach((item, i) => {
    const c    = item.combo;
    const name = isEn ? c.name_en : c.name_cn;
    const tag  = isEn ? MATCH_LABELS.en[i] : MATCH_LABELS.best[i];
    const why  = getBestWhy(dual.primaryId, c.primary_id, item.score, isEn);
    const card = document.createElement('div');
    card.className = 'rp-match-card' + (i===0?' active':'');
    card.innerHTML = `
      <span class="rp-match-label rp-match-label--best">${tag}${item.isHighTension?' 🔥':''}</span>
      <div class="rp-match-name">${name}</div>
      <div class="rp-match-why">${why}</div>`;
    card.addEventListener('click', () => {
      document.querySelectorAll('.rp-match-card').forEach(el=>el.classList.remove('active'));

      const lbl = el('lbl-partner-radar');
      if(lbl) lbl.textContent = '▶ ' + name;

    if(i===0){
      card.classList.add('active');
      const pp = RADAR_PROFILES[c.primary_id] || {};
      buildRadarChart('partner-radar-svg', pp, c.primary_id, 100, true);
      const lbl = document.getElementById('lbl-partner-radar');
      if(lbl) lbl.textContent = (isEn ? '▶ ' : '▶ ') + name;
    }
    bestEl.appendChild(card);
  });

  // Render friction cards
  const frictionEl = el('rp-friction-cards');
  frictionEl.innerHTML = '';
  friction2.forEach(item => {
    const c   = item.combo;
    const name = isEn ? c.name_en : c.name_cn;
    const fd  = FRICTION_DESC[c.primary_id] || { source:'', tips:[] };
    const card = document.createElement('div');
    card.className = 'rp-match-card rp-match-card--friction';

function getBestWhy(myId, theirId, score, isEn){
  // Try specific complementarity reason first
  const specific = BEST_MATCH_WHY[myId] && BEST_MATCH_WHY[myId][theirId];
  if(specific) return isEn ? specific.en : specific.zh;

  // Fallback by score
  const theirArch = ARCHETYPES.find(a=>a.id===theirId);
  const name = theirArch ? (isEn ? theirArch.name.en : theirArch.name.zh).replace('The ','') : '';
  if(score >= 85) return isEn
    ? name + ' fills your blind spots naturally'
    : name + '能自然填补你的盲点';
  if(score >= 70) return isEn
    ? 'Complementary strengths with enough common ground'
    : '优势互补，同时有足够的共同语言';
  return isEn
    ? 'Different perspectives — a productive challenge'
    : '视角多元，有建设性的挑战';
}

// ── MINI RADAR CHART (for compat panel) ──────────────────────────────────────
function buildRadarChart(svgId, pct, primaryId, R, isPartner){
  const svg = document.getElementById(svgId);
  if(!svg) return;
  svg.innerHTML = '';
  const arch = ARCHETYPES;

  function polar(deg, r){ const a=(deg-90)*Math.PI/180; return [Math.cos(a)*r, Math.sin(a)*r]; }
  function ns(tag){ return document.createElementNS('http://www.w3.org/2000/svg', tag); }
  function sqR(p){ return Math.sqrt(Math.max(0,p)/100)*R; }

  const tierArch = ARCHETYPES.find(a=>a.id===primaryId);
  const tier = tierArch ? tierArch.tier : 'common';
  const colors = {
    common: { stroke:'#4A7C59', fill:'rgba(74,124,89,0.12)' },
    scarce: { stroke:'#C9A84C', fill:'rgba(201,168,76,0.10)' },
    rare:   { stroke:'#B08EC8', fill:'rgba(176,142,200,0.12)' },
  };
  const col = isPartner
    ? { stroke:'rgba(184,202,188,0.5)', fill:'rgba(184,202,188,0.06)' }
    : (colors[tier] || colors.common);

  // Rings
  [0.33,0.66,1.0].forEach(f=>{
    const pts = arch.map((_,i)=>{ const[x,y]=polar(i*30,R*f); return `${x.toFixed(1)},${y.toFixed(1)}`; }).join(' ');
    const p=ns('polygon');
    p.setAttribute('points',pts); p.setAttribute('fill','none');
    p.setAttribute('stroke',`rgba(255,255,255,${f===1?0.08:0.04})`);
    p.setAttribute('stroke-width','0.5');
    if(f<1) p.setAttribute('stroke-dasharray','2 3');
    svg.appendChild(p);
  });

  // Axis lines
  arch.forEach((_,i)=>{
    const[x,y]=polar(i*30,R);
    const l=ns('line');
    l.setAttribute('x1','0'); l.setAttribute('y1','0');
    l.setAttribute('x2',x.toFixed(1)); l.setAttribute('y2',y.toFixed(1));
    l.setAttribute('stroke','rgba(255,255,255,0.05)'); l.setAttribute('stroke-width','0.4');
    svg.appendChild(l);
  });

  // Star fill
  const pts = arch.map((a,i)=>{ const[x,y]=polar(i*30,sqR(pct[a.id]||0)); return `${x.toFixed(2)},${y.toFixed(2)}`; }).join(' ');
  const fp=ns('polygon'); fp.setAttribute('points',pts); fp.setAttribute('fill',col.fill); svg.appendChild(fp);
  const op=ns('polygon'); op.setAttribute('points',pts); op.setAttribute('fill','none');
  op.setAttribute('stroke',col.stroke); op.setAttribute('stroke-width','1.2'); op.setAttribute('opacity','0.75'); svg.appendChild(op);

  // Dots
  arch.forEach((a,i)=>{
    const v=pct[a.id]||0; if(v<3) return;
    const[x,y]=polar(i*30,sqR(v));
    const c=ns('circle'); c.setAttribute('cx',x.toFixed(2)); c.setAttribute('cy',y.toFixed(2));
    c.setAttribute('r',v>=15?'3':'2'); c.setAttribute('fill',col.stroke); c.setAttribute('opacity','0.75');
    svg.appendChild(c);
  });

  // Labels for top 4
  arch.slice().sort((a,b)=>(pct[b.id]||0)-(pct[a.id]||0)).slice(0,4).forEach(a=>{
    const i=arch.findIndex(x=>x.id===a.id);
    const[lx,ly]=polar(i*30,R+15);
    const t=ns('text');
    t.setAttribute('x',lx.toFixed(1)); t.setAttribute('y',ly.toFixed(1));
    t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','middle');
    t.setAttribute('font-family',"'DM Mono',monospace");
    t.setAttribute('font-size','7.5'); t.setAttribute('fill',col.stroke); t.setAttribute('opacity','0.85');
    t.textContent = a.id;
    svg.appendChild(t);
  });
}

  ARCHETYPES.forEach((a,i)=>{ const [dx,dy]=polar(i*30,sqrtR(norm[a.id])); const d=ns('circle');

    d.setAttribute('fill',TIER_COL[a.tier].stroke); svg.appendChild(d); });
  ARCHETYPES.forEach((a,i)=>{ const angle=i*30; const LR=R+18; const [lx,ly]=polar(angle,LR); const pct=norm[a.id]; const isTop=pct>=9;

    if(isTop){ const [px,py]=polar(angle,LR+11); const t2=ns('text'); t2.setAttribute('x',px.toFixed(1));t2.setAttribute('y',py.toFixed(1));
      t2.setAttribute('text-anchor','middle');t2.setAttribute('dominant-baseline','middle');t2.setAttribute('font-family',"'DM Mono',monospace");t2.setAttribute('font-size','7');
      t2.setAttribute('fill',TIER_COL[a.tier].stroke);t2.setAttribute('opacity','0.65'); t2.textContent=Math.round(pct)+'%'; svg.appendChild(t2); } });
}

function renderGuidedStep(){
  const steps=guidedSteps(); const step=steps[S.guidedStep];

  document.getElementById('guided-pills').innerHTML = steps.map((s,i)=>
    `<span class="g-pill ${i===S.guidedStep?'active':i<S.guidedStep?'done':''}">${i+1}. ${T(s.stage)}</span>`).join('');
  if(step.exp){ renderExpStep(); return; }

  step.items.forEach(it=>{
    const wrap=document.createElement('div'); wrap.className='g-field';
    wrap.innerHTML=`<label class="g-label">${T(it.label)}</label>`;
    if(it.type==='number'){
      const inp=document.createElement('input'); inp.type='number'; inp.className='g-input'; inp.id='g-'+it.key;

      wrap.appendChild(inp);
    } else if(it.type==='voice'){
      const va=makeVoiceTextarea('g-'+it.key, T(it.ph), S.guided[it.key]||'', v=>{S.guided[it.key]=v;});
      wrap.appendChild(va);
    } else {
      const inp=document.createElement('input'); inp.type='text'; inp.className='g-input'; inp.id='g-'+it.key;
      inp.placeholder=T(it.ph); inp.value=S.guided[it.key]||''; inp.oninput=()=>{S.guided[it.key]=inp.value;};
      wrap.appendChild(inp);
    }
    // followup slot
    if(it.followup){
      const fu=document.createElement('div'); fu.className='g-followup'; fu.id='fu-'+it.key; fu.style.display='none';
      wrap.appendChild(fu);
    }
    body.appendChild(wrap);
  });
  const nav=document.getElementById('guided-nav');
  const isLast=S.guidedStep===steps.length-1;
  nav.innerHTML=`
    ${S.guidedStep>0?`<button class="btn-nav mono" onclick="guidedPrev()">${T('back_btn')}</button>`:'<span></span>'}
    <button class="btn-next mono" id="g-next-btn" onclick="guidedNext()">${isLast?T('g_next'):T('g_next')}</button>`;
}
async function maybeFollowup(){
  const steps=guidedSteps(); const step=steps[S.guidedStep];
  for(const it of step.items){
    if(it.followup && !S.guided['_fu_'+it.key]){
      const ans=S.guided[it.key]||'';
      if(ans.trim().length<8) continue;
      const slot=document.getElementById('fu-'+it.key); if(!slot)continue;
      slot.style.display='block';
      slot.innerHTML=`<div class="g-fu-q mono"><span class="spinner-sm"></span> ${T('g_thinking')}</div>`;
      const q = await aiFollowup(T(it.label), ans);
      S.guided['_fu_'+it.key]=true;
      if(q){
        slot.innerHTML=`<div class="g-fu-q"><span class="g-fu-tag mono">${T('g_followup')}</span> ${q}</div>`;
        const va=makeVoiceTextarea('g-'+it.key+'-fu', T(it.ph), S.guided[it.key+'_fu']||'', v=>{S.guided[it.key+'_fu']=v;}, 2);
        slot.appendChild(va);
        return true; // stop to let user answer follow-up
      } else { slot.style.display='none'; }
    }
  }
  return false;
}
async function guidedNext(){
  if(!requireKey())return;
  // try a follow-up first (non-blocking flow: if shown, user answers then clicks next again)
  const btn=document.getElementById('g-next-btn');
  btn.disabled=true; const orig=btn.textContent; btn.innerHTML=`<span class="spinner-sm"></span>`;
  let shown=false;
  try { shown = await maybeFollowup(); } catch(e){}
  btn.disabled=false; btn.textContent=orig;
  if(shown) return;
  const steps=guidedSteps();
  if(S.guidedStep<steps.length-1){ S.guidedStep++; renderGuidedStep(); }
  else finishGuided();
}
function guidedPrev(){ if(S.guidedStep>0){ S.guidedStep--; renderGuidedStep(); } }

  const wrap=document.createElement('div'); wrap.className='g-field';
  wrap.innerHTML=`<label class="g-label">${T('g_q_edesc')}</label>`;
  const va=makeVoiceTextarea('g-exp-desc', T('g_q_edesc_ph'), card.desc||'', v=>{card.desc=v;});
  wrap.appendChild(va);
  const fu=document.createElement('div'); fu.className='g-followup'; fu.id='fu-exp'; fu.style.display='none';
  wrap.appendChild(fu);
  body.appendChild(wrap);
  const warn=document.createElement('div'); warn.id='exp-warn'; warn.className='g-exp-warn'; warn.style.display='none'; warn.textContent=T('g_exp_required');
  body.appendChild(warn);
  // re-show a previously asked follow-up
  if(card.fuAsked && card._fuQ){
    fu.style.display='block';
    fu.innerHTML=`<div class="g-fu-q"><span class="g-fu-tag mono">${T('g_followup')}</span> ${card._fuQ}</div>`;
    const va2=makeVoiceTextarea('g-exp-fu', T('g_q_edesc_ph'), card.descFu||'', v=>{card.descFu=v;}, 2);
    fu.appendChild(va2);
  }
  renderExpNav(idx);
}
function renderExpNav(idx){
  const nav=document.getElementById('guided-nav');
  const left = idx>0
    ? `<button class="btn-nav mono" onclick="expPrevCard()">${T('g_exp_prev_card')}</button>`
    : (S.guidedStep>0?`<button class="btn-nav mono" onclick="guidedPrev()">${T('back_btn')}</button>`:'<span></span>');
  let right='';
  if(idx < S.guidedExp.length-1){
    right=`<button class="btn-next mono" id="g-next-btn" onclick="expAdvance('card')">${T('g_exp_next_card')}</button>`;
  } else {
    const addBtn = S.guidedExp.length<3 ? `<button class="btn-add mono" id="g-add-btn" onclick="expAdvance('add')">${T('g_exp_add')}</button>` : '';
    right=`${addBtn}<button class="btn-next mono" id="g-next-btn" onclick="expAdvance('next')">${T('g_next')}</button>`;
  }
  nav.innerHTML=`${left}<div class="g-nav-right">${right}</div>`;
}
function expPrevCard(){ if(S.guidedExpIdx>0){ S.guidedExpIdx--; renderGuidedStep(); } }
function validateCurrentExpCard(){
  const c=S.guidedExp[S.guidedExpIdx];
  return !!(c && c.company && c.company.trim() && c.title && c.title.trim() && c.desc && c.desc.trim());
}
function isShortDesc(t){
  t=(t||'').trim();
  if(S.lang==='en') return t.split(/\s+/).filter(Boolean).length < 15;
  return t.length < 20;
}
async function maybeExpFollowup(){
  const card=S.guidedExp[S.guidedExpIdx];
  if(!card || card.fuAsked) return false;
  const d=(card.desc||'').trim();
  if(d.length<2 || !isShortDesc(d)) return false; // only when description is short
  const slot=document.getElementById('fu-exp'); if(!slot) return false;
  slot.style.display='block';
  slot.innerHTML=`<div class="g-fu-q mono"><span class="spinner-sm"></span> ${T('g_thinking')}</div>`;
  const q = await aiFollowup(T('g_q_edesc')+' @ '+(card.title||card.company||''), d);
  card.fuAsked=true;
  if(q){
    card._fuQ=q;
    slot.innerHTML=`<div class="g-fu-q"><span class="g-fu-tag mono">${T('g_followup')}</span> ${q}</div>`;
    const va=makeVoiceTextarea('g-exp-fu', T('g_q_edesc_ph'), card.descFu||'', v=>{card.descFu=v;}, 2);
    slot.appendChild(va);
    return true; // stop to let user answer
  } else { slot.style.display='none'; }
  return false;
}
async function expAdvance(action){
  if(!requireKey())return;
  const warn=document.getElementById('exp-warn');
  if(!validateCurrentExpCard()){ if(warn) warn.style.display='block'; return; }
  if(warn) warn.style.display='none';
  const btn=document.getElementById('g-next-btn'); let orig;
  if(btn){ orig=btn.textContent; btn.disabled=true; btn.innerHTML=`<span class="spinner-sm"></span>`; }
  let shown=false;
  try { shown = await maybeExpFollowup(); } catch(e){}
  if(btn){ btn.disabled=false; btn.textContent=orig; }
  if(shown) return;
  if(action==='card'){ S.guidedExpIdx++; renderGuidedStep(); }
  else if(action==='add'){ S.guidedExp.push({company:'',title:'',time:'',desc:'',descFu:'',fuAsked:false,_fuQ:''}); S.guidedExpIdx=S.guidedExp.length-1; renderGuidedStep(); }
  else { S.guidedStep++; renderGuidedStep(); }
}
async function finishGuided(){
  if(!requireKey())return;
  showScreen('s-building');
  try { await buildGuidedResume(); renderResumeDisplay(); setTimeout(()=>showScreen('s-resume'),500); }
  catch(e){ aiErr(e); showScreen('s-guided'); }
}

// ── API KEY (⑭) ──────────────────────────────────────────────────────────────
function loadKey(){
  try{ const k=localStorage.getItem('syncmii_gemini_key'); if(k){ window.__geminiKey=k; document.getElementById('f-key').value=k; setKeyStatus('ok'); } }catch(e){}
}
function setKeyStatus(st, msg){
  const el=document.getElementById('key-status');
  if(st==='ok'){ el.className='key-status ok'; el.textContent=T('key_ok'); }
  else if(st==='bad'){ el.className='key-status bad'; el.textContent=T('key_bad')+(msg?(' · '+msg.slice(0,50)):''); }
  else { el.className='key-status'; el.textContent=''; }
}
async function verifyKey(){
  const k=(document.getElementById('f-key').value||'').trim();
  if(!k){ setKeyStatus('bad'); return; }
  const btn=document.getElementById('btn-key'); btn.disabled=true; const o=btn.textContent; btn.innerHTML=`<span class="spinner-sm"></span>${T('key_verifying')}`;
  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${k}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{role:'user',parts:[{text:'ping'}]}],generationConfig:{maxOutputTokens:5,thinkingConfig:{thinkingBudget:0}}}),
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    window.__geminiKey=k; try{localStorage.setItem('syncmii_gemini_key',k);}catch(e){}
    setKeyStatus('ok');
  }catch(e){ setKeyStatus('bad', e.message); }
  btn.disabled=false; btn.textContent=o;
}
function toggleKeyCard(){ document.getElementById('key-card').classList.toggle('open'); }

// ── VOICE INPUT (Web Speech) ─────────────────────────────────────────────────
function makeVoiceTextarea(id, placeholder, value, onChange, rows){
  const wrap=document.createElement('div'); wrap.className='voice-wrap';
  const ta=document.createElement('textarea'); ta.className='voice-ta'; ta.id=id; ta.placeholder=placeholder; ta.value=value||''; ta.rows=rows||3;
  ta.oninput=()=>onChange(ta.value);
  wrap.appendChild(ta);
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    const btn=document.createElement('button'); btn.type='button'; btn.className='voice-btn'; btn.textContent='🎤';
    let rec=null, recording=false;
    btn.onclick=()=>{
      if(recording){ try{rec&&rec.stop();}catch(e){} return; }
      rec=new SR(); rec.continuous=true; rec.interimResults=true;
      rec.lang = S.lang==='en'?'en-US':(S.lang==='tw'?'zh-TW':'zh-CN');
      let base=ta.value;
      rec.onresult=e=>{ let interim='',final=''; for(let i=e.resultIndex;i<e.results.length;i++){ if(e.results[i].isFinal)final+=e.results[i][0].transcript; else interim+=e.results[i][0].transcript; }
        if(final){ base=base+final; } ta.value=base+interim; onChange(ta.value); };
      rec.onerror=()=>{ recording=false; btn.classList.remove('recording'); btn.textContent='🎤'; };
      rec.onend=()=>{ recording=false; btn.classList.remove('recording'); btn.textContent='🎤'; ta.value=base; onChange(base); };
      try{ rec.start(); recording=true; btn.classList.add('recording'); btn.textContent='⏹'; }catch(e){}
    };
    wrap.appendChild(btn);
  }
  return wrap;
}

// ── INIT ─────────────────────────────────────────────────────────────────────
function initApp(){
  setupIntake(); validateIntake();
  setupDropzone();
  renderLandingPreview();
  applyI18n();
  loadKey();
  document.getElementById('f-key').addEventListener('input',()=>setKeyStatus('clear'));
  const pr=document.getElementById('f-plan-role'); if(pr) pr.addEventListener('input',validatePlan);
}
document.addEventListener('DOMContentLoaded', initApp);
